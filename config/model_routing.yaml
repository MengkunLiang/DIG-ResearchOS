# ResearchOS LLM 路由配置
#
# 这份文件只负责回答两个问题：
# 1. 某个 task / agent 最终要走哪个 endpoint？
# 2. 这个 endpoint 背后对应哪个 provider / API key / base URL？
#
# 读这份文件时，建议按下面顺序理解：
# 1. 先看 `default_profile`：如果没有任何显式覆盖，默认走哪套路由；
# 2. 再看 `endpoints`：每个 endpoint 实际连到哪个 provider / base URL；
# 3. 最后看 `profiles`：不同任务档位（heavy / medium / light）在该 profile 下怎么选模型。
#
# 使用顺序：
# - Agent 可以直接在 config/agent_params.yaml 里声明 llm.model + llm.endpoint
# - 如果 state_machine.yaml 里给某个 task 配了 llm.model / llm.endpoint，会再覆盖 Agent 默认值
# - 如果没有显式 model + endpoint，才回退到 Agent 的 llm.tier（例如 hello=medium, ideation=heavy）
# - 如果 state_machine.yaml 里给某个 task 配了 llm.profile，则优先使用该 profile
# - 否则回退到 agent 自己的 llm.profile
# - 再否则回退到本文件的 default_profile
#
# 建议：
# - 想“按 Agent 固定模型/provider”，优先改 config/agent_params.yaml
# - 想“按 task 临时切 provider”，优先改 state_machine.yaml 的 llm.model / llm.endpoint 或 llm.profile
# - 想“给一组任务共用一套模型策略”，就在这里新增一个 profile
# - 想“只在某一类任务失败时切备用模型”，优先在这里给对应 profile 增加 fallback

# ========================================
# API 密钥配置（可选）
# 可以在这里直接配置 API key，也可以通过环境变量引用
# 优先级：api_key > api_key_env
# 实际使用时更推荐把密钥放在项目根目录 `.env` 中
# ========================================
api_keys:
  # SiliconFlow API Key（示例占位；留空表示完全走 `.env`）
  SILICONFLOW_API_KEY: ""
  SILICONFLOW_BASE_URL: "https://api.siliconflow.cn/v1"

  DEEPSEEK_API_KEY: ""
  DEEPSEEK_BASE_URL: "https://api.deepseek.com"

  # OpenRouter API Key（直接配置）
  OPENROUTER_API_KEY: ""

  # OpenAI API Key（直接配置）
  OPENAI_API_KEY: ""
  OPENAI_BASE_URL: "https://api.openai.com/v1"

  # Anthropic API Key（直接配置）
  ANTHROPIC_API_KEY: ""

# 默认 profile。
# 保守策略：继续保持当前默认链路为 SiliconFlow，避免影响已有运行方式。
# 如果 agent_params/state_machine 没有显式指定 profile，这里就是最终回退入口。
default_profile: default

# API 端点配置。
# 每个 endpoint 都可以有自己独立的 provider / API key / base URL。
# agent_params.yaml 里的 llm.endpoint 引用的就是这里的名字。
# 这里不决定“谁会用它”，这里只定义“这个 endpoint 怎么连出去”。
# 支持两种配置方式：
#   1. api_key_env: 从环境变量读取（如 "SILICONFLOW_API_KEY"）
#   2. api_key: 直接在这里配置（见上方 api_keys 配置）
endpoints:
  siliconflow:
    # SiliconFlow 走 OpenAI-compatible 协议，因此 provider 仍是 openai。
    # 只要模型名不是 `openai/...`，runtime 会自动补上 openai 前缀。
    provider: openai
    api_key_env: SILICONFLOW_API_KEY
    api_base_env: SILICONFLOW_BASE_URL
  
  deepseek:
    provider: openai
    api_key_env: DEEPSEEK_API_KEY
    api_base_env: DEEPSEEK_BASE_URL

  openrouter_main:
    # OpenRouter 在 LiteLLM 中有独立 provider。
    # 使用它时，模型名通常已经自带 `openrouter/...` 前缀。
    provider: openrouter
    api_key_env: OPENROUTER_API_KEY

  # 如需启用 OpenAI 官方接口，可取消下面注释：
  openai_official:
    provider: openai
    api_key_env: OPENAI_API_KEY
    api_base_env: OPENAI_BASE_URL

  # 如需启用 Anthropic 官方接口，可取消下面注释：
  anthropic_main:
    provider: anthropic
    api_key_env: ANTHROPIC_API_KEY

# 路由配置。
# profile = 一套路由策略；
# heavy / medium / light = agent 选中的负载档位；
# endpoint = 最终走哪个 provider。
# max_context = runtime 认为该模型可安全承载的上下文窗口；
# fallback = 当前 primary 彻底失败后，按顺序继续尝试的候选链。
profiles:
  # 默认 profile：保持你当前的 SiliconFlow 行为不变。
  # 如果你什么都不配，所有未覆盖的 task 都会走这里。
  default:
    heavy:
      primary:
        model: "deepseek-v4-pro"
        endpoint: deepseek
        max_context: 128000
      fallback:
        - model: "deepseek-v4-flash"
          endpoint: deepseek
          max_context: 128000

    medium:
      primary:
        model: "deepseek-v4-flash"
        endpoint: deepseek
        max_context: 128000
      fallback:
        - model: "deepseek-v4-flash"
          endpoint: deepseek
          max_context: 128000

    light:
      # 示例：light 可以和 heavy/medium 用不同模型，不要求整个 profile 完全一致。
      primary:
        model: "deepseek-v4-flash"
        endpoint: deepseek
        max_context: 128000
      fallback:
        - model: "deepseek-v4-flash"
          endpoint: deepseek
          max_context: 128000
    # heavy:
    #   # heavy 通常留给 T1/T4/T4.5 这种更偏规划/综合的任务。
    #   primary:
    #     # OpenAI-compatible 的原始模型名可以保留，不必手工写 openai/ 前缀。
    #     model: "deepseek-ai/DeepSeek-V4-Flash"
    #     endpoint: siliconflow
    #     max_context: 128000
    #   fallback:
    #     # 先在同一个 SiliconFlow provider 内切换备选模型，
    #     # 只有 primary 持续超时/拥塞时才会走到这里。
    #     - model: "deepseek-ai/DeepSeek-V4-Pro"
    #       endpoint: siliconflow
    #       max_context: 128000

    # medium:
    #   # medium 是当前最常见档位，T2/T3/novelty 等常会走这里。
    #   # 如果你最近主要是 T2/T3/T5 超时，优先改这里最有效。
    #   primary:
    #     model: "deepseek-ai/DeepSeek-V4-Flash"
    #     endpoint: siliconflow
    #     max_context: 128000
    #   fallback:
    #     # default.medium 是当前报 timeout 最多的链路，因此这里显式补同 provider fallback。
    #     - model: "deepseek-ai/DeepSeek-V4-Pro"
    #       endpoint: siliconflow
    #       max_context: 128000

    # light:
    #   # light 适合很短的问答、检查类任务；若仓库里很少用 light，可先不动。
    #   primary:
    #     model: "deepseek-ai/DeepSeek-V4-Flash"
    #     endpoint: siliconflow
    #     max_context: 128000
    #   fallback:
    #     - model: "deepseek-ai/DeepSeek-V4-Pro"
    #       endpoint: siliconflow
    #       max_context: 128000

  # 显式的 SiliconFlow-only profile。
  # 适合在 state_machine 里直接写 llm.profile: siliconflow_only，
  # 这样即便以后 default_profile 改了，这些 task 也不会漂移。
  siliconflow_only:
    heavy:
      primary:
        model: "deepseek-ai/DeepSeek-V4-Pro"
        endpoint: siliconflow
        max_context: 128000
      fallback:
        - model: "deepseek-ai/DeepSeek-V4-Flash"
          endpoint: siliconflow
          max_context: 128000

    medium:
      primary:
        model: "deepseek-ai/DeepSeek-V4-Flash"
        endpoint: siliconflow
        max_context: 128000
      fallback:
        - model: "deepseek-ai/DeepSeek-V4-Pro"
          endpoint: siliconflow
          max_context: 128000

    light:
      # 示例：light 可以和 heavy/medium 用不同模型，不要求整个 profile 完全一致。
      primary:
        model: "deepseek-ai/DeepSeek-V4-Flash"
        endpoint: siliconflow
        max_context: 128000
      fallback:
        - model: "deepseek-ai/DeepSeek-V4-Pro"
          endpoint: siliconflow
          max_context: 128000

  deepseek:
    heavy:
      primary:
        model: "deepseek-v4-pro"
        endpoint: deepseek
        max_context: 128000
      fallback:
        - model: "deepseek-v4-flash"
          endpoint: deepseek
          max_context: 128000

    medium:
      primary:
        model: "deepseek-v4-flash"
        endpoint: deepseek
        max_context: 128000
      fallback:
        - model: "deepseek-v4-flash"
          endpoint: deepseek
          max_context: 128000

    light:
      # 示例：light 可以和 heavy/medium 用不同模型，不要求整个 profile 完全一致。
      primary:
        model: "deepseek-v4-flash"
        endpoint: deepseek
        max_context: 128000
      fallback:
        - model: "deepseek-v4-flash"
          endpoint: deepseek
          max_context: 128000
  # OpenRouter 快速 profile。
  # 说明：
  # - openrouter 作为 provider 时，模型名建议写成
  #   openrouter/<upstream-provider>/<model-name>
  # - 比如 openrouter/openai/gpt-4o-mini
  openrouter_fast:
    heavy:
      primary:
        model: "openrouter/openai/gpt-4o"
        endpoint: openrouter_main
        max_context: 128000

    medium:
      primary:
        model: "openrouter/openai/gpt-4o-mini"
        endpoint: openrouter_main
        max_context: 128000

    light:
      primary:
        model: "openrouter/openai/gpt-4.1-mini"
        endpoint: openrouter_main
        max_context: 128000

  # 混合 profile。
  # 典型用法：
  # - heavy 任务走 SiliconFlow 的 DeepSeek
  # - medium / light 任务走 OpenRouter
  mixed:
    heavy:
      primary:
        model: "deepseek-ai/DeepSeek-V4-Flash"
        endpoint: siliconflow
        max_context: 128000
      fallback:
        # 这里的 fallback 只在 primary 真失败时才会触发，
        # 不是“每次都两个模型一起跑”。
        - model: "deepseek-ai/DeepSeek-V4-Pro"
          endpoint: siliconflow
          max_context: 128000
        - model: "openrouter/openai/gpt-4o"
          endpoint: openrouter_main
          max_context: 128000

    medium:
      primary:
        model: "openrouter/openai/gpt-4o-mini"
        endpoint: openrouter_main
        max_context: 128000
      fallback:
        - model: "deepseek-ai/DeepSeek-V4-Flash"
          endpoint: siliconflow
          max_context: 128000
        - model: "deepseek-ai/DeepSeek-V4-Pro"
          endpoint: siliconflow
          max_context: 128000

    light:
      primary:
        model: "openrouter/openai/gpt-4.1-mini"
        endpoint: openrouter_main
        max_context: 128000

  # 示例：按任务单独选 profile 时可以这么命名。
  # - HELLO 之类的小任务：hello_fast
  # - T4 假设生成：ideation_deep
  # - T4.5 审计任务：audit_safe
  hello_fast:
    medium:
      primary:
        model: "openrouter/openai/gpt-4o-mini"
        endpoint: openrouter_main
        max_context: 128000

  ideation_deep:
    heavy:
      primary:
        model: "deepseek-v4-pro"
        endpoint: deepseek
        max_context: 128000
      fallback:
        # 先保持同 provider 的备选，再回退到 OpenRouter。
        - model: "deepseek-v4-flash"
          endpoint: deepseek
          max_context: 128000
        - model: "deepseek-ai/DeepSeek-V4-Flash"
          endpoint: siliconflow
          max_context: 128000

  audit_safe:
    heavy:
      primary:
        model: "openrouter/openai/gpt-4o"
        endpoint: openrouter_main
        max_context: 128000

  # T2 Scout 专用：保留当前 SiliconFlow 首选链路，但在 provider 超时/抖动时
  # 自动切到 OpenRouter，避免单次 run 因单一 endpoint 卡死。
  scout_resilient:
    medium:
      # Scout 经常长时间调用搜索/整理链路，因此更适合配置 fallback。
      # 如果 T2 报 provider timeout，优先看这里而不是只改 default.medium。
      primary:
        model: "deepseek-ai/DeepSeek-V4-Flash"
        endpoint: siliconflow
        max_context: 128000
      fallback:
        # 先尝试同一个 SiliconFlow 内的 DeepSeek Pro，再跨 provider 切 OpenRouter。
        - model: "deepseek-ai/DeepSeek-V4-Pro"
          endpoint: siliconflow
          max_context: 128000
        - model: "openrouter/openai/gpt-4o-mini"
          endpoint: openrouter_main
          max_context: 128000

# 上下文截断配置。
truncation:
  # 当消息累计接近 max_context 的 80% 时开始截断。
  # 数值越小，越保守，越不容易触发 provider 侧超长报错。
  trigger_ratio: 0.8

  # 截断后的目标占用比例。
  # 截断后会尽量回落到这个比例附近，而不是只删一小段。
  target_ratio: 0.6

  # 是否始终保留 system prompt。
  keep_system: true

  # 截断时至少保留最近 N 轮对话。
  # N 太小会损伤上下文连续性；N 太大则容易继续爆上下文。
  keep_recent_turns: 10

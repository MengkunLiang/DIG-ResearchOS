# ResearchOS LLM 路由配置
#
# 这份文件只负责回答两个问题：
# 1. 某个 task / agent 选中了 heavy|medium|light 之后，对应具体用哪个模型？
# 2. 这个模型最终通过哪个 endpoint / provider 发出去？
#
# 使用顺序：
# - Agent 先声明自己的 model_tier（例如 Hello=medium, Ideation=heavy）
# - 如果 state_machine.yaml 里给某个 task 配了 llm.profile，则优先使用该 profile
# - 否则回退到 agent 自己的 llm_profile
# - 再否则回退到本文件的 default_profile
#
# 建议：
# - 想“按任务切 provider”，优先改 state_machine.yaml 的 llm.profile
# - 想“给一组任务共用一套模型策略”，就在这里新增一个 profile

# 默认 profile。
# 保守策略：继续保持当前默认链路为 SiliconFlow，避免影响已有运行方式。
default_profile: default

# API 端点配置。
# 每个 endpoint 都可以有自己独立的 provider / API key / base URL。
endpoints:
  siliconflow:
    # SiliconFlow 走 OpenAI-compatible 协议，因此 provider 仍是 openai。
    provider: openai
    api_key_env: SILICONFLOW_API_KEY
    api_base_env: SILICONFLOW_BASE_URL

  openrouter_main:
    # OpenRouter 在 LiteLLM 中有独立 provider。
    provider: openrouter
    api_key_env: OPENROUTER_API_KEY

  # 如需启用 OpenAI 官方接口，可取消下面注释并在 .env 中提供变量：
  #
  # openai_official:
  #   provider: openai
  #   api_key_env: OPENAI_API_KEY
  #   api_base_env: OPENAI_BASE_URL

  # 如需启用 Anthropic 官方接口，可取消下面注释并在 .env 中提供变量：
  #
  # anthropic_main:
  #   provider: anthropic
  #   api_key_env: ANTHROPIC_API_KEY

# 路由配置。
# profile = 一套路由策略；
# heavy / medium / light = agent 选中的负载档位；
# endpoint = 最终走哪个 provider。
profiles:
  # 默认 profile：保持你当前的 SiliconFlow 行为不变。
  # 如果你什么都不配，所有未覆盖的 task 都会走这里。
  default:
    heavy:
      primary:
        # OpenAI-compatible 的原始模型名可以保留，不必手工写 openai/ 前缀。
        model: "Pro/deepseek-ai/DeepSeek-V3.2"
        endpoint: siliconflow
        max_context: 128000

    medium:
      primary:
        model: "Pro/deepseek-ai/DeepSeek-V3.2"
        endpoint: siliconflow
        max_context: 128000

    light:
      primary:
        model: "Pro/deepseek-ai/DeepSeek-V3.2"
        endpoint: siliconflow
        max_context: 128000

  # 显式的 SiliconFlow-only profile。
  # 适合在 state_machine 里直接写 llm.profile: siliconflow_only，
  # 这样即便以后 default_profile 改了，这些 task 也不会漂移。
  siliconflow_only:
    heavy:
      primary:
        model: "Pro/deepseek-ai/DeepSeek-V3.2"
        endpoint: siliconflow
        max_context: 128000

    medium:
      primary:
        model: "Pro/deepseek-ai/DeepSeek-V3.2"
        endpoint: siliconflow
        max_context: 128000

    light:
      primary:
        model: "Pro/zai-org/GLM-4.7"
        endpoint: siliconflow
        max_context: 128000

  # OpenRouter 快速 profile。
  # 说明：
  # - openrouter 作为 provider 时，模型名建议写成
  #   openrouter/<upstream-provider>/<model-name>
  # - 比如 openrouter/openai/gpt-4o-mini
  openrouter_fast:
    heavy:
      primary:
        model: "openrouter/openai/gpt-4o"
        endpoint: openrouter_main
        max_context: 128000

    medium:
      primary:
        model: "openrouter/openai/gpt-4o-mini"
        endpoint: openrouter_main
        max_context: 128000

    light:
      primary:
        model: "openrouter/openai/gpt-4.1-mini"
        endpoint: openrouter_main
        max_context: 128000

  # 混合 profile。
  # 典型用法：
  # - heavy 任务走 SiliconFlow 的 DeepSeek
  # - medium / light 任务走 OpenRouter
  mixed:
    heavy:
      primary:
        model: "Pro/deepseek-ai/DeepSeek-V3.2"
        endpoint: siliconflow
        max_context: 128000
      fallback:
        - model: "openrouter/openai/gpt-4o"
          endpoint: openrouter_main
          max_context: 128000

    medium:
      primary:
        model: "openrouter/openai/gpt-4o-mini"
        endpoint: openrouter_main
        max_context: 128000
      fallback:
        - model: "Pro/deepseek-ai/DeepSeek-V3.2"
          endpoint: siliconflow
          max_context: 128000

    light:
      primary:
        model: "openrouter/openai/gpt-4.1-mini"
        endpoint: openrouter_main
        max_context: 128000

  # 示例：按任务单独选 profile 时可以这么命名。
  # - HELLO 之类的小任务：hello_fast
  # - T4 假设生成：ideation_deep
  # - T4.5 审计任务：audit_safe
  hello_fast:
    medium:
      primary:
        model: "openrouter/openai/gpt-4o-mini"
        endpoint: openrouter_main
        max_context: 128000

  ideation_deep:
    heavy:
      primary:
        model: "Pro/deepseek-ai/DeepSeek-V3.2"
        endpoint: siliconflow
        max_context: 128000
      fallback:
        - model: "openrouter/openai/gpt-4o"
          endpoint: openrouter_main
          max_context: 128000

  audit_safe:
    heavy:
      primary:
        model: "openrouter/openai/gpt-4o"
        endpoint: openrouter_main
        max_context: 128000

# 上下文截断配置。
truncation:
  # 当消息累计接近 max_context 的 80% 时开始截断。
  trigger_ratio: 0.8

  # 截断后的目标占用比例。
  target_ratio: 0.6

  # 是否始终保留 system prompt。
  keep_system: true

  # 截断时至少保留最近 N 轮对话。
  keep_recent_turns: 10

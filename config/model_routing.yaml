# ResearchOS LLM 路由配置
#
# 这份文件只负责回答两个问题：
# 1. 某个 task / agent 最终要走哪个 endpoint？
# 2. 这个 endpoint 背后对应哪个 provider / API key / base URL？
#
# 使用顺序：
# - Agent 可以直接在 config/agent_params.yaml 里声明 llm.model + llm.endpoint
# - 如果 state_machine.yaml 里给某个 task 配了 llm.model / llm.endpoint，会再覆盖 Agent 默认值
# - 如果没有显式 model + endpoint，才回退到 Agent 的 model_tier（例如 Hello=medium, Ideation=heavy）
# - 如果 state_machine.yaml 里给某个 task 配了 llm.profile，则优先使用该 profile
# - 否则回退到 agent 自己的 llm_profile
# - 再否则回退到本文件的 default_profile
#
# 建议：
# - 想“按 Agent 固定模型/provider”，优先改 config/agent_params.yaml
# - 想“按 task 临时切 provider”，优先改 state_machine.yaml 的 llm.model / llm.endpoint 或 llm.profile
# - 想“给一组任务共用一套模型策略”，就在这里新增一个 profile

# ========================================
# API 密钥配置（可选）
# 可以在这里直接配置 API key，也可以通过环境变量引用
# 优先级：api_key > api_key_env
# 实际使用时更推荐把密钥放在项目根目录 `.env` 中
# ========================================
api_keys:
  # SiliconFlow API Key（示例占位；留空表示完全走 `.env`）
  SILICONFLOW_API_KEY: ""
  SILICONFLOW_BASE_URL: "https://api.siliconflow.cn/v1"

  # OpenRouter API Key（直接配置）
  OPENROUTER_API_KEY: ""

  # OpenAI API Key（直接配置）
  OPENAI_API_KEY: ""
  OPENAI_BASE_URL: "https://api.openai.com/v1"

  # Anthropic API Key（直接配置）
  ANTHROPIC_API_KEY: ""

# 默认 profile。
# 保守策略：继续保持当前默认链路为 SiliconFlow，避免影响已有运行方式。
default_profile: default

# API 端点配置。
# 每个 endpoint 都可以有自己独立的 provider / API key / base URL。
# agent_params.yaml 里的 llm.endpoint 引用的就是这里的名字。
# 支持两种配置方式：
#   1. api_key_env: 从环境变量读取（如 "SILICONFLOW_API_KEY"）
#   2. api_key: 直接在这里配置（见上方 api_keys 配置）
endpoints:
  siliconflow:
    # SiliconFlow 走 OpenAI-compatible 协议，因此 provider 仍是 openai。
    provider: openai
    api_key_env: SILICONFLOW_API_KEY
    api_base_env: SILICONFLOW_BASE_URL

  openrouter_main:
    # OpenRouter 在 LiteLLM 中有独立 provider。
    provider: openrouter
    api_key_env: OPENROUTER_API_KEY

  # 如需启用 OpenAI 官方接口，可取消下面注释：
  openai_official:
    provider: openai
    api_key_env: OPENAI_API_KEY
    api_base_env: OPENAI_BASE_URL

  # 如需启用 Anthropic 官方接口，可取消下面注释：
  anthropic_main:
    provider: anthropic
    api_key_env: ANTHROPIC_API_KEY

# 路由配置。
# profile = 一套路由策略；
# heavy / medium / light = agent 选中的负载档位；
# endpoint = 最终走哪个 provider。
profiles:
  # 默认 profile：保持你当前的 SiliconFlow 行为不变。
  # 如果你什么都不配，所有未覆盖的 task 都会走这里。
  default:
    heavy:
      primary:
        # OpenAI-compatible 的原始模型名可以保留，不必手工写 openai/ 前缀。
        model: "Pro/deepseek-ai/DeepSeek-V3.2"
        endpoint: siliconflow
        max_context: 128000

    medium:
      primary:
        model: "Pro/deepseek-ai/DeepSeek-V3.2"
        endpoint: siliconflow
        max_context: 128000

    light:
      primary:
        model: "Pro/deepseek-ai/DeepSeek-V3.2"
        endpoint: siliconflow
        max_context: 128000

  # 显式的 SiliconFlow-only profile。
  # 适合在 state_machine 里直接写 llm.profile: siliconflow_only，
  # 这样即便以后 default_profile 改了，这些 task 也不会漂移。
  siliconflow_only:
    heavy:
      primary:
        model: "Pro/deepseek-ai/DeepSeek-V3.2"
        endpoint: siliconflow
        max_context: 128000

    medium:
      primary:
        model: "Pro/deepseek-ai/DeepSeek-V3.2"
        endpoint: siliconflow
        max_context: 128000

    light:
      primary:
        model: "Pro/zai-org/GLM-4.7"
        endpoint: siliconflow
        max_context: 128000

  # OpenRouter 快速 profile。
  # 说明：
  # - openrouter 作为 provider 时，模型名建议写成
  #   openrouter/<upstream-provider>/<model-name>
  # - 比如 openrouter/openai/gpt-4o-mini
  openrouter_fast:
    heavy:
      primary:
        model: "openrouter/openai/gpt-4o"
        endpoint: openrouter_main
        max_context: 128000

    medium:
      primary:
        model: "openrouter/openai/gpt-4o-mini"
        endpoint: openrouter_main
        max_context: 128000

    light:
      primary:
        model: "openrouter/openai/gpt-4.1-mini"
        endpoint: openrouter_main
        max_context: 128000

  # 混合 profile。
  # 典型用法：
  # - heavy 任务走 SiliconFlow 的 DeepSeek
  # - medium / light 任务走 OpenRouter
  mixed:
    heavy:
      primary:
        model: "Pro/deepseek-ai/DeepSeek-V3.2"
        endpoint: siliconflow
        max_context: 128000
      fallback:
        - model: "openrouter/openai/gpt-4o"
          endpoint: openrouter_main
          max_context: 128000

    medium:
      primary:
        model: "openrouter/openai/gpt-4o-mini"
        endpoint: openrouter_main
        max_context: 128000
      fallback:
        - model: "Pro/deepseek-ai/DeepSeek-V3.2"
          endpoint: siliconflow
          max_context: 128000

    light:
      primary:
        model: "openrouter/openai/gpt-4.1-mini"
        endpoint: openrouter_main
        max_context: 128000

  # 示例：按任务单独选 profile 时可以这么命名。
  # - HELLO 之类的小任务：hello_fast
  # - T4 假设生成：ideation_deep
  # - T4.5 审计任务：audit_safe
  hello_fast:
    medium:
      primary:
        model: "openrouter/openai/gpt-4o-mini"
        endpoint: openrouter_main
        max_context: 128000

  ideation_deep:
    heavy:
      primary:
        model: "Pro/deepseek-ai/DeepSeek-V3.2"
        endpoint: siliconflow
        max_context: 128000
      fallback:
        - model: "openrouter/openai/gpt-4o"
          endpoint: openrouter_main
          max_context: 128000

  audit_safe:
    heavy:
      primary:
        model: "openrouter/openai/gpt-4o"
        endpoint: openrouter_main
        max_context: 128000

  # T2 Scout 专用：保留当前 SiliconFlow 首选链路，但在 provider 超时/抖动时
  # 自动切到 OpenRouter，避免单次 run 因单一 endpoint 卡死。
  scout_resilient:
    medium:
      primary:
        model: "Pro/deepseek-ai/DeepSeek-V3.2"
        endpoint: siliconflow
        max_context: 128000
      fallback:
        - model: "openrouter/openai/gpt-4o-mini"
          endpoint: openrouter_main
          max_context: 128000

# 上下文截断配置。
truncation:
  # 当消息累计接近 max_context 的 80% 时开始截断。
  trigger_ratio: 0.8

  # 截断后的目标占用比例。
  target_ratio: 0.6

  # 是否始终保留 system prompt。
  keep_system: true

  # 截断时至少保留最近 N 轮对话。
  keep_recent_turns: 10

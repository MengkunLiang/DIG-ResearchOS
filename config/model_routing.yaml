default_profile: default

endpoints:
  relay:
    provider: openai
    api_key_env: UIUIAPI_API_KEY
    api_base_env: UIUIAPI_BASE_URL

profiles:
  default:
    heavy:
      primary:
        model: "gpt-3.5-turbo"
        endpoint: relay
        max_context: 128000
    medium:
      primary:
        model: "gpt-3.5-turbo"
        endpoint: relay
        max_context: 128000
    light:
      primary:
        model: "gpt-3.5-turbo"
        endpoint: relay
        max_context: 128000

truncation:
  trigger_ratio: 0.8
  target_ratio: 0.6
  keep_system: true
  keep_recent_turns: 10

# 默认状态机保持“可立即跑通”的 demo 模式。
# 正式 T1-T9 workflow 还未全部落地前，不再借用正式 task id 伪装成 T1，
# 避免与 task_io_contract / validator 产生冲突。
initial_state: HELLO

states:
  HELLO:
    agent: hello
    outputs:
      hello_file: hello.txt
    next_on_success: done
    next_on_failure: failed

  done:
    terminal: true

  failed:
    terminal: true

# ResearchOS State Machine Configuration
#
# 当前支持两种workflow：
# 1. HELLO - 调试用的简单workflow
# 2. T1-T4 - 研究前期完整workflow（项目初始化 → 文献检索 → 深度阅读 → 文献综合 → 假设生成）
#
# 使用方式：
# - 调试：initial_state: HELLO
# - 完整流程：initial_state: T1

initial_state: HELLO

states:
  # ========================================
  # 调试workflow
  # ========================================
  HELLO:
    agent: hello
    outputs:
      hello_file: hello.txt
    next_on_success: done
    next_on_failure: failed

  # ========================================
  # T1-T4 完整workflow
  # ========================================
  T1:
    agent: pi
    mode: init
    outputs:
      project: project.yaml
      state: state.yaml
    next_on_success: T2
    next_on_failure: failed

  T2:
    agent: scout
    inputs:
      project: project.yaml
    outputs:
      papers_raw: literature/papers_raw.jsonl
      papers_dedup: literature/papers_dedup.jsonl
      search_log: literature/search_log.md
      missing_areas: literature/missing_areas.md
    next_on_success: T3
    next_on_failure: failed

  T3:
    agent: reader
    mode: read
    inputs:
      project: project.yaml
      papers_dedup: literature/papers_dedup.jsonl
      missing_areas: literature/missing_areas.md
    outputs:
      paper_notes_dir: literature/paper_notes
      comparison_table: literature/comparison_table.csv
      related_work_bib: literature/related_work.bib
    next_on_success: T3.5
    next_on_failure: failed

  T3.5:
    agent: reader
    mode: synthesize
    inputs:
      project: project.yaml
      paper_notes_dir: literature/paper_notes
      comparison_table: literature/comparison_table.csv
      missing_areas: literature/missing_areas.md
    outputs:
      synthesis: literature/synthesis.md
    next_on_success: T4
    next_on_failure: failed

  T4:
    agent: ideation
    inputs:
      project: project.yaml
      synthesis: literature/synthesis.md
      comparison_table: literature/comparison_table.csv
      missing_areas: literature/missing_areas.md
    outputs:
      hypotheses: ideation/hypotheses.md
      exp_plan: ideation/exp_plan.yaml
      risks: ideation/risks.md
    next_on_success: T4.5
    next_on_failure: failed

  T4.5:
    agent: novelty_auditor
    inputs:
      project: project.yaml
      hypotheses: ideation/hypotheses.md
      synthesis: literature/synthesis.md
      comparison_table: literature/comparison_table.csv
    outputs:
      novelty_audit: ideation/novelty_audit.md
    next_on_success: T6
    next_on_failure: failed

  T6:
    agent: experimenter
    inputs:
      project: project.yaml
      exp_plan: ideation/exp_plan.yaml
      hypotheses: ideation/hypotheses.md
    outputs:
      results_summary: experiments/results_summary.json
      iteration_log: experiments/iteration_log.md
    next_on_success: done
    next_on_failure: failed

  # ========================================
  # 终止状态
  # ========================================
  done:
    terminal: true

  failed:
    terminal: true

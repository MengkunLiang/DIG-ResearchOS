# ResearchOS State Machine 配置文件
# 定义 ResearchOS 的工作流状态机，控制 Agent 的执行顺序和数据流
#
# 配置结构：
# initial_state: <state_name>    # 初始状态（工作流入口）
# states:                        # 状态定义
#   <state_name>:
#     agent: <agent_name>        # 使用的 Agent
#     mode: <mode>               # Agent 模式（可选）
#     llm:                       # LLM 覆盖（可选）
#       profile: <profile_name>  # 给当前 task 单独指定 profile
#       tier: <tier_name>        # 临时覆盖为 heavy / medium / light
#       model: <model_name>      # 临时强制指定模型
#       temperature: <float>     # 临时覆盖温度
#     inputs:                    # 输入文件映射
#       <key>: <file_path>
#     outputs:                   # 输出文件映射
#       <key>: <file_path>
#     next_on_success: <state>   # 成功后的下一状态
#     next_on_failure: <state>   # 失败后的下一状态
#     terminal: true             # 是否为终止状态（可选）
#
# 当前支持的工作流：
# 1. HELLO - 调试用的简单 workflow
# 2. T1-T4 - 研究前期完整 workflow（项目初始化 → 文献检索 → 深度阅读 → 文献综合 → 假设生成）
#
# 使用方式：
# - 调试：initial_state: HELLO
# - 完整流程：initial_state: T1

# 初始状态配置
# 可选值：HELLO（调试）, T1（完整研究流程）
initial_state: HELLO

states:
  # ========================================
  # 调试 Workflow
  # ========================================

  # HELLO 状态：简单的 Hello World 测试
  # 用途：验证 Runtime 基本功能
  # Agent：hello（输出简单的问候消息）
  HELLO:
    agent: hello
    # llm:
    #   profile: hello_fast
    outputs:
      hello_file: hello.txt      # 输出文件：问候消息
    next_on_success: done        # 成功后进入 done 状态
    next_on_failure: failed      # 失败后进入 failed 状态

  # ========================================
  # T1-T4 完整研究 Workflow
  # ========================================

  # T1 状态：项目初始化（Project Initialization）
  # 用途：创建研究项目，定义研究问题和目标
  # Agent：pi（Project Initializer）
  # 模式：init
  T1:
    agent: pi
    mode: init
    outputs:
      project: project.yaml      # 项目配置文件
      state: state.yaml          # 项目状态文件
    next_on_success: T2
    next_on_failure: failed

  # T2 状态：文献检索（Literature Scouting）
  # 用途：搜索相关文献，构建初步文献库
  # Agent：scout（文献侦察员）
  T2:
    agent: scout
    inputs:
      project: project.yaml                            # 项目配置
      seed_papers: user_seeds/seed_papers.jsonl        # 种子论文（可选）
      seed_constraints: user_seeds/seed_constraints.md # 种子约束（可选）
      seed_ideas: user_seeds/seed_ideas.md             # 种子想法（可选）
    outputs:
      papers_raw: literature/papers_raw.jsonl           # 原始检索结果
      papers_dedup: literature/papers_dedup.jsonl      # 去重后的论文列表
      search_log: literature/search_log.md             # 检索日志
      missing_areas: literature/missing_areas.md       # 识别的研究空白
    next_on_success: T3
    next_on_failure: failed

  # T3 状态：深度阅读（Deep Reading）
  # 用途：深度阅读文献，提取关键信息
  # Agent：reader（文献阅读器）
  # 模式：read
  T3:
    agent: reader
    mode: read
    inputs:
      project: project.yaml                             # 输入：项目配置
      papers_dedup: literature/papers_dedup.jsonl       # 输入：去重论文列表
      missing_areas: literature/missing_areas.md        # 输入：研究空白
    outputs:
      paper_notes_dir: literature/paper_notes           # 论文笔记目录
      comparison_table: literature/comparison_table.csv # 方法对比表
      related_work_bib: literature/related_work.bib     # 相关工作引用
    next_on_success: T3.5
    next_on_failure: failed

  # T3.5 状态：文献综合（Literature Synthesis）
  # 用途：综合文献信息，形成系统性理解
  # Agent：reader（文献阅读器）
  # 模式：synthesize
  T3.5:
    agent: reader
    mode: synthesize
    inputs:
      project: project.yaml                             # 输入：项目配置
      paper_notes_dir: literature/paper_notes           # 输入：论文笔记
      comparison_table: literature/comparison_table.csv # 输入：对比表
      missing_areas: literature/missing_areas.md        # 输入：研究空白
    outputs:
      synthesis: literature/synthesis.md                # 文献综述
    next_on_success: T4
    next_on_failure: failed

  # T4 状态：假设生成（Hypothesis Generation）
  # 用途：基于文献综述生成研究假设和实验计划
  # Agent：ideation（创意生成器）
  T4:
    agent: ideation
    # llm:
    #   profile: ideation_deep
    inputs:
      project: project.yaml                             # 项目配置
      synthesis: literature/synthesis.md               # 文献综述
      comparison_table: literature/comparison_table.csv # 方法对比表
      missing_areas: literature/missing_areas.md       # 研究空白
      seed_ideas: user_seeds/seed_ideas.md            # 种子想法（可选）
      seed_constraints: user_seeds/seed_constraints.md # 种子约束（可选）
    outputs:
      hypotheses: ideation/hypotheses.md                # 研究假设
      exp_plan: ideation/exp_plan.yaml                 # 实验计划
      risks: ideation/risks.md                        # 风险评估
    next_on_success: T4.5
    next_on_failure: T4  # 允许失败后重试

  # T4.5 状态：新颖性审计（Novelty Auditing）
  # 用途：评估研究假设的新颖性和可行性
  # Agent：novelty_auditor（新颖性审计员）
  T4.5:
    agent: novelty_auditor
    inputs:
      project: project.yaml                             # 输入：项目配置
      hypotheses: ideation/hypotheses.md                # 输入：研究假设
      synthesis: literature/synthesis.md                # 输入：文献综述
      comparison_table: literature/comparison_table.csv # 输入：对比表
    outputs:
      novelty_audit: ideation/novelty_audit.md          # 新颖性审计报告
    next_on_success: T5
    next_on_failure: failed

  # T5 状态：试点实验（Pilot Experimentation）
  # 用途：执行小规模试点实验，验证假设可行性
  # Agent：experimenter（实验执行器）
  # 模式：pilot（试点模式）
  T5:
    agent: experimenter
    mode: pilot
    inputs:
      project: project.yaml                             # 项目配置
      hypotheses: ideation/hypotheses.md               # 研究假设
      exp_plan: ideation/exp_plan.yaml                 # 实验计划
      risks: ideation/risks.md                       # 风险评估
    outputs:
      pilot_plan: pilot/pilot_plan.yaml              # 试点计划
      pilot_code: pilot/pilot_code                    # 试点代码
      pilot_results: pilot/pilot_results.json        # 试点实验结果
      motivation_validation: pilot/motivation_validation.md  # 动机验证报告
    next_on_success: T6
    next_on_failure: T4

  # T6 状态：新颖性最终验证（Novelty Final Verification）
  # 用途：基于 Pilot 结果验证新颖性，补充必须的基线方法
  # Agent：novelty（新颖性验证）
  T6:
    agent: novelty
    inputs:
      hypotheses: ideation/hypotheses.md               # 研究假设
      exp_plan: ideation/exp_plan.yaml               # 实验计划
      pilot_results: pilot/pilot_results.json       # 试点结果
      motivation_validation: pilot/motivation_validation.md  # 动机验证
      comparison_table: literature/comparison_table.csv # 方法对比表
    outputs:
      novelty_report: novelty/novelty_report.md        # 新颖性报告
      collision_cases: novelty/collision_cases.md     # 潜在撞车案例（如有）
      must_add_baselines: novelty/must_add_baselines.md # 必须补充的基线方法
    gate:
      type: novelty_gate
      prompt: |
        新颖性评估完成。判定：{verdict}

        - PASS: 继续完整实验
        - REVISE: 需要修改假设（建议方案见 novelty_report.md）
        - FAIL: 新颖性不足，需要重新构思

        是否继续？
    next_on_success: T7
    next_on_failure: T4

  # T7 状态：完整实验（Full Experimentation）
  # 用途：执行完整的实验计划，收集全面结果
  # Agent：experimenter（实验执行器）
  # 模式：full（完整模式）
  T7:
    agent: experimenter
    mode: full
    inputs:
      project: project.yaml                           # 项目配置
      exp_plan: ideation/exp_plan.yaml               # 实验计划
      pilot_code: pilot/pilot_code                   # 试点代码
      novelty_report: novelty/novelty_report.md      # 新颖性报告
      must_add_baselines: novelty/must_add_baselines.md # 必须补充的基线
    outputs:
      results_summary: experiments/results_summary.json # 结果摘要
      runs_dir: experiments/runs                       # 运行结果目录
      configs_dir: experiments/configs                  # 配置目录
      iteration_log: experiments/iteration_log.md     # 迭代日志
      ablations: experiments/ablations.csv            # 消融实验结果
    next_on_success: T8-WRITE
    next_on_failure: failed

  # T8-WRITE 状态：论文写作（Paper Writing）
  # 用途：生成论文大纲、初稿、修订
  # Agent：writer（论文写作）
  T8-WRITE:
    agent: writer
    mode: outline  # 先生成大纲
    inputs:
      project: project.yaml                             # 输入：项目配置
      results_summary: experiments/results_summary.json # 输入：实验结果
      synthesis: literature/synthesis.md                # 输入：文献综述
      related_work: literature/related_work.bib         # 输入：引用库
      hypotheses: ideation/hypotheses.md                # 输入：研究假设
    outputs:
      outline: drafts/outline.md                       # 论文大纲
    next_on_success: T8-DRAFT
    next_on_failure: failed

  # T8-DRAFT 状态：论文初稿（Paper Draft）
  # 用途：基于大纲生成完整论文
  # Agent：writer（论文写作）
  T8-DRAFT:
    agent: writer
    mode: draft
    inputs:
      project: project.yaml                             # 输入：项目配置
      results_summary: experiments/results_summary.json # 输入：实验结果
      outline: drafts/outline.md                        # 输入：论文大纲
    outputs:
      paper: drafts/paper.tex                           # 论文草稿
    next_on_success: T8-REVIEW-1
    next_on_failure: failed

  # T8-REVIEW-1 状态：论文审稿第1轮（Paper Review Round 1）
  # 用途：审稿人审查论文并提出改进建议
  # Agent：reviewer（论文审稿）
  T8-REVIEW-1:
    agent: reviewer
    round: 1
    inputs:
      project: project.yaml                             # 输入：项目配置
      paper: drafts/paper.tex                           # 输入：论文草稿
      results_summary: experiments/results_summary.json # 输入：实验结果
    outputs:
      review_report: drafts/review_rounds/round_1.md   # 审稿报告
    next_on_success: T8-REVISE-1
    next_on_failure: failed

  # T8-REVISE-1 状态：论文修订第1轮（Paper Revision Round 1）
  # 用途：根据审稿意见修订论文
  # Agent：writer（论文写作）
  T8-REVISE-1:
    agent: writer
    mode: revise
    round: 1
    inputs:
      project: project.yaml                             # 输入：项目配置
      paper: drafts/paper.tex                           # 输入：论文草稿
      review_report: drafts/review_rounds/round_1.md   # 输入：审稿报告
    outputs:
      paper: drafts/paper.tex                           # 修订后的论文
    next_on_success: T8-REVIEW-2
    next_on_failure: failed

  # T8-REVIEW-2 状态：论文审稿第2轮（Paper Review Round 2）
  # 用途：审稿人审查修订后的论文
  # Agent：reviewer（论文审稿）
  T8-REVIEW-2:
    agent: reviewer
    round: 2
    inputs:
      project: project.yaml                             # 输入：项目配置
      paper: drafts/paper.tex                           # 输入：修订后的论文
    outputs:
      review_report: drafts/review_rounds/round_2.md   # 审稿报告
    next_on_success: T8-REVISE-2
    next_on_failure: T9

  # T8-REVISE-2 状态：论文修订第2轮（Paper Revision Round 2）
  # 用途：根据第2轮审稿意见修订论文
  # Agent：writer（论文写作）
  T8-REVISE-2:
    agent: writer
    mode: revise
    round: 2
    inputs:
      project: project.yaml                             # 输入：项目配置
      paper: drafts/paper.tex                           # 输入：论文草稿
      review_report: drafts/review_rounds/round_2.md   # 输入：审稿报告
    outputs:
      paper: drafts/paper.tex                           # 修订后的论文
    next_on_success: T9
    next_on_failure: T9

  # T9 状态：投稿准备（Submission Preparation）
  # 用途：将论文迁移到目标会议格式，匿名化检查，编译验证
  # Agent：submission（投稿准备）
  T9:
    agent: submission
    inputs:
      paper: drafts/paper.tex                         # 论文草稿
      related_work_bib: literature/related_work.bib    # 引用库
    outputs:
      bundle_dir: submission/bundle                  # 投稿包目录
      migration_report: submission/migration_report.md  # 迁移报告
    gate:
      type: submission_gate
      prompt: |
        投稿包准备完成。请审核：
        - migration_report.md 中的迁移详情
        - submission/bundle/ 中的文件
        - 匿名化检查结果

        确认无误后，工作流结束。确认继续吗？
    next_on_success: done
    next_on_failure: T8-WRITE  # 允许返回修改论文

  # ========================================
  # 终止状态
  # ========================================

  # done 状态：成功完成
  # 工作流正常结束
  done:
    terminal: true

  # failed 状态：失败终止
  # 工作流因错误而终止
  failed:
    terminal: true

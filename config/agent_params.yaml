# ResearchOS Agent Capability Registry
#
# 日常参数不要改这里。请改 config/user_settings.yaml。
#
# 本文件只保留 agent 能力声明：
# - tools: 可用工具与 workspace 读写权限
# - prompt: prompt 模板、structured_outputs、expected_outputs
# - behavior: 与 agent 绑定的机械行为开关
# - modes: 阶段说明与 mode 专属 prompt/behavior/tools
#
# LLM profile/tier/model/temperature/max_context、预算、timeout、retry、budget escalation
# 的日常配置统一由 config/user_settings.yaml 提供，并在运行时 overlay 到这里。

agents:
  hello:
    tools:
      allowed_read_prefixes:
      - ''
      tool_names:
      - echo
      - write_file
      - read_file
      - finish_task
      allowed_write_prefixes:
      - ''
    prompt:
      prompt_template: hello.j2
  pi:
    tools:
      allowed_read_prefixes:
      - ''
      - literature/
      - user_seeds/
      - experiments/
      - ideation/
      - evaluation/
      tool_names:
      - read_file
      - write_file
      - write_structured_file
      - list_files
      - inspect_user_seeds
      - analyze_idea_concentration
      - compute_idea_novelty_signal
      - ask_human
      - finish_task
      - process_seed_paper
      allowed_write_prefixes:
      - ''
      - literature/
      - user_seeds/
      - evaluation/
    prompt:
      prompt_template: pi.j2
      structured_outputs:
        project.yaml: project
        literature/bridge_domain_plan.json: bridge_domain_plan
    modes:
      init:
        description: 项目初始化
        expected_rounds: 3
      evaluate:
        description: 结果评估
        expected_rounds: 2
  scout:
    tools:
      allowed_read_prefixes:
      - ''
      - literature/
      - user_seeds/
      - seeds/
      - _runtime/resume/
      tool_names:
      - read_file
      - write_file
      - write_structured_file
      - ask_human
      - inspect_user_seeds
      - append_papers_raw
      - process_papers_raw
      - save_papers_raw
      - save_papers_dedup
      - multi_source_search
      - search_papers
      - fetch_paper_metadata
      - finish_task
      - deduplicate_papers
      - score_papers
      - expand_queries
      - filter_by_domain
      - generate_search_log
      - enrich_papers
      - backfill_paper_abstracts
      - apply_semantic_screening
      - detect_duplicate_queries
      - analyze_dedup_rate
      - build_verified_papers
      - build_access_audit
      - build_deep_read_queue
      - fetch_outgoing_citations
      - build_domain_map
      - semantic_scholar_search
      - semantic_scholar_get_paper
      - arxiv_search
      - openalex_search
      - openalex_get_work
      - crossref_search
      - crossref_get_work
      - elsevier_scopus_search
      - informs_search
      - log_scout_progress
      allowed_write_prefixes:
      - literature/
    prompt:
      prompt_template: scout.j2
      structured_outputs:
        literature/papers_dedup.jsonl: papers_dedup
        literature/papers_verified.jsonl: papers_verified
        literature/papers_raw.jsonl: papers_raw
      expected_outputs:
        papers_raw_min: 30
        papers_dedup_min: 15
        papers_dedup_max: 120
  reader:
    tools:
      allowed_read_prefixes:
      - ''
      - literature/
      - user_seeds/
      - _runtime/resume/
      tool_names:
      - read_file
      - write_file
      - append_file
      - list_files
      - lookup_paper_record
      - fetch_paper_pdf
      - extract_paper_sections
      - extract_pdf_text
      - save_paper_note
      - build_synthesis_workbench
      - finish_task
      allowed_write_prefixes:
      - literature/
    prompt:
      prompt_template: reader.j2
    modes:
      read:
        prompt:
          expected_outputs:
            paper_notes_min: 10
            comparison_table_required: true
            related_work_bib_required: true
        behavior:
          abstract_sweep:
            enabled: true
            lite_paper_num: 40
            min_relevance: 0.4
            sources:
            - papers_verified
            - papers_dedup
            exclude_already_read: true
        description: 深度阅读
        expected_notes_ratio: 0.8
        deep_read_min: 18
        deep_read_target: 24
        deep_read_max: 30
        probe_pool: 45
      synthesize:
        prompt:
          expected_length_min: 1000
          expected_sections:
          - '## Method Families'
          - '## Shared Assumptions'
          - '## Contribution-Space Map'
          - '## Trends & Cross-Paper Contradictions'
          - '## Research Questions'
        behavior:
          prebuild_workbench_before_llm: true
        description: 文献综合
        expected_citations_min: 5
  ideation:
    tools:
      allowed_read_prefixes:
      - ''
      - literature/
      - user_seeds/
      - ideation/
      - _runtime/resume/
      tool_names:
      - read_file
      - write_file
      - write_structured_file
      - list_files
      - ask_human
      - finish_task
      allowed_write_prefixes:
      - ideation/
    prompt:
      prompt_template: ideation.j2
      structured_outputs:
        ideation/exp_plan.yaml: exp_plan
        ideation/idea_rationales.json: idea_rationales
        ideation/idea_scorecard.yaml: idea_scorecard
        ideation/gate_decisions.json: gate_decisions
      expected_outputs:
        hypothesis_count: 3
        risk_count: 3
    behavior:
      gates:
      - id: gate1
        description: 选择研究方向
        type: user_select
      - id: gate2
        description: 确认假设方案
        type: user_confirm
  novelty_auditor:
    tools:
      allowed_read_prefixes:
      - ''
      - ideation/
      - literature/
      tool_names:
      - read_file
      - write_file
      - list_files
      - search_papers
      - fetch_paper_metadata
      - extract_mechanism_tuple
      - compare_mechanism_tuples
      - finish_task
      allowed_write_prefixes:
      - ideation/
    prompt:
      prompt_template: novelty_auditor.j2
    behavior:
      novelty_levels:
      - Level 0
      - Level 1
      - Level 2
      - Level 3
  novelty:
    tools:
      allowed_read_prefixes:
      - ''
      - ideation/
      - literature/
      - pilot/
      - novelty/
      tool_names:
      - read_file
      - write_file
      - list_files
      - search_papers
      - ask_human
      - finish_task
      allowed_write_prefixes:
      - novelty/
    prompt:
      prompt_template: novelty.j2
  experimenter:
    tools:
      allowed_read_prefixes:
      - ''
      - ideation/
      - experiments/
      - pilot/
      - literature/
      - external_executor/
      - drafts/
      - novelty/
      - resources/
      tool_names:
      - read_file
      - write_file
      - write_structured_file
      - list_files
      - append_file
      - build_experiment_handoff_pack
      - select_external_executor
      - wait_for_external_executor_result
      - mock_external_dry_run
      - ingest_external_results
      - audit_experiment_integrity
      - build_post_experiment_novelty_check
      - map_results_to_claims
      - build_experiment_evidence_pack
      - finish_task
      allowed_write_prefixes:
      - experiments/
      - pilot/
      - external_executor/
      - drafts/
      - novelty/
    prompt:
      prompt_template: experimenter.j2
      structured_outputs:
        experiments/results_summary.json: results_summary
        pilot/pilot_results.json: pilot_results
        pilot/pilot_plan.yaml: pilot_plan
    modes:
      pilot:
        tools:
          tool_names:
          - read_file
          - write_file
          - write_structured_file
          - list_files
          - append_file
          - bash_run
          - docker_exec
          - finish_task
          allowed_read_prefixes:
          - ''
          - ideation/
          - experiments/
          - pilot/
          - literature/
          allowed_write_prefixes:
          - experiments/
          - pilot/
        prompt:
          expected_outputs:
            smoke_test_required: true
            motivation_validation_required: true
        behavior:
          gpu_required: true
          docker_required: true
        description: 试点实验
      full:
        tools:
          tool_names:
          - read_file
          - write_file
          - write_structured_file
          - list_files
          - append_file
          - bash_run
          - docker_exec
          - finish_task
          allowed_read_prefixes:
          - ''
          - ideation/
          - experiments/
          - pilot/
          - literature/
          - novelty/
          allowed_write_prefixes:
          - experiments/
          - pilot/
        prompt:
          expected_outputs:
            ablation_min: 3
            seed_ensemble_min: 3
            results_summary_required: true
        behavior:
          gpu_required: true
          docker_required: true
        description: 完整实验
      handoff:
        description: 编译外部执行器 handoff 包
        behavior:
          docker_required: false
          gpu_required: false
      executor_gate:
        description: 选择外部执行器并 patch handoff prompt
        behavior:
          docker_required: false
          gpu_required: false
      external_wait:
        description: 等待外部执行器 result_pack，resume 后确定性校验
        behavior:
          docker_required: false
          gpu_required: false
      dry_run:
        description: mock 外部执行器 dry-run
        behavior:
          docker_required: false
          gpu_required: false
      result_ingest:
        description: 摄取外部执行器结果
        behavior:
          docker_required: false
          gpu_required: false
      integrity_audit:
        description: 实验诚信审计
        behavior:
          docker_required: false
          gpu_required: false
      post_novelty:
        description: 实验后 novelty/collision 复核
        behavior:
          docker_required: false
          gpu_required: false
      result_to_claim:
        description: result-to-claim 与 evidence pack
        behavior:
          docker_required: false
          gpu_required: false
  writer:
    tools:
      allowed_read_prefixes:
      - ''
      - drafts/
      - literature/
      - experiments/
      - ideation/
      - novelty/
      - evaluation/
      - pilot/
      tool_names:
      - ask_human
      - read_file
      - write_file
      - list_files
      - build_manuscript_resource_index
      - plan_manuscript_sections
      - plan_manuscript_evidence
      - build_manuscript_registries
      - build_alignment_matrix
      - initialize_manuscript_state
      - update_manuscript_section_state
      - assemble_manuscript
      - audit_manuscript_claims
      - audit_writing_craft
      - audit_paper_claims
      - build_manuscript_revision_patches
      - finish_task
      allowed_write_prefixes:
      - drafts/
    prompt:
      prompt_template: writer.j2
      latex_required: true
    modes:
      style_gate:
        description: 确认 IS/CCF-A/both 写作风格
      resource_index:
        description: 构建写作资源索引和章节计划
      outline:
        description: 生成资源驱动大纲
      section_plan:
        description: 初始化逐章节写作状态和每章局部大纲
      section_drafts:
        description: 已废弃的旧批量分章节入口；只做兼容检查，不写正文
      section_draft:
        description: 单章节草稿
      draft:
        description: 拼装、spot-check 与机械审计
      self_check:
        description: 作者自查
      revise:
        description: 按 section patch 修订
      paper_claim_audit:
        description: T9 前最终 claim/evidence 审计
  survey_writer:
    tools:
      allowed_read_prefixes:
      - ''
      - literature/
      - drafts/survey/
      - ideation/
      - _runtime/resume/
      tool_names:
      - ask_human
      - read_file
      - write_file
      - list_files
      - expand_corpus_for_survey
      - build_survey_state
      - update_survey_section_state
      - assemble_survey
      - audit_survey_coverage
      - export_survey_for_ideation
      - latex_compile
      - finish_task
      allowed_write_prefixes:
      - drafts/survey/
      - ideation/
    prompt:
      prompt_template: survey_writer.j2
    modes:
      survey_gate:
        description: 询问是否撰写 taxonomy-driven survey
      survey_plan:
        description: 构建综述 taxonomy 与章节大纲
      outline_gate:
        description: 人工确认/调整 taxonomy 大纲
      corpus_gate:
        description: 人工选择保守/完整素材范围
      survey_expand:
        description: 生成一次性定向补检计划
      survey_state:
        description: 初始化 survey_state 与逐 section outline
      survey_section:
        description: 单个综述 section 写作
      survey_assemble:
        description: 拼装 survey.tex 并审计
      survey_review:
        description: 综述模式审阅与按 section 定向修订
      survey_compile:
        description: 编译 survey.tex 为 PDF
      survey_feed:
        description: 导出 T4 可消费的 survey insights
  reviewer:
    tools:
      allowed_read_prefixes:
      - ''
      - drafts/
      - literature/
      - experiments/
      tool_names:
      - read_file
      - list_files
      - write_file
      - finish_task
      allowed_write_prefixes:
      - drafts/review_rounds/
    prompt:
      prompt_template: reviewer.j2
      expected_length_min: 500
      expected_sections:
      - '## Overall Assessment'
      - '## Major Issues'
      - '## Minor Issues'
  submission:
    tools:
      allowed_read_prefixes:
      - ''
      - drafts/
      - literature/
      - experiments/
      tool_names:
      - read_file
      - write_file
      - list_files
      - bash_run
      - docker_exec
      - latex_compile
      - prepare_submission_bundle
      - finish_task
      allowed_write_prefixes:
      - submission/
    prompt:
      prompt_template: submission.j2
      expected_outputs:
        bundle_required: true
        anonymization_required: true
        compile_required: true
    behavior:
      docker_required: true
      max_compile_attempts: 10
      enforce_anonymization_precheck: false

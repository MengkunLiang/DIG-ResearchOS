# ResearchOS Agent Capability Registry
#
# 模型、预算、timeout 等日常运行参数不要改这里，请改 config/user_settings.yaml。
# T2/T3 文献流程机械阈值、工具权限、prompt/schema 能力声明在这里维护。
#
# 本文件只保留 agent 能力声明：
# - tools: 可用工具与 workspace 读写权限
# - prompt: prompt 模板、structured_outputs、expected_outputs
# - behavior: 与 agent 绑定的机械行为开关
# - modes: 阶段说明与 mode 专属 prompt/behavior/tools
#
# LLM profile/tier/model/temperature/max_context、预算、timeout、retry、budget escalation
# 的日常配置统一由 config/user_settings.yaml 提供，并在运行时 overlay 到这里。

agents:
  hello:
    tools:
      allowed_read_prefixes:
      - ''
      - _runtime/resume/
      tool_names:
      - echo
      - write_file
      - read_file
      - finish_task
      allowed_write_prefixes:
      - ''
    prompt:
      prompt_template: hello.j2
  pi:
    tools:
      allowed_read_prefixes:
      - ''
      - literature/
      - user_seeds/
      - experiments/
      - ideation/
      - evaluation/
      tool_names:
      - read_file
      - write_file
      - write_structured_file
      - list_files
      - inspect_user_seeds
      - normalize_seed_outline
      - analyze_idea_concentration
      - compute_idea_novelty_signal
      - ask_human
      - finish_task
      - process_seed_paper
      allowed_write_prefixes:
      - ''
      - literature/
      - user_seeds/
      - evaluation/
    prompt:
      prompt_template: pi.j2
      structured_outputs:
        project.yaml: project
        literature/bridge_domain_plan.json: bridge_domain_plan
    modes:
      init:
        description: 项目初始化
        expected_rounds: 3
      evaluate:
        description: 结果评估
        expected_rounds: 2
  scout:
    tools:
      allowed_read_prefixes:
      - ''
      - literature/
      - user_seeds/
      - seeds/
      - _runtime/resume/
      tool_names:
      - read_file
      - write_file
      - write_structured_file
      - ask_human
      - inspect_user_seeds
      - normalize_seed_outline
      - append_papers_raw
      - process_papers_raw
      - save_papers_raw
      - save_papers_dedup
      - multi_source_search
      - search_papers
      - fetch_paper_metadata
      - finish_task
      - deduplicate_papers
      - score_papers
      - expand_queries
      - filter_by_domain
      - generate_search_log
      - enrich_papers
      - backfill_paper_abstracts
      - apply_semantic_screening
      - detect_duplicate_queries
      - analyze_dedup_rate
      - build_verified_papers
      - build_access_audit
      - build_deep_read_queue
      - fetch_outgoing_citations
      - build_domain_map
      - semantic_scholar_search
      - semantic_scholar_get_paper
      - arxiv_search
      - openalex_search
      - openalex_get_work
      - crossref_search
      - crossref_get_work
      - elsevier_scopus_search
      - informs_search
      - log_scout_progress
      allowed_write_prefixes:
      - literature/
      - user_seeds/
    prompt:
      prompt_template: scout.j2
      structured_outputs:
        literature/papers_dedup.jsonl: papers_dedup
        literature/papers_verified.jsonl: papers_verified
        literature/papers_backlog.jsonl: papers_dedup
        literature/papers_raw.jsonl: papers_raw
      expected_outputs:
        papers_raw_min: 30
        papers_dedup_min: 15
    behavior:
      # T2 deterministic finalize 参数：
      # Scout LLM 负责 query/semantic_screen；runtime 用这里的阈值做去重、资源补全、
      # 保留候选/backlog 切分、citation snowball 和 deep_read_queue 构建。
      t2_finalize:
        # finish_task 后至少要有多少 raw 才允许 deterministic finalize；过低说明检索没展开。
        finish_finalize_min_raw: 30
        # 保留候选数上限；超过的去 papers_backlog.jsonl，不静默丢弃。
        active_pool_max: 120
        # semantic_screen 通过的主线候选在保留候选集中的优先保留上限。
        screened_active_pool_cap: 60
        # 兼容旧字段：未设置 must_bridge_active_pool_cap_per_bridge 时作为 must 默认值。
        bridge_active_pool_cap_per_bridge: 15
        # 每个 priority=must_explore bridge 最多保留多少个候选进入保留候选集。
        must_bridge_active_pool_cap_per_bridge: 15
        # 每个 priority=should_explore bridge 最多保留多少个候选进入保留候选集；默认明显低于 must，
        # 避免 bridge 扩散挤掉 core 主线。priority=no_cross/skip 不保留。
        should_bridge_active_pool_cap_per_bridge: 5
        # citation snowball 候选进入保留候选集的保护上限。
        snowball_active_pool_cap: 12
        # 标题去重阈值；越高越保守，越低越容易合并近似标题。
        dedup_title_threshold: 0.95
        # access_audit.md 展示 top N，方便排查 PDF/摘要/DOI 获取情况。
        access_audit_top_n: 50
        # 保留候选/backlog 切分前先对全 dedup 池前 N 篇做轻量标题/DOI/OA/摘要补全。
        # 0 表示关闭；-1 表示不限量。避免只有早选保留候选才拿到资源补全导致排序偏。
        pre_active_light_backfill_max: 220
        # OpenAlex/Crossref/title metadata 回填并发；过高可能触发外部 API 限流。
        metadata_backfill_max_concurrency: 6
        # 多源摘要 title 匹配阈值；越高越少误配，越低越能补到但风险更高。
        abstract_backfill_title_match_threshold: 0.88
        # Semantic Scholar / Europe PMC 等摘要回填并发。
        abstract_backfill_max_concurrency: 6
        # citation snowball 最多从多少个高置信来源论文展开。
        snowball_max_sources: 12
        # 每个来源最多看多少条 references/related works。
        snowball_refs_per_source: 8
        # 每轮最多尝试解析多少个 snowball 候选，防止引用图爆炸。
        snowball_max_candidates: 40
        # snowball metadata 解析并发。
        snowball_max_concurrency: 6
        # Crossref 引用标题转 OpenAlex 候选的最低标题相似度。
        snowball_title_match_threshold: 0.90
      progress:
        # 是否维护 literature/temp/scout_progress.md。
        enabled: true
        # T2 人类可读进度文件路径。
        file: literature/temp/scout_progress.md
        # search tool 写入 raw 后是否立即刷新进度。
        update_on_tool_results: true
        # deterministic finalize 开始/完成/失败时是否刷新进度。
        update_on_finalize: true
      literature_quality:
        # T2 候选池的语言/来源质量底线策略。这里只做机械准入和打标，
        # 不替代 Scout/Reader 对相关性和机制价值的 LLM 判断。
        enabled: true
        # auto 会从 project.yaml / seed_outline_profile 推断 en、zh 或 mixed。
        manuscript_language: auto
        # auto 表示英文稿默认不引入中文非 seed 文献；中文/双语综述允许中文候选。
        include_chinese_literature: auto
        # 英文稿的中文候选处理策略：非用户 seed 的中文论文不进入 active pool。
        english_manuscript_policy: exclude_non_seed_chinese
        # 中文候选不再因为缺少权威标签被硬过滤；只打 authority_review_needed，
        # 后续写作/引用阶段再结合真实期刊目录或人工判断。
        chinese_literature_policy: review_flag_only
        # 用户上传的 seed 可保留和阅读，但若不符合英文稿/权威来源要求，
        # 会被标记 citation_allowed=false 或 needs_authority_review，供写作阶段避用/复核。
        allow_user_seed_override: true
        # 中文权威来源关键词。T2 只接受显式命中的来源/期刊/标注，不靠模糊猜测。
        authoritative_chinese_keywords:
        - WJCI
        - SCI
        - SSCI
        - EI
        - 北大核心
        - CSSCI
        - CSCD
        - AMI
        - AMI顶级
        - AMI权威
        - AMI核心
        - 管理世界
        - 管理科学学报
        - 系统工程理论与实践
        - 科研管理
        - 中国管理科学
        - 南开管理评论
        - 管理评论
        - 管理工程学报
        - 情报学报
        - 情报理论与实践
      behavior_profiles:
        # runtime 会根据 workspace 自动选择 profile：
        # - project.yaml 的 metadata.manuscript_type/project_type/article_type/paper_type
        # - 或 user_seeds/seed_outline_profile.json 的 manuscript_type/project_type
        # 命中 survey/综述/review 时启用本段；否则使用上面的 research_article 默认值。
        survey:
          t2_finalize:
            # 综述任务需要更宽的候选池覆盖 taxonomy、治理资料和跨学科概念。
            # 超额候选仍进入 papers_backlog.jsonl，不会静默丢弃。
            active_pool_max: 180
            screened_active_pool_cap: 90
            access_audit_top_n: 80
            pre_active_light_backfill_max: 360
            # 综述更依赖引用/规范/综述链路，适度放宽 one-hop snowball。
            snowball_active_pool_cap: 20
            snowball_max_sources: 18
            snowball_refs_per_source: 10
            snowball_max_candidates: 70
  reader:
    tools:
      allowed_read_prefixes:
      - ''
      - literature/
      - user_seeds/
      - _runtime/resume/
      tool_names:
      - read_file
      - write_file
      - append_file
      - list_files
      - lookup_paper_record
      - fetch_paper_pdf
      - extract_paper_sections
      - extract_pdf_text
      - save_paper_note
      - build_synthesis_workbench
      - finish_task
      allowed_write_prefixes:
      - literature/
    prompt:
      prompt_template: reader.j2
    modes:
      read:
        prompt:
          expected_outputs:
            paper_notes_min: 10
            comparison_table_required: true
            related_work_bib_required: true
        behavior:
          # T3 后置 abstract sweep：
          # 先尽最大可能消费 T2 已补好的 abstract/PDF metadata；
          # 有 abstract 的候选逐篇 Reader LLM 轻读；
          # 仍然只有 metadata 的候选进入 metadata_triage.md 批量 LLM triage。
          abstract_sweep:
            # false 可完全关闭 T3 后置轻量补读。
            enabled: true
            # 每轮最多处理多少个候选；含 abstract note 和 metadata-only triage，总 cap。
            lite_paper_num: 120
            # 最低 relevance_score hint；0.0 表示不靠该 hint 丢弃候选。
            min_relevance: 0.0
            # 候选来源优先级；verified/dedup 是保留候选集。papers_backlog 是审计/人工回捞池，
            # 默认不自动扫，显式加入 sources 时仍会跳过 t2_active_pool_cap_exceeded/domain_profile_filtered。
            sources:
            - papers_verified
            - papers_dedup
            # 跳过 paper_notes/、paper_notes_bridge/、paper_notes_abstract/ 已覆盖论文。
            exclude_already_read: true
            # true 表示无 abstract 但有标题的候选也会进入批量 triage report；
            # false 则完全跳过这类 metadata-only 候选。
            include_metadata_only: true
            # 跳过 Scout 明确判为 shared_keyword_only/unrelated 或 can_enter_deep_read=false 的候选。
            exclude_semantic_excluded: true
            # metadata-only 批量报告；只作补资源/升级阅读线索，不进入 BibTeX/comparison evidence。
            metadata_triage_report: literature/metadata_triage.md
            # abstract sweep 排序权重；relevance 是 T2 priority hint，resource 表示可验证资源，
            # year 表示新近性。权重会自动归一化。
            priority_weights:
              relevance: 0.70
              resource: 0.20
              year: 0.10
        description: 深度阅读
        # 旧 workspace 没有 deep_read_queue 时的 fallback 覆盖比例；新流程优先用 queue。
        expected_notes_ratio: 1.0
        # T3 validator 至少需要多少篇结构合格 deep-read note。
        deep_read_min: 35
        # T3 prompt 和 queue meta 中展示的目标精读数。
        deep_read_target: 35
        # 精读目标硬上限；seed/bridge/citation hub 保护位也计入这个上限。
        deep_read_max: 45
        # Reader 优先 probe 的候选池大小。
        probe_pool: 45
        # 主线 shallow/screened backlog 在 deep_read_queue.jsonl 中保留的上限。
        mainline_screened_cap: 90
        # 每个 must_explore bridge 的精读保底。
        bridge_deep_floor: 3
        # 每个 bridge 的 shallow/screened backlog 保留上限。
        bridge_screened_cap: 7
        # 每个 bridge 在 queue 中保留的总候选上限。
        bridge_pool_cap: 15
        # citation graph 枢纽保护槽，仍需 semantic_screen/Reader 复核。
        citation_hub_slots: 3
        behavior_profiles:
          survey:
            # 综述版需要更多深读覆盖 taxonomy 主类，但仍保留候选/backlog 分层。
            deep_read_min: 45
            deep_read_target: 55
            deep_read_max: 65
            probe_pool: 70
            mainline_screened_cap: 130
            bridge_deep_floor: 3
            bridge_screened_cap: 10
            bridge_pool_cap: 18
            citation_hub_slots: 5
            abstract_sweep:
              # 综述版轻读覆盖更宽，方便 T3.6 taxonomy plan 看到边界材料。
              lite_paper_num: 180
              sources:
              - papers_verified
              - papers_dedup
              - papers_backlog
      synthesize:
        prompt:
          expected_length_min: 2000
          expected_sections:
          - '## Method Families'
          - '## Shared Assumptions'
          - '## Contribution-Space Map'
          - '## Trends & Cross-Paper Contradictions'
          - '## Research Questions'
        behavior:
          prebuild_workbench_before_llm: true
        description: 文献综合
        expected_citations_min: 5
  ideation:
    tools:
      allowed_read_prefixes:
      - ''
      - literature/
      - user_seeds/
      - ideation/

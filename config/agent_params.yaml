      - Level 1
      - Level 2
      - Level 3
  novelty:
    tools:
      allowed_read_prefixes:
      - ''
      - ideation/
      - literature/
      - pilot/
      - novelty/
      tool_names:
      - read_file
      - write_file
      - list_files
      - search_papers
      - ask_human
      - finish_task
      allowed_write_prefixes:
      - novelty/
    prompt:
      prompt_template: novelty.j2
  experimenter:
    tools:
      allowed_read_prefixes:
      - ''
      - ideation/
      - experiments/
      - pilot/
      - literature/
      - external_executor/
      - drafts/
      - novelty/
      - resources/
      tool_names:
      - read_file
      - write_file
      - write_structured_file
      - list_files
      - append_file
      - build_experiment_handoff_pack
      - select_external_executor
      - wait_for_external_executor_result
      - mock_external_dry_run
      - ingest_external_results
      - audit_experiment_integrity
      - build_post_experiment_novelty_check
      - map_results_to_claims
      - build_experiment_evidence_pack
      - finish_task
      allowed_write_prefixes:
      - experiments/
      - pilot/
      - external_executor/
      - drafts/
      - novelty/
    prompt:
      prompt_template: experimenter.j2
      structured_outputs:
        experiments/results_summary.json: results_summary
        pilot/pilot_results.json: pilot_results
        pilot/pilot_plan.yaml: pilot_plan
    modes:
      reboost:
        tools:
          tool_names:
          - read_file
          - write_file
          - list_files
          - finish_task
          allowed_read_prefixes:
          - ''
          - project.yaml
          - literature/
          - ideation/
          - novelty/
          - resources/
          - user_seeds/
          - external_executor/
          allowed_write_prefixes:

# ResearchOS Agent 参数配置
#
# 目标：
# - 把每个 Agent 的默认 LLM / budget / tool / 路径参数集中到这里管理
# - 便于按 Agent 单独切换模型、provider、profile，而不必改 Python 源码
#
# 设计说明：
# 1. llm.model + llm.endpoint
#    - 这是当前推荐写法：每个 Agent 直接绑定自己的模型和 endpoint
#    - endpoint 需要对应 config/model_routing.yaml 里的 endpoints.<name>
#    - provider 不在这里写，而是在 endpoint 层统一定义
#
# 2. llm.tier
#    - 现在只作为兼容/回退字段保留
#    - 当 llm.model / llm.endpoint 未设置，或你想批量走 profile 路由时再使用
#
# 3. llm.profile
#    - 直接指定 config/model_routing.yaml 中的 profile
#    - 适合“这个 Agent 永远走某个 profile”，或想临时恢复到分档路由
#
# 4. max_tokens_total
#    - 这里使用普通整数写法，例如 100000
#    - 之前的 100_000 只是可读性写法，语义完全相同；现在统一成普通整数，避免阅读困惑
#
# 实际覆盖优先级（从高到低）：
# 1. state_machine.yaml 中某个 task 的 llm / budget 临时覆盖
# 2. 本文件对应 agent 的配置
# 3. Python 代码里的 defaults
#
# 建议把这份文件理解为“Agent 级默认值”：
# - 想让整个 reader 永久换模型，就改 `agents.reader.llm`
# - 想只让某次 T3 临时换模型，就去改 state_machine.yaml 里的 T3.llm
# - 想统一改重试/超时/预算，就看文件末尾的 global_* / retry_policy

agents:
  hello:
    llm:
      # model + endpoint 是当前主入口；tier 仅作为回退保留
      model: "deepseek-ai/DeepSeek-V4-Flash"
      endpoint: siliconflow
      max_context: 128000
      tier: medium
      temperature: 0.3
      # profile: hello_fast
      # 如果把 model/endpoint 删掉，仅保留 profile+tier，就会回到 profile 路由模式。
    max_steps: 5
    max_tokens_total: 10000
    max_wall_seconds: 60
    max_validation_retries: 3
    tool_names:
      - echo
      - write_file
      - read_file
      - finish_task
    allowed_read_prefixes:
      - ""
    allowed_write_prefixes:
      - ""
    prompt_template: hello.j2

  pi:
    llm:
      # 改为走 profile，让 SiliconFlow 主模型失败时也能 fallback 到 MiniMax。
      profile: siliconflow_only
      max_context: 128000
      tier: heavy
      temperature: 0.3
    max_steps: 40
    max_tokens_total: 1000000
    max_wall_seconds: 3000
    max_validation_retries: 10
    tool_names:
      - read_file
      - write_file
      - write_structured_file
      - list_files
      - ask_human
      - finish_task
      - process_seed_paper
    allowed_read_prefixes:
      - ""
      - user_seeds/
      - experiments/
      - ideation/
      - evaluation/
    allowed_write_prefixes:
      - ""
      - user_seeds/
      - evaluation/
    prompt_template: pi.j2
    structured_outputs:
      # structured_outputs 主要用于 runtime 校验“这些关键文件应当产出什么 schema”。
      project.yaml: project
    modes:
      init:
        description: 项目初始化
        expected_rounds: 3
      evaluate:
        description: 结果评估
        expected_rounds: 2

  scout:
    llm:
      # Scout 直接用 profile，而不是绑死某个 model+endpoint。
      # 这样可以在 model_routing.yaml 里集中维护 fallback。
      profile: scout_resilient
      max_context: 128000
      tier: medium
      temperature: 0.5
    max_steps: 300
    max_tokens_total: 50000000
    max_wall_seconds: 3600
    max_validation_retries: 3
    tool_names:
      - read_file
      - write_file
      - write_structured_file
      - append_papers_raw
      - process_papers_raw
      - save_papers_raw
      - save_papers_dedup
      - multi_source_search
      - search_papers
      - fetch_paper_metadata
      - finish_task
      - deduplicate_papers
      - score_papers
      - expand_queries
      - filter_by_domain
      - generate_search_log
      - enrich_papers
      - detect_duplicate_queries
      - analyze_dedup_rate
      - build_verified_papers
      - build_access_audit
      - build_deep_read_queue
      - semantic_scholar_search
      - semantic_scholar_get_paper
      - arxiv_search
      - openalex_search
      - openalex_get_work
      - crossref_search
      - crossref_get_work
      - elsevier_scopus_search
      - informs_search
      - log_scout_progress
    allowed_read_prefixes:
      - ""
      - literature/
      - user_seeds/
      - seeds/
      - _runtime/resume/
    allowed_write_prefixes:
      - literature/
    prompt_template: scout.j2
    structured_outputs:
      literature/papers_dedup.jsonl: papers_dedup
      literature/papers_verified.jsonl: papers_verified
      literature/papers_raw.jsonl: papers_raw
    expected_outputs:
      # 这里只是“产出预期”，不是唯一校验来源；真正的 artifact 校验还会结合 schema 和 runtime validator。
      papers_raw_min: 30
      papers_dedup_min: 15
      papers_dedup_max: 120

  reader:
    llm:
      # Reader 改为 profile 模式，确保 T3/T3.5 也有同 provider fallback。
      profile: siliconflow_only
      max_context: 128000
      tier: medium
      temperature: 0.5
    max_steps: 200
    max_tokens_total: 600000
    max_wall_seconds: 5000
    max_validation_retries: 10
    tool_names:
      - read_file
      - write_file
      - append_file
      - list_files
      - lookup_paper_record
      - fetch_paper_pdf
      - extract_paper_sections
      - extract_pdf_text
      - finish_task
    allowed_read_prefixes:
      - ""
      - literature/
      - user_seeds/
      - _runtime/resume/
    allowed_write_prefixes:
      - literature/
    prompt_template: reader.j2
    modes:
      read:
        description: 深度阅读
        # read 模式预算通常要显著高于普通 agent，因为它会多轮处理论文。
        max_steps: 200
        max_tokens_total: 20000000
        expected_notes_ratio: 0.8
        deep_read_min: 18
        deep_read_target: 24
        deep_read_max: 30
        probe_pool: 45
        expected_outputs:
          # 这些开关更多是“最低完成标准”，不是说超过这个数就一定完成得好。
          paper_notes_min: 10
          comparison_table_required: true
          related_work_bib_required: true
      synthesize:
        description: 文献综合
        max_steps: 100
        max_tokens_total: 15000000
        expected_sections:
          - "## Method Families"
          - "## Shared Assumptions"
          - "## Performance-Efficiency Frontier"
          - "## Technology Trends"
          - "## Research Questions"
        expected_length_min: 1000
        expected_citations_min: 5

  ideation:
    llm:
      # Ideation 直接走专用 profile：先 DeepSeek，再 MiniMax，最后 OpenRouter。
      profile: ideation_deep
      max_context: 128000
      tier: heavy
      temperature: 0.75
    max_steps: 150
    max_tokens_total: 500000
    max_wall_seconds: 1200
    max_validation_retries: 10
    tool_names:
      - read_file
      - write_file
      - write_structured_file
      - list_files
      - ask_human
      - finish_task
    allowed_read_prefixes:
      - ""
      - literature/
      - user_seeds/
    allowed_write_prefixes:
      - ideation/
    prompt_template: ideation.j2
    structured_outputs:
      ideation/exp_plan.yaml: exp_plan
    expected_outputs:
      hypothesis_count: 3
      risk_count: 3
    gates:
      # gate id 会在状态机/人机交互里引用，改名时要同步检查调用方。
      - id: gate1
        description: 选择研究方向
        type: user_select
      - id: gate2
        description: 确认假设方案
        type: user_confirm

  novelty_auditor:
    llm:
      # novelty_auditor 也走 SiliconFlow profile，避免 T4.5 只有单一候选。
      profile: siliconflow_only
      max_context: 128000
      tier: heavy
      temperature: 0.3
    max_steps: 1000
    max_tokens_total: 600000
    max_wall_seconds: 800
    max_validation_retries: 10
    tool_names:
      - read_file
      - write_file
      - list_files
      - search_papers
      - fetch_paper_metadata
      - finish_task
    allowed_read_prefixes:
      - ""
      - ideation/
      - literature/
    allowed_write_prefixes:
      - ideation/
    prompt_template: novelty_auditor.j2
    novelty_levels:
      - Level 0
      - Level 1
      - Level 2
      - Level 3

  novelty:
    llm:
      # T6 之前没有 fallback，就是因为这里写死了 model+endpoint。
      # 改成 profile 后，会先走 DeepSeek，再 fallback 到 MiniMax。
      profile: siliconflow_only
      max_context: 1280000
      tier: medium
      temperature: 0.3
    max_steps: 1000
    max_tokens_total: 600000
    max_wall_seconds: 8000
    max_validation_retries: 10
    tool_names:
      - read_file
      - write_file
      - list_files
      - search_papers
      - ask_human
      - finish_task
    allowed_read_prefixes:
      - ""
      - ideation/
      - literature/
      - pilot/
      # T6 需要读取自己上次已生成的 novelty 草稿，才能真正续跑而不是盲目重写。
      - novelty/
    allowed_write_prefixes:
      - novelty/
    prompt_template: novelty.j2

  experimenter:
    llm:
      # T5/T7 也改成 profile，长任务更需要 fallback。
      profile: siliconflow_only
      max_context: 128000
      tier: medium
      temperature: 0.3
    max_steps: 2000
    max_tokens_total: 60000000
    max_wall_seconds: 14400
    max_validation_retries: 10
    tool_names:
      - read_file
      - write_file
      - write_structured_file
      - list_files
      - append_file
      - bash_run
      - docker_exec
      - finish_task
    allowed_read_prefixes:
      - ""
      - ideation/
      - experiments/
      - pilot/
      - literature/
    allowed_write_prefixes:
      - experiments/
      - pilot/
    prompt_template: experimenter.j2
    structured_outputs:
      experiments/results_summary.json: results_summary
      pilot/pilot_results.json: pilot_results
      pilot/pilot_plan.yaml: pilot_plan
    modes:
      pilot:
        description: 试点实验
        max_steps: 1000
        max_tokens_total: 1000000
        max_wall_seconds: 7200
        max_validation_retries: 2
        docker_required: true
        gpu_required: true
        expected_outputs:
          smoke_test_required: true
          motivation_validation_required: true
      full:
        description: 完整实验
        max_steps: 5000
        max_tokens_total: 30000000
        max_wall_seconds: 14400
        max_validation_retries: 5
        docker_required: true
        gpu_required: true
        expected_outputs:
          ablation_min: 3
          seed_ensemble_min: 3
          results_summary_required: true

  writer:
    llm:
      # 写作阶段默认仍先走 SiliconFlow，但保留 MiniMax fallback。
      profile: siliconflow_only
      max_context: 1280000
      tier: heavy
      temperature: 0.7
    max_steps: 1500
    max_tokens_total: 1000000
    max_wall_seconds: 24000
    max_validation_retries: 3
    tool_names:
      - read_file
      - write_file
      - list_files
      - finish_task
    allowed_read_prefixes:
      - ""
      - literature/
      - experiments/
      - ideation/
    allowed_write_prefixes:
      - drafts/
    prompt_template: writer.j2
    modes:
      outline:
        description: 生成大纲
        max_steps: 300
        max_tokens_total: 1000000
      draft:
        description: 生成初稿
        max_steps: 500
        max_tokens_total: 2500000
      revise:
        description: 修订
        max_steps: 300
        max_tokens_total: 1500000
    latex_required: true

  reviewer:
    llm:
      # 审稿也改成 profile，避免只剩单模型重试。
      profile: siliconflow_only
      max_context: 128000
      tier: heavy
      temperature: 0.3
    max_steps: 200
    max_tokens_total: 6000000
    max_wall_seconds: 12000
    max_validation_retries: 10
    tool_names:
      - read_file
      - list_files
      - write_file
      - finish_task
    allowed_read_prefixes:
      - ""
      - drafts/
      - literature/
      - experiments/
    allowed_write_prefixes:
      - drafts/review_rounds/
    prompt_template: reviewer.j2
    expected_sections:
      - "## Overall Assessment"
      - "## Major Issues"
      - "## Minor Issues"
    expected_length_min: 500

  submission:
    llm:
      # 投稿整理阶段同样保留 MiniMax fallback。
      profile: siliconflow_only
      max_context: 128000
      tier: medium
      temperature: 0.3
    max_steps: 3000
    max_tokens_total: 5000000
    max_wall_seconds: 8000
    max_validation_retries: 10
    tool_names:
      - read_file
      - write_file
      - list_files
      - bash_run
      - docker_exec
      - finish_task
    allowed_read_prefixes:
      - ""
      - drafts/
      - literature/
      - experiments/
    allowed_write_prefixes:
      - submission/
    prompt_template: submission.j2
    # 匿名化前置检查默认关闭，便于本地调试或非匿名投稿场景直接产出投稿包。
    # 如果要恢复“运行前先拦截邮箱/URL/GitHub”等检查，可改回 true。
    enforce_anonymization_precheck: false
    # T9 在编译失败时允许的“诊断-修复-重试”上限。
    # 这个值会注入 prompt，用来防止 submission 阶段无限循环编译。
    max_compile_attempts: 4
    docker_required: true
    expected_outputs:
      bundle_required: true
      anonymization_required: true
      compile_required: true

global_budget:
  default_max_budget_usd: 100.0
  warning_threshold: 0.7
  critical_threshold: 0.9
  stage_allocation:
    T1_init: 0.05
    T2_scout: 0.10
    T3_read: 0.15
    T4_ideation: 0.10
    T5_pilot: 0.20
    T7_full: 0.30
    T8_write: 0.08
    T9_submission: 0.02

global_timeout:
  max_agent_runtime: 7200
  max_tool_call: 180
  docker_operation: 7200
  llm_call: 90

docker:
  requires_docker:
    - experimenter
    - submission
  requires_gpu:
    - experimenter
  default_image: researchos/system:latest
  gpu:
    default_count: 1
    max_count: 2
    memory_limit: 16g

retry_policy:
  llm_retries: 10
  llm_retry_delay: 1
  tool_retries: 5
  tool_retry_delay: 1
  validation_retries: 3
  no_retry_errors:
    - AuthenticationError
    - PermissionDenied
    - BudgetExceeded

# 预算触顶时的人工扩限策略。
# 典型用途：T5/T7 这类长任务已经写出代码/中间产物，不希望因为 token 或 wall time 上限
# 直接中断丢掉上下文，而是先询问一次“是否增加预算继续跑”。
budget_escalation:
  enabled: true
  # 留空表示“对所有 task 生效”。
  # 如果将来只想限制到少数长任务，再填入类似 ["T5", "T7"] 的列表即可。
  tasks: []
  # 同一 run 最多允许扩限多少次。
  # - 设为 null：不设上限；每次触顶都继续弹 gate 询问
  # - 设为正整数：达到次数后不再询问，直接按预算超限停止
  # - 设为负数：等同于 null
  max_extensions_per_run: null
  # 各维度默认扩限比例；实际扩大量还会受 runtime 中的最小增量约束。
  steps_increase_ratio: 0.25
  token_increase_ratio: 0.5
  wall_seconds_increase_ratio: 0.5

logging:
  level: INFO
  trace_enabled: true
  trace_retention_days: 30
  trace_max_size_mb: 10

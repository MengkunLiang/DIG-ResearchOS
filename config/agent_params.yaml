# ResearchOS Agent 实际参数配置
#
# 本文件集中管理所有 Agent 的实际限制参数，这些参数会真实生效。
# 实际预算控制由 BudgetTracker 和 project.yaml 中的 constraints 决定。
#
# 使用说明：
# - max_steps: 最大步数限制
# - max_tokens_total: 最大 token 数限制
# - max_wall_seconds: 最大运行时间（秒）
# - max_validation_retries: 输出验证重试次数
# - 在 state_machine.yaml 中可以通过 llm.profile 或 llm.tier 覆盖 model_tier 设置

# ========================================
# Agent 模型配置
# ========================================
# model_tier 选项：
# - heavy: 复杂推理任务，使用最强模型
# - medium: 标准任务，使用中等模型
# - light: 简单任务，使用轻量模型
#
# 对应模型定义在 config/model_routing.yaml 中

agents:
  # ========================================
  # Hello Agent (T0)
  # 用途：调试用，最简单的 agent
  # ========================================
  hello:
    model_tier: "medium"
    max_steps: 5
    max_tokens_total: 10_000
    max_wall_seconds: 60
    max_validation_retries: 3

  # ========================================
  # PI Agent (T1 / T7.5)
  # 用途：项目初始化 / 结果评估
  # ========================================
  pi:
    model_tier: "heavy"
    max_steps: 30
    max_tokens_total: 100_000
    max_wall_seconds: 300
    max_validation_retries: 3
    modes:
      init:
        description: "项目初始化"
        expected_rounds: 3
      evaluate:
        description: "结果评估"
        expected_rounds: 2

  # ========================================
  # Scout Agent (T2)
  # 用途：文献检索
  # ========================================
  scout:
    model_tier: "medium"
    max_steps: 50
    max_tokens_total: 150_000
    max_wall_seconds: 600
    max_validation_retries: 3
    expected_outputs:
      papers_raw_min: 30
      papers_dedup_min: 15
      papers_dedup_max: 120
    tools:
      - search_papers
      - fetch_paper_metadata
      - deduplicate_papers

  # ========================================
  # Reader Agent (T3 / T3.5)
  # 用途：深度阅读 / 文献综合
  # ========================================
  reader:
    model_tier: "medium"
    max_steps: 100
    max_tokens_total: 300_000
    max_wall_seconds: 1200
    max_validation_retries: 3
    modes:
      read:
        description: "深度阅读"
        max_steps: 80
        max_tokens_total: 200_000
        expected_notes_ratio: 0.8
        expected_outputs:
          paper_notes_min: 10
          comparison_table_required: true
          related_work_bib_required: true
      synthesize:
        description: "文献综合"
        max_steps: 50
        max_tokens_total: 150_000
        expected_sections:
          - "## Method Families"
          - "## Shared Assumptions"
          - "## Performance-Efficiency Frontier"
          - "## Technology Trends"
          - "## Research Questions"
        expected_length_min: 1000
        expected_citations_min: 5

  # ========================================
  # Ideation Agent (T4)
  # 用途：假设生成
  # ========================================
  ideation:
    model_tier: "heavy"
    max_steps: 60
    max_tokens_total: 200_000
    max_wall_seconds: 600
    max_validation_retries: 3
    expected_outputs:
      hypothesis_count: 3
      risk_count: 3
    gates:
      - id: "gate1"
        description: "选择研究方向"
        type: "user_select"
      - id: "gate2"
        description: "确认假设方案"
        type: "user_confirm"

  # ========================================
  # Novelty Auditor Agent (T4.5)
  # 用途：新颖性审计
  # ========================================
  novelty_auditor:
    model_tier: "heavy"
    max_steps: 40
    max_tokens_total: 150_000
    max_wall_seconds: 400
    max_validation_retries: 3
    novelty_levels:
      - "Level 0"
      - "Level 1"
      - "Level 2"
      - "Level 3"

  # ========================================
  # Novelty Agent (T6)
  # 用途：新颖性最终验证
  # ========================================
  novelty:
    model_tier: "medium"
    max_steps: 40
    max_tokens_total: 100_000
    max_wall_seconds: 400
    max_validation_retries: 3

  # ========================================
  # Experimenter Agent (T5 / T7)
  # 用途：试点实验 / 完整实验
  # ========================================
  experimenter:
    model_tier: "medium"
    modes:
      pilot:
        description: "试点实验"
        max_steps: 100
        max_tokens_total: 500_000
        max_wall_seconds: 7200
        max_validation_retries: 2
        docker_required: true
        gpu_required: true
        expected_outputs:
          smoke_test_required: true
          motivation_validation_required: true
      full:
        description: "完整实验"
        max_steps: 150
        max_tokens_total: 800_000
        max_wall_seconds: 14400
        max_validation_retries: 2
        docker_required: true
        gpu_required: true
        expected_outputs:
          ablation_min: 3
          seed_ensemble_min: 3
          results_summary_required: true

  # ========================================
  # Writer Agent (T8-WRITE / T8-DRAFT / T8-REVISE)
  # 用途：论文写作
  # ========================================
  writer:
    model_tier: "heavy"
    max_steps: 100
    max_tokens_total: 400_000
    max_wall_seconds: 1200
    max_validation_retries: 3
    modes:
      outline:
        description: "生成大纲"
        max_steps: 30
        max_tokens_total: 100_000
      draft:
        description: "生成初稿"
        max_steps: 50
        max_tokens_total: 250_000
      revise:
        description: "修订"
        max_steps: 30
        max_tokens_total: 150_000
    latex_required: true

  # ========================================
  # Reviewer Agent (T8-REVIEW)
  # 用途：论文审稿
  # ========================================
  reviewer:
    model_tier: "heavy"
    max_steps: 60
    max_tokens_total: 200_000
    max_wall_seconds: 600
    max_validation_retries: 3
    expected_sections:
      - "## Overall Assessment"
      - "## Major Issues"
      - "## Minor Issues"
    expected_length_min: 500

  # ========================================
  # Submission Agent (T9)
  # 用途：投稿准备
  # ========================================
  submission:
    model_tier: "medium"
    max_steps: 40
    max_tokens_total: 80_000
    max_wall_seconds: 300
    max_validation_retries: 3
    docker_required: true
    expected_outputs:
      bundle_required: true
      anonymization_required: true
      compile_required: true

# ========================================
# 全局预算配置（实际生效）
# ========================================
# 实际预算控制由 BudgetTracker 和 project.yaml 中的 constraints 决定

global_budget:
  # 默认总预算（美元）- 来自 project.yaml 的 constraints.max_budget_usd
  default_max_budget_usd: 100.0

  # 预算警告阈值（实际生效）
  warning_threshold: 0.7
  critical_threshold: 0.9

  # 各阶段预算分配（占总预算百分比）- 仅供参考
  stage_allocation:
    T1_init: 0.05
    T2_scout: 0.10
    T3_read: 0.15
    T4_ideation: 0.10
    T5_pilot: 0.20
    T7_full: 0.30
    T8_write: 0.08
    T9_submission: 0.02

# ========================================
# 全局超时配置（实际生效）
# ========================================

global_timeout:
  # 单个 Agent 最大运行时间（秒）
  max_agent_runtime: 14400

  # 单个工具调用最大时间（秒）
  max_tool_call: 300

  # Docker 操作超时（秒）
  docker_operation: 7200

  # LLM 调用超时（秒）
  llm_call: 120

# ========================================
# Docker 配置
# ========================================

docker:
  requires_docker:
    - experimenter
    - submission

  requires_gpu:
    - experimenter

  default_image: "researchos/system:latest"

  gpu:
    default_count: 1
    max_count: 2
    memory_limit: "16g"

# ========================================
# 重试策略（实际生效）
# ========================================

retry_policy:
  llm_retries: 2
  llm_retry_delay: 2

  tool_retries: 3
  tool_retry_delay: 1

  validation_retries: 3

  no_retry_errors:
    - "AuthenticationError"
    - "PermissionDenied"
    - "BudgetExceeded"

# ========================================
# 日志和追踪配置
# ========================================

logging:
  level: "INFO"
  trace_enabled: true
  trace_retention_days: 30
  trace_max_size_mb: 10

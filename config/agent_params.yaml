        budget:
          max_steps: 24
          max_tokens_total: 220000
          max_wall_seconds: 1800
        description: 自动 context re-boost，生成 external_executor/handoff_pack.json#context_reboost
      pilot:
        tools:
          tool_names:
          - read_file
          - write_file
          - write_structured_file
          - list_files
          - append_file
          - bash_run
          - docker_exec
          - finish_task
          allowed_read_prefixes:
          - ''
          - ideation/
          - experiments/
          - pilot/
          - literature/
          allowed_write_prefixes:
          - experiments/
          - pilot/
        prompt:
          expected_outputs:
            smoke_test_required: true
            motivation_validation_required: true
        behavior:
          gpu_required: false
          docker_required: false
        description: legacy 试点实验调试；当前主链使用外部执行器，Docker/GPU 只在用户显式需要时使用
      full:
        tools:
          tool_names:
          - read_file
          - write_file
          - write_structured_file
          - list_files
          - append_file
          - bash_run
          - docker_exec
          - finish_task
          allowed_read_prefixes:
          - ''
          - ideation/
          - experiments/
          - pilot/
          - literature/
          - novelty/
          allowed_write_prefixes:
          - experiments/
          - pilot/
        prompt:
          expected_outputs:
            ablation_min: 3
            seed_ensemble_min: 3
            results_summary_required: true
        behavior:
          gpu_required: false
          docker_required: false
        description: legacy 完整实验调试；当前主链使用外部执行器，Docker/GPU 只在用户显式需要时使用
      handoff:
        description: 编译外部执行器 handoff 包
        behavior:
          docker_required: false
          gpu_required: false
      skill_customization:
        tools:
          tool_names:
          - read_file
          - write_file
          - list_files
          - finish_task
          allowed_read_prefixes:
          - ''
          - external_executor/
          - ideation/

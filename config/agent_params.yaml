global_budget:
  default_max_budget_usd: 100.0
  warning_threshold: 0.7
  critical_threshold: 0.9
  stage_allocation:
    T1_init: 0.05
    T2_scout: 0.1
    T3_read: 0.15
    T4_ideation: 0.1
    T5_pilot: 0.2
    T7_full: 0.3
    T8_write: 0.08
    T9_submission: 0.02
global_timeout:
  max_agent_runtime: 7200
  max_tool_call: 180
  docker_operation: 7200
  latex_compile: 1800
  llm_call: 90
docker:
  requires_docker:
  - experimenter
  - submission
  requires_gpu:
  - experimenter
  default_image: researchos/system:latest
  gpu:
    default_count: 1
    max_count: 2
    memory_limit: 16g
retry_policy:
  llm_retries: 10
  llm_retry_delay: 1
  # 当一整轮候选都因 TimeoutError/超时失败时，runner 不把项目标记为 failed。
  # 默认冷却 60 秒后继续尝试；pause_after_cooldowns=0 表示无限冷却重试，
  # 如需改成人工 gate，可设为正整数，达到次数后项目进入 PAUSED，可 resume。
  llm_timeout_cooldown_seconds: 60
  llm_timeout_pause_after_cooldowns: 0
  tool_retries: 5
  tool_retry_delay: 1
  validation_retries: 3
  no_retry_errors:
  - AuthenticationError
  - PermissionDenied
  - BudgetExceeded
budget_escalation:
  enabled: true
  tasks: []
  max_extensions_per_run: null
  steps_increase_ratio: 0.25
  token_increase_ratio: 0.5
  wall_seconds_increase_ratio: 0.5
  max_validation_extensions_per_run: null
  validation_retry_increase: 2
logging:
  level: INFO
  trace_enabled: true
  trace_retention_days: 30
  trace_max_size_mb: 10

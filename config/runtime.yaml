# ResearchOS Runtime 配置文件
# 本文件定义 ResearchOS 运行时的核心行为和路径配置

# Workspace 工作空间配置
workspace:
  # 默认工作空间根目录
  # 所有研究项目的数据、文献、输出都存储在此目录下
  default_root: "./workspaces"

  # Runtime 私有目录名称
  # 用于存储运行时数据（日志、trace、状态等），与用户数据分离
  runtime_dir: "_runtime"

# 日志配置
logging:
  # 日志级别：DEBUG, INFO, WARNING, ERROR, CRITICAL
  # 建议开发时使用 DEBUG，生产环境使用 INFO
  level: "INFO"

  # 是否使用 JSON 格式输出日志
  # true: 结构化日志，便于机器解析和日志聚合
  # false: 人类可读的文本格式
  json: true

# 人机接口配置
human_interface:
  # 接口后端类型
  # 当前支持：
  # - "cli": 命令行接口（默认）
  # 未来可扩展：web, api 等
  backend: "cli"

# Agent 行为配置
agent_behavior:
  # Agent 连续返回空回复的最大次数
  # 超过此次数将触发错误，防止无限循环
  max_empty_reply: 2

  # 最大"推动完成"次数
  # 当 Agent 未主动结束时，系统推动其完成的最大尝试次数
  max_nudge_finish: 2

  # 输出验证失败的最大重试次数
  # Agent 输出不符合预期格式时的重试上限
  max_validation_retries: 3

# 调试配置
debug:
  # 是否启用详细的执行追踪
  # true: 记录详细的 Agent 执行过程到 trace 文件
  enable_trace: true

# CLI 展示配置
ui:
  # 是否默认禁用启动横幅
  # true: 不显示 DIG Lab 启动动画
  # false: 正常显示（可用 CLI `--no-banner` 临时覆盖）
  no_banner: false

  # 控制台安静模式。true 时只显示状态跳转、暂停、错误和最终结果；
  # 完整人类时间线仍写入 workspace/_runtime/logs/researchos.log。
  quiet: false

  # 控制台详细模式。true 时会额外显示 Agent 文本输出和 step token 摘要；
  # 仍不会显示完整 prompt/response，完整机器 trace 在 _runtime/traces/*.jsonl。
  verbose: false

# 网页抓取 allowlist
web_fetch:
  # 允许的协议列表
  allowed_schemes:
    - "http"
    - "https"

  # 允许抓取的主机列表
  # 留空表示不限制主机，只按 allowed_schemes 控制
  allowed_hosts: []

# LaTeX backend 配置
latex:
  # auto: latexmk -> tectonic -> export/wait；Docker fallback 仅在 allow_docker_fallback=true 时允许
  default_backend: "auto"
  allow_docker_fallback: false
  docker_image: "researchos/system:latest"

# Docker 镜像配置
docker:
  # 可选轻量镜像：用于隔离运行 CLI，不是默认实验/LaTeX 环境
  default_image: "researchos/system:latest"

  # 允许使用的 Docker 镜像白名单
  # 注意：只需配置实际会使用的镜像
  allowed_images:
    - "researchos/system:latest"

  default_memory_limit: "16g"
  build_context: "infra/docker"

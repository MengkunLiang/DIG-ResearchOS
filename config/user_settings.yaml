runtime:
  global_budget:
    default_max_budget_usd: 100.0
    warning_threshold: 0.7
    critical_threshold: 0.9
    stage_allocation:
      T1_init: 0.05
      T2_scout: 0.1
      T3_read: 0.15
      T4_ideation: 0.1
      T5_pilot: 0.2
      T7_full: 0.3
      T8_write: 0.08
      T9_submission: 0.02
  timeouts:
    max_agent_runtime: 7200
    max_tool_call: 180
    docker_operation: 7200
    latex_compile: 1800
    llm_call: 90
  retry_policy:
    llm_retries: 10
    llm_retry_delay: 1
    llm_timeout_cooldown_seconds: 60
    llm_timeout_pause_after_cooldowns: 0
    tool_retries: 5
    tool_retry_delay: 1
    validation_retries: 3
    no_retry_errors:
    - AuthenticationError
    - PermissionDenied
    - BudgetExceeded
  budget_escalation:
    enabled: true
    tasks: []
    max_extensions_per_run: null
    steps_increase_ratio: 0.25
    token_increase_ratio: 0.5
    wall_seconds_increase_ratio: 0.5
    max_validation_extensions_per_run: null
    validation_retry_increase: 2

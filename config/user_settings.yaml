# ResearchOS 日常配置入口
#
# 普通使用只改这份文件和 .env。底层完整表仍保留，但不是日常参数入口：
# - agent_params.yaml: agent 工具、权限、prompt、schema、behavior 能力声明
# - model_routing.yaml: endpoint/profile/fallback 候选定义
# - state_machine.yaml: 流程拓扑、节点输入输出和 gate 分支
#
# 单一所有权：
# - LLM 参数只在 llm.*：profile/tier/model/endpoint/max_context/temperature
# - 预算参数只在 budget.*：max_steps/max_tokens_total/max_wall_seconds/max_validation_retries/unlimited_budget
# - 超时/重试/扩限只在 runtime.*
#
# 覆盖关系：
# CLI/run-task 临时参数 > state_machine 少数强覆盖 > user_settings.yaml >
# agent_params.yaml/model_routing.yaml 能力默认 > Python fallback。

llm:
  default_profile: deepseek
  endpoints: {}
  profiles: {}
  defaults:
    profile: deepseek
    tier: medium
    max_context: 128000
    temperature: 0.3
  agents:
    pi:
      tier: heavy
      temperature: 0.3
      modes:
        evaluate:
          tier: heavy
          temperature: 0.2
    scout:
      tier: medium
      max_context: 1280000
      temperature: 0.5
    reader:
      tier: medium
      temperature: 0.5
    ideation:
      profile: ideation_deep
      tier: heavy
      temperature: 0.75
    novelty_auditor:
      tier: heavy
      temperature: 0.3
    experimenter:
      tier: medium
      temperature: 0.3
    writer:
      tier: heavy
      max_context: 1280000
      temperature: 0.7
    survey_writer:
      tier: heavy
      temperature: 0.55
    reviewer:
      tier: heavy
      temperature: 0.3
    submission:
      tier: medium
      max_context: 12800000
      temperature: 0.3
    hello:
      tier: medium
      model: deepseek-v4-flash
      endpoint: deepseek
      temperature: 0.3
    novelty:
      tier: medium
      max_context: 1280000
      temperature: 0.3


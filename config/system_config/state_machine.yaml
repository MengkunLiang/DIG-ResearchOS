      external_executor_dir: external_executor
      experiment_evidence_pack: drafts/experiment_evidence_pack.json
      result_to_claim: drafts/result_to_claim.json
      paper_claim_audit: drafts/paper_claim_audit.md
      synthesis: literature/synthesis.md
      literature_manifest: literature/literature_manifest.json
      related_work_bib: literature/related_work.bib
      ablations: experiments/ablations.csv
      sections_dir: drafts/sections
      manuscript_resource_index: drafts/manuscript_resource_index.json
      evidence_plan: drafts/evidence_plan.json
      figure_table_plan: drafts/figure_table_plan.json
      cdr_claim_ledger: drafts/cdr_claim_ledger.json
      claim_ledger: drafts/claim_ledger.json
      figure_registry: drafts/figure_registry.json
      manuscript_audit: drafts/manuscript_audit.md
      craft_audit: drafts/craft_audit.md
      alignment_matrix: drafts/alignment_matrix.json
    outputs:
      revision_patches: drafts/patches/round_2_patches.json
      revision_response: drafts/revision_response_round_2.md
      paper: drafts/paper.tex                           # 修订后的论文
      manuscript_audit: drafts/manuscript_audit.md       # 更新后的机械审计
      craft_audit: drafts/craft_audit.md
      paper_claim_audit: drafts/paper_claim_audit.md
      paper_claim_audit_json: drafts/paper_claim_audit.json
    next_on_success: T8-PAPER-CLAIM-AUDIT
    next_on_failure: failed

  # T8-PAPER-CLAIM-AUDIT 状态：论文 claim 与 evidence pack 的最终一致性审计
  # 用途：进入 T9 前用零上下文审计检查 paper.tex 中实验数字/claim 是否有 result-to-claim 支撑。
  T8-PAPER-CLAIM-AUDIT:
    agent: writer
    mode: paper_claim_audit
    inputs:
      project: project.yaml
      paper: drafts/paper.tex
      executor_research_report: external_executor/executor_research_report.md
      external_executor_dir: external_executor
      result_to_claim: drafts/result_to_claim.json
      experiment_evidence_pack: drafts/experiment_evidence_pack.json
      post_experiment_novelty_check: novelty/post_experiment_novelty_check.json
      must_not_claim: drafts/must_not_claim.md
      claim_ledger: drafts/claim_ledger.json
    outputs:
      paper_claim_audit: drafts/paper_claim_audit.md
      paper_claim_audit_json: drafts/paper_claim_audit.json
    next_on_success: T9
    next_on_failure: T8-REVISE-2

  # T9 状态：投稿准备（Submission Preparation）
  # 用途：将论文迁移到目标会议格式，匿名化检查，编译验证
  # Agent：submission（投稿准备）
  T9:
    agent: submission
    inputs:
      project: project.yaml                         # 项目配置
      paper: drafts/paper.tex                         # 论文草稿
      related_work_bib: literature/related_work.bib    # 引用库
      paper_claim_audit: drafts/paper_claim_audit.md
      paper_claim_audit_json: drafts/paper_claim_audit.json
      result_to_claim: drafts/result_to_claim.json
      experiment_evidence_pack: drafts/experiment_evidence_pack.json
    outputs:
      bundle_dir: submission/bundle                  # 投稿包目录
      migration_report: submission/migration_report.md  # 迁移报告
      main_tex: submission/bundle/main.tex
      references_bib: submission/bundle/references.bib
      main_pdf: submission/bundle/main.pdf
      compile_log: submission/bundle/main.log
      compile_report: submission/compile_report.json
    gate:
      type: submission_gate
      prompt: |
        投稿包准备完成。请审核：
        - migration_report.md 中的迁移详情
        - submission/bundle/ 中的文件
        - 匿名化检查结果

        确认无误后，工作流结束。确认继续吗？
    next_on_success: done
    next_on_failure: T8-WRITE  # 允许返回修改论文

  # ========================================
  # 终止状态
  # ========================================

  # done 状态：成功完成
  # 工作流正常结束
  done:
    terminal: true

  # failed 状态：失败终止
  # 工作流因错误而终止
  failed:
    terminal: true

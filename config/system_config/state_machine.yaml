    next_on_failure: failed

  # T3.6-POST-SURVEY-GATE 状态：综述完成后询问是否结束
  # 用途：T3.6 可能是用户的最终目标；不要在 survey 生成后未经确认自动进入 T4。
  T3.6-POST-SURVEY-GATE:
    agent: survey_writer
    mode: post_survey_gate
    extra:
      immediate_gate: true
    gate: t36_post_survey_gate
    inputs:
      project: project.yaml
      survey_summary: drafts/survey/survey_summary.md
      survey_compile_report: drafts/survey/survey_compile_report.json
      survey_insights: ideation/survey_insights.json
    outputs:
      post_survey_decision: drafts/survey/post_survey_decision.json
    next_on_success: __parse_from_output__
    next_on_failure: failed

  # T4 状态：Research Idea Formation & Evolution
  # 用途：确认运行方式后建立 Evidence Index，形成并进化 Candidate Population，最后停在 Gate1。
  # Agent：ideation（由内部 evolution controller 协调 Generator / Scorer / Evolver）
  T4:
    agent: ideation
    inputs:
      project: project.yaml                             # 项目配置
      synthesis: literature/synthesis.md               # 文献综述
      literature_manifest: literature/literature_manifest.json # 跨任务统一文献清单
      comparison_table: literature/comparison_table.csv # 方法对比表
      resource_catalog: literature/resource_catalog.jsonl # 论文与补充检索的代码、数据、benchmark、模型线索
      resource_catalog_summary: literature/resource_catalog_summary.json # 资源发现覆盖与使用边界
      missing_areas: literature/missing_areas.md       # 研究空白
      domain_map: literature/domain_map.json            # 引用图领域地图与 novelty 近邻信号
      bridge_domain_plan: literature/bridge_domain_plan.json # T1 已确认的 bridge 召回/裁决计划（可为空计划）
      synthesis_workbench: literature/synthesis_workbench.json # 结构化综述工作台
      survey_insights: ideation/survey_insights.json    # 可选：T3.6 综述支线导出的 taxonomy/challenge/future 素材
      seed_ideas: user_seeds/seed_ideas.md            # 种子想法（可选）
      seed_constraints: user_seeds/seed_constraints.md # 种子约束（可选）
      deep_read_notes_dir: literature/deep_read_notes # 全文/部分全文论文阅读笔记（可选）
      shallow_read_notes_dir: literature/shallow_read_notes # 摘要级论文阅读笔记（可选）
      bridge_notes_dir: literature/bridge_notes # Bridge 文献阅读笔记（可选）
      bridge_catalog_index: literature/cross_domain_catalogs/index.json
      cross_domain_catalogs_dir: literature/cross_domain_catalogs
    outputs:
      evidence_index: ideation/evidence/evidence_index.jsonl # Evidence Index 与 Permission
      evolution_state: ideation/evolution/state.json   # 当前 Population 指针与 fingerprint
      portfolio: ideation/portfolio.json                # Gate1 展示的 1-3 个 Candidate
      family_distribution: ideation/_family_distribution.md  # Idea Family compatibility view
      pass1_forward_candidates: ideation/_pass1_forward_candidates.json # Pass1 原始发散候选池
      pass2_grounding_review: ideation/_pass2_grounding_review.json # Pass2 文献接地/风险审阅
      candidate_directions: ideation/_candidate_directions.json # 主线与补充候选方向池
      gate1_candidate_cards: ideation/_gate1_candidate_cards.md # Gate1 用户可读候选卡片
      gate1_selection_brief: ideation/_gate1_selection_brief.md # Gate1 全量候选选择简报
      final_portfolio_cards: ideation/final_cards/portfolio_cards.json # Portfolio 完整 LLM Idea Card；缺失时进入定向修复
    optional_outputs:
      bridge_coverage_review: ideation/bridge_coverage_review.json # 已确认 bridge 候选的上桌/裁决/逃生舱记录
      hypothesis_brief: ideation/hypothesis_brief.yaml # 完整选择后生成的 Pre-Novelty brief
      selected_candidate: ideation/selected/selected_candidate.json
      t45_search_targets: ideation/selected/t45_search_targets.json
      pre_novelty_brief: ideation/selected/pre_novelty_brief.md
      risks: ideation/risks.md                          # legacy compatibility projection
      idea_rationales: ideation/idea_rationales.json    # legacy compatibility projection
      idea_scorecard: ideation/idea_scorecard.yaml      # legacy compatibility projection
      rejected_ideas: ideation/rejected_ideas.md        # legacy compatibility projection
      selected_idea_brief: ideation/selected_idea_brief.md # legacy compatibility projection
      gate_decisions: ideation/gate_decisions.json      # legacy compatibility projection
    next_on_success: T4.5
    next_on_failure: failed  # T4 内部已有 validation retry；候选池失败时保留真实错误，避免同参数死锁

  # T4-GATE1 状态：Candidate Portfolio 人工决策
  # 用途：T4 的 native Population 与保留的 Pass1/Pass2 projection 已就绪后，
  # runtime 在这里支持选择、并行推进、Evolution、Crossover、组合、回滚或暂停。
  T4-GATE1:
    agent: ideation
    extra:
      immediate_gate: true
    gate: t4_gate1_selection_gate
    inputs:
      candidate_directions: ideation/_candidate_directions.json
      final_portfolio_cards: ideation/final_cards/portfolio_cards.json
      gate1_candidate_cards: ideation/_gate1_candidate_cards.md
      gate1_selection_brief: ideation/_gate1_selection_brief.md
      pass1_forward_candidates: ideation/_pass1_forward_candidates.json
      pass2_grounding_review: ideation/_pass2_grounding_review.json
      bridge_coverage_review: ideation/bridge_coverage_review.json
    outputs:
      gate1_user_selection: ideation/_gate1_user_selection.json
    optional_outputs:
      gate1_user_selection: ideation/_gate1_user_selection.json
    # Generic/legacy proceed_candidate fallback must match the public Gate
    # semantics: selected complete Candidate enters the T4.5 novelty gate.
    # Native evolution directives override this only for explicit evolution.
    next_on_success: T4.5
    next_on_failure: failed

  # T4.5 状态：新颖性审计（Novelty Auditing）
  # 用途：评估研究假设的新颖性和可行性
  # Agent：novelty_auditor（新颖性审计员）
  T4.5:
    agent: novelty_auditor
    inputs:
      project: project.yaml                             # 输入：项目配置
      hypothesis_brief: ideation/hypothesis_brief.yaml  # T4 Gate1 选择后的 Pre-Novelty draft bundle
      selected_candidate: ideation/selected/selected_candidate.json
      t45_search_targets: ideation/selected/t45_search_targets.json
      synthesis: literature/synthesis.md                # 输入：文献综述
      literature_manifest: literature/literature_manifest.json # 跨任务统一文献清单
      comparison_table: literature/comparison_table.csv # 输入：对比表
      resource_catalog: literature/resource_catalog.jsonl # 可行性、官方 baseline 与待核验资源线索
      resource_catalog_summary: literature/resource_catalog_summary.json
      deep_read_notes_dir: literature/deep_read_notes           # 可选：section 级全文/部分全文证据卡
      bridge_notes_dir: literature/bridge_notes # 可选：跨域证据卡
      bridge_domain_plan: literature/bridge_domain_plan.json # Cross-domain 检索/裁决计划
      bridge_catalog_index: literature/cross_domain_catalogs/index.json
      cross_domain_catalogs_dir: literature/cross_domain_catalogs
      shallow_read_notes_dir: literature/shallow_read_notes # 可选：摘要线索卡，不能单独确认碰撞
    outputs:
      novelty_audit: ideation/novelty_audit.md          # 新颖性审计报告
      mechanism_tuples_dir: ideation/_mechanism_tuples   # mechanism tuple 中间产物
      design_rationale_tuples_dir: ideation/_design_rationale_tuples # CDR design-rationale tuple 中间产物
    optional_outputs:
      collision_cases: ideation/collision_cases.md       # 条件输出：High/Medium Overlap 时必须存在
      hypotheses: ideation/hypotheses.md                 # 仅 Final Gate Verdict 通过后由 T4.5 正式编译
      research_dossier: ideation/research_dossier.json   # 假设、贡献、意义和风险的结构化档案
      exp_plan: ideation/exp_plan.yaml
      contribution_hypothesis_map: ideation/contribution_hypothesis_map.yaml
      validation_map: ideation/validation_map.yaml
      kill_criteria: ideation/kill_criteria.yaml
      research_proposal: ideation/proposal/research_proposal.md # T4/T4.5 证据、假设、设计和风险整合的完整研究方案
      proposal_manifest: ideation/proposal/proposal_manifest.json # Proposal 章节来源、T5 传递角色与 freshness 锚点
      formalization_manifest: ideation/post_novelty_formalization.json
    # 当前主链默认跳过 legacy T5 pilot 与 legacy T6 novelty-final，但必须尊重 T4.5 Final Gate Verdict。
    # pass* 进入 T5-REBOOST-GATE 外部实验协议链；return/drop/reject/collision 进入人工审阅 gate，
    # 由用户决定外部实验链/T4/stop。
    next_on_success: __parse_from_output__
    next_on_failure: failed

  # T4.5-HUMAN-REVIEW 状态：T4.5 非通过 verdict 的人工决策
  # 用途：Novelty Auditor 可提出 reframe/drop，但不能自动拒绝或自动回退，避免 T4.5-T4 死循环。
  T4.5-HUMAN-REVIEW:
    agent: novelty_auditor
    mode: human_review
    extra:
      immediate_gate: true
    inputs:
      project: project.yaml
      hypothesis_brief: ideation/hypothesis_brief.yaml
      novelty_audit: ideation/novelty_audit.md
      selected_candidate: ideation/selected/selected_candidate.json
      selected_idea_brief: ideation/selected_idea_brief.md
      gate1_selection_brief: ideation/_gate1_selection_brief.md
      rejected_ideas: ideation/rejected_ideas.md
    outputs:
      novelty_human_review: ideation/novelty_human_review.json
    gate:
      type: t45_human_review_gate
    next_on_success: __parse_from_output__
    next_on_failure: failed

  # T5-REBOOST-GATE 状态：先由确定性编译器基于 T4.5 正式产物发布交接；
  # legacy LLM candidate 仅能作为受审计输入，不能成为交接完成的前置条件。
  # 用途：把研究目标、方法机制、baseline、claim/evidence 边界重排成外部执行器上下文，
  # 并编译外部执行器 handoff、AGENTS/CLAUDE 控制说明、schema 和 allowed paths。
  # 项目专属 Skill Suite 在下一节点独立生成，以便编译、发布和审阅各自可恢复。
  T5-REBOOST-GATE:
    agent: experimenter
    mode: reboost
    extra:
      user_request: |
        请执行 T5-REBOOST：以 T4.5 已通过的正式产物为唯一权威来源，调用
        compile_research_reboost_handoff() 编译、发布并独立校验 handoff。若存在
        `ideation/proposal/research_proposal.md` 与 proposal manifest，必须作为 planning context 保留，
        但不能当作实验结果。若存在 literature/resource_catalog，则只作为 Phase B 待核验线索，不能把
        链接写成已下载、可运行、许可合格或实验结果。不要执行实验、实现代码、选择执行器或写 result_pack。
        若编译器报告缺失材料或契约不一致，保留具体诊断并暂停；不得调用模型臆造 T4.5 证据、基线或执行约束。
    inputs:
      project: project.yaml
      hypotheses: ideation/hypotheses.md
      research_dossier: ideation/research_dossier.json
      research_proposal: ideation/proposal/research_proposal.md
      proposal_manifest: ideation/proposal/proposal_manifest.json
      exp_plan: ideation/exp_plan.yaml
      selected_candidate: ideation/selected/selected_candidate.json
      kill_criteria: ideation/kill_criteria.yaml
      validation_map: ideation/validation_map.yaml
      contribution_hypothesis_map: ideation/contribution_hypothesis_map.yaml
      novelty_audit: ideation/novelty_audit.md
      synthesis: literature/synthesis.md
      synthesis_workbench: literature/synthesis_workbench.json
      domain_map: literature/domain_map.json
      comparison_table: literature/comparison_table.csv
      resource_catalog: literature/resource_catalog.jsonl
      resource_catalog_summary: literature/resource_catalog_summary.json
      deep_read_notes_dir: literature/deep_read_notes
      bridge_notes_dir: literature/bridge_notes
      shallow_read_notes_dir: literature/shallow_read_notes
      literature_manifest: literature/literature_manifest.json
      notes_manifest: literature/notes_manifest.json
      bridge_domain_plan: literature/bridge_domain_plan.json
      bridge_catalog_index: literature/cross_domain_catalogs/index.json
      cross_domain_catalogs_dir: literature/cross_domain_catalogs
    outputs:
      handoff_pack: external_executor/handoff_pack.json
      reboost_report: external_executor/report/reboost_report.json
      reboost_validation_report: external_executor/report/reboost_validation_report.json
      paper_card_evidence_index: external_executor/paper_card_evidence_index.json
      expected_outputs_schema: external_executor/expected_outputs_schema.json
      allowed_paths: external_executor/allowed_paths.txt
      agents_md: external_executor/AGENTS.md
      claude_md: external_executor/CLAUDE.md
    next_on_success: T5-SPECIALIZE-EXECUTOR-SKILLS
    next_on_failure: failed

  # T5-HANDOFF 状态：legacy 兼容入口，外部实验执行器协议编译
  # 用途：ResearchOS 编译实验契约、allowed paths 与 AGENTS/CLAUDE 执行控制说明。
  # 注意：推荐新路径为 T5-REBOOST -> T5-SPECIALIZE-EXECUTOR-SKILLS -> T5-EXECUTOR-GATE。
  T5-HANDOFF:
    agent: experimenter
    mode: handoff
    inputs:
      project: project.yaml
      hypotheses: ideation/hypotheses.md
      research_proposal: ideation/proposal/research_proposal.md
      proposal_manifest: ideation/proposal/proposal_manifest.json
      exp_plan: ideation/exp_plan.yaml
      risks: ideation/risks.md
      novelty_audit: ideation/novelty_audit.md
      idea_scorecard: ideation/idea_scorecard.yaml
      synthesis: literature/synthesis.md
      literature_manifest: literature/literature_manifest.json
      comparison_table: literature/comparison_table.csv
      deep_read_notes_dir: literature/deep_read_notes
      bridge_notes_dir: literature/bridge_notes
      bridge_domain_plan: literature/bridge_domain_plan.json
      bridge_catalog_index: literature/cross_domain_catalogs/index.json
      cross_domain_catalogs_dir: literature/cross_domain_catalogs
      shallow_read_notes_dir: literature/shallow_read_notes
      notes_manifest: literature/notes_manifest.json
    outputs:
      handoff_pack: external_executor/handoff_pack.json
      expected_outputs_schema: external_executor/expected_outputs_schema.json
      allowed_paths: external_executor/allowed_paths.txt
      executor_selection: external_executor/report/executor_selection.json
      input_manifest: external_executor/input_manifest.json
      agents_md: external_executor/AGENTS.md
      claude_md: external_executor/CLAUDE.md
      external_readme: external_executor/README.md
      dir_guide: external_executor/_DIR_GUIDE.md
      job_state: external_executor/job_state.json
      expr_dir: external_executor/expr
    next_on_success: T5-SPECIALIZE-EXECUTOR-SKILLS
    next_on_failure: failed

  # T5-SPECIALIZE-EXECUTOR-SKILLS 状态：通过仓库级 Skill 发布项目专属 Skill Suite。
  # 用途：ResearchOS 调用 LLM 执行 skills/project-skill-specialization/SKILL.md；
  # Skill 调用确定性 wrapper 生成 Suite，ResearchOS 再做独立 validate-only 校验。
  T5-SPECIALIZE-EXECUTOR-SKILLS:
    skill: project-skill-specialization
    mode: build
    tools:
      allowed_read_prefixes:
        - ""
        - project.yaml
        - external_executor/
        - ideation/
        - literature/
        - novelty/
        - user_seeds/
      allowed_write_prefixes:
        - external_executor/
    extra:
      user_request: |
        Execute the repository skill `project-skill-specialization` for the current
        ResearchOS workspace in build mode.

        Workspace: <resolved by runtime>
        Repository root: <resolved by runtime>

        Use the Skill's bundled preflight, specialization, and report-summary scripts.
        Do not manually create or edit project_skill_context.yaml.
        Do not directly rewrite Project-Specific Guidance.
        Do not modify content outside reserved markers.
        Finish only after reading the durable specialization report.
    inputs:
      project: project.yaml
      handoff_pack: external_executor/handoff_pack.json
      expected_outputs_schema: external_executor/expected_outputs_schema.json
      allowed_paths: external_executor/allowed_paths.txt
      agents_md: external_executor/AGENTS.md
      # Optional contextual input layer.  Catalog records support project-Skill
      # framing and retrieval planning; canonical paper notes remain the only
      # source for direct research claims or verified citations.
      bridge_domain_plan: literature/bridge_domain_plan.json
      bridge_catalog_index: literature/cross_domain_catalogs/index.json
      cross_domain_catalogs_dir: literature/cross_domain_catalogs
    outputs:
      project_skill_context: external_executor/project_skill_context.yaml
      project_skill_context_schema: external_executor/schemas/project_skill_context.schema.json
      skills_dir: external_executor/skills
      skill_specialization_report: external_executor/report/skill_specialization_report.json
      skill_specialization_execution: external_executor/report/skill_specialization_execution.json
    next_on_success: T5-PROTOCOL-GATE
    next_on_failure: failed

  # T5-PROTOCOL-GATE 状态：区分“handoff 已编译”与“已经授权真实运行”。
  # 资源、版本、环境与其他可来源核验的运行项可先经受限 Phase A/B 自动准备；
  # 完整实验只会在不改变 T4.5 研究边界时获授权。此 Gate 不是运行时错误或重试循环。
  T5-PROTOCOL-GATE:
    agent: experimenter
    mode: executor_gate
    extra:
      immediate_gate: true
    inputs:
      handoff_pack: external_executor/handoff_pack.json
      reboost_report: external_executor/report/reboost_report.json
      research_proposal: ideation/proposal/research_proposal.md
      exp_plan: ideation/exp_plan.yaml
      agents_md: external_executor/AGENTS.md
    outputs:
      protocol_gate_decision: external_executor/report/protocol_gate_decision.json
    gate:
      type: t5_protocol_gate
    next_on_success: T5-PROTOCOL-GATE
    next_on_failure: failed

  # T5-EXPR-MATERIAL-GATE 状态：实验材料放置确认
  # 用途：T5 re-boost 与 skill 编译完成后，可选地盘点用户已有 dataset、baseline、
  # benchmark、repo 和权重等源材料；缺少这些资源时应优先使用受限自动准备分支。
  # 已可运行的部署资产可放在 external_executor/expr/。节点 ID 和决策路径保留，避免打断旧 workspace 的恢复。
  T5-EXPR-MATERIAL-GATE:
    agent: experimenter
    mode: executor_gate
    extra:
      immediate_gate: true
    inputs:
      handoff_pack: external_executor/handoff_pack.json
      expected_outputs_schema: external_executor/expected_outputs_schema.json
      expr_dir: external_executor/expr
      agents_md: external_executor/AGENTS.md
    outputs:
      materials_gate_decision: external_executor/expr/materials_gate_decision.json
    gate:
      type: t5_expr_material_gate
    next_on_success: __parse_from_output__
    next_on_failure: failed

  # T5-EXECUTOR-GATE 状态：外部执行器选择
  # 用途：由用户显式选择 mock/Claude Code/Codex CLI/manual，不让完整主链默认混入 mock 结果。
  T5-EXECUTOR-GATE:
    agent: experimenter
    mode: executor_gate
    extra:
      immediate_gate: true
    inputs:
      handoff_pack: external_executor/handoff_pack.json
      expected_outputs_schema: external_executor/expected_outputs_schema.json
      allowed_paths: external_executor/allowed_paths.txt
      agents_md: external_executor/AGENTS.md
      claude_md: external_executor/CLAUDE.md
      project_skill_context: external_executor/project_skill_context.yaml
      project_skill_context_schema: external_executor/schemas/project_skill_context.schema.json
      skills_dir: external_executor/skills
      skill_specialization_report: external_executor/report/skill_specialization_report.json
      skill_specialization_execution: external_executor/report/skill_specialization_execution.json
    outputs:
      executor_selection: external_executor/report/executor_selection.json
    gate:
      type: t5_executor_gate
    next_on_success: __parse_from_output__
    next_on_failure: failed

  # T5-RESOURCE-PREP-EXECUTOR-GATE：协议存在非阻断未决项时，允许外部执行器
  # 仅运行 Phase A/B，自动检索、获取和静态审查公开资源；它不能实现或运行实验。
  T5-RESOURCE-PREP-EXECUTOR-GATE:
    agent: experimenter
    mode: executor_gate
    extra:
      immediate_gate: true
      execution_scope: resource_preparation
    inputs:
      handoff_pack: external_executor/handoff_pack.json
      expected_outputs_schema: external_executor/expected_outputs_schema.json
      allowed_paths: external_executor/allowed_paths.txt
      agents_md: external_executor/AGENTS.md
      claude_md: external_executor/CLAUDE.md
      project_skill_context: external_executor/project_skill_context.yaml
      project_skill_context_schema: external_executor/schemas/project_skill_context.schema.json
      skills_dir: external_executor/skills
      skill_specialization_report: external_executor/report/skill_specialization_report.json
      skill_specialization_execution: external_executor/report/skill_specialization_execution.json
    outputs:
      executor_selection: external_executor/report/executor_selection.json
    gate:
      type: t5_resource_executor_gate
    next_on_success: __parse_from_output__
    next_on_failure: failed

  # T5-RESOURCE-PREP-WAIT：等待受限外部执行器完成 Phase B；其完成不等于实验或 T8 handoff。
  T5-RESOURCE-PREP-WAIT:
    agent: experimenter
    mode: resource_prepare_wait
    inputs:
      executor_selection: external_executor/report/executor_selection.json
      handoff_pack: external_executor/handoff_pack.json
      expected_outputs_schema: external_executor/expected_outputs_schema.json
      allowed_paths: external_executor/allowed_paths.txt
      resource_preparation_report: external_executor/report/phase_B/resource_preparation_report.json
      resource_validation_report: external_executor/report/phase_B/validation_report.json
      resource_source_report: external_executor/report/phase_B/resource_source_report.json
    outputs:
      resource_preparation_acceptance: external_executor/report/resource_preparation_acceptance.json
    next_on_success: T5-REBOOST-GATE
    next_on_failure: failed

  # T5-EXTERNAL-WAIT 状态：等待外部执行器写回结果材料
  # 用途：不启动 LLM；runtime 检查 executor_research_report.md、result_pack.json 和 executor_status.json。
  # 外部执行阶段的 T8 核心交接材料为 external_executor/executor_research_report.md。
  # 缺失执行状态时 PAUSED；现代外部 Skill 完成后由总控直接调用 run-task T8 接收材料并进入 T8。
  T5-EXTERNAL-WAIT:
    agent: experimenter
    mode: external_wait
    inputs:
      executor_selection: external_executor/report/executor_selection.json
      handoff_pack: external_executor/handoff_pack.json
      expected_outputs_schema: external_executor/expected_outputs_schema.json
      allowed_paths: external_executor/allowed_paths.txt
      result_pack: external_executor/result_pack.json
      executor_status: external_executor/executor_status.json
      executor_research_report: external_executor/executor_research_report.md
      external_executor_dir: external_executor
    outputs:
      wait_acceptance_report: external_executor/wait_acceptance_report.json
    next_on_success: T8-STYLE-GATE
    next_on_failure: failed

  # T5-DRY-RUN 状态：mock 外部执行器协议 dry-run
  # 用途：不跑真实实验，只验证 handoff/result_pack/status 文件协议可端到端通过。
  # 成功后必须回到执行器选择；mock 产物不能作为 T8 的研究证据。
  T5-DRY-RUN:
    agent: experimenter
    mode: dry_run
    inputs:
      executor_selection: external_executor/report/executor_selection.json
      handoff_pack: external_executor/handoff_pack.json
      expected_outputs_schema: external_executor/expected_outputs_schema.json
    outputs:
      result_pack: external_executor/result_pack.json
      executor_status: external_executor/executor_status.json
      run_manifest: external_executor/report/run_manifest.json
      heartbeat: external_executor/heartbeat.json
      raw_results_dir: external_executor/raw_results
      configs_dir: external_executor/configs
      logs_dir: external_executor/logs
    next_on_success: T5-EXECUTOR-GATE
    next_on_failure: failed

  # T5 状态：legacy 试点实验（仅兼容显式 run-task，不在主链自动使用）
  # 用途：旧模式由 ResearchOS 内部执行小规模试点实验；新主链使用 T5-REBOOST + external executor。
  T5:
    agent: experimenter
    mode: pilot
    inputs:
      project: project.yaml                             # 项目配置
      hypotheses: ideation/hypotheses.md               # 研究假设
      exp_plan: ideation/exp_plan.yaml                 # 实验计划
      risks: ideation/risks.md                       # 风险评估
    outputs:
      pilot_plan: pilot/pilot_plan.yaml              # 试点计划
      pilot_code: pilot/pilot_code                    # 试点代码
      pilot_results: pilot/pilot_results.json        # 试点实验结果
      motivation_validation: pilot/motivation_validation.md  # 动机验证报告
    next_on_success: T6
    next_on_failure: T4

  # T6 状态：legacy 新颖性最终验证（仅兼容显式 run-task，不在主链自动使用）
  # 用途：基于 legacy Pilot 结果验证新颖性，补充必须的基线方法。
  # Agent：novelty（新颖性验证）
  T6:
    agent: novelty
    inputs:
      project: project.yaml
      hypotheses: ideation/hypotheses.md               # 研究假设
      exp_plan: ideation/exp_plan.yaml               # 实验计划
      pilot_results: pilot/pilot_results.json       # 试点结果
      motivation_validation: pilot/motivation_validation.md  # 动机验证
      novelty_audit: ideation/novelty_audit.md      # T4.5 新颖性预审结果
      comparison_table: literature/comparison_table.csv # 方法对比表
      synthesis: literature/synthesis.md             # 文献综述
    outputs:
      novelty_report: novelty/novelty_report.md        # 新颖性报告
      collision_cases: novelty/collision_cases.md     # 潜在撞车案例（如有）
      must_add_baselines: novelty/must_add_baselines.md # 必须补充的基线方法
    gate:
      type: novelty_gate
      prompt: |
        新颖性评估完成。判定：{verdict}

        - PASS: 继续完整实验
        - REVISE: 需要修改假设（建议方案见 novelty_report.md）
        - FAIL: 新颖性不足，需要重新构思

        是否继续？
    next_on_success: done
    next_on_failure: T4

  # T8-STYLE-GATE 状态：写作风格确认

    next_on_failure: T3.6-REVIEW

  # T3.6-COMPILE 状态：编译 survey.tex 为 PDF
  # 用途：验证 survey 分章节写作产物能形成可读 PDF；auto 后端优先本机 TeX，缺失时使用配置的 Docker TeX 镜像；仅在两者均不可用或源文件有误时暂停。
  T3.6-COMPILE:
    agent: survey_writer
    mode: survey_compile
    inputs:
      project: project.yaml

# ResearchOS State Machine 配置文件
# 定义 ResearchOS 的工作流状态机，控制 Agent 的执行顺序和数据流
#
# 配置结构：
# initial_state: <state_name>    # 初始状态（工作流入口）
# states:                        # 状态定义
#   <state_name>:
#     agent: <agent_name>        # 使用的 Agent
#     mode: <mode>               # Agent 模式（可选）
#     inputs:                    # 输入文件映射
#       <key>: <file_path>
#     outputs:                   # 输出文件映射
#       <key>: <file_path>
#     next_on_success: <state>   # 成功后的下一状态
#     next_on_failure: <state>   # 失败后的下一状态
#     terminal: true             # 是否为终止状态（可选）
#
# 当前支持的工作流：
# 1. HELLO - 调试用的最小 runtime smoke task（只建议 run-task 显式调用）
# 2. T1-T9 - 正式研究 workflow
#
# 使用方式：
# - 调试 HELLO：`researchos run-task HELLO --workspace ...`
# - 完整流程：initial_state: T1

# 初始状态配置
# 正式主流程必须从 T1 开始，不能把 HELLO 挂在默认主链入口。
initial_state: T1

states:
  # ========================================
  # 调试 Workflow
  # ========================================

  # HELLO 状态：简单的 Hello World 测试
  # 用途：验证 Runtime 基本功能
  # Agent：hello（输出简单的问候消息）
  HELLO:
    agent: hello
    outputs:
      hello_file: hello.txt      # 输出文件：问候消息
    next_on_success: done        # 成功后进入 done 状态
    next_on_failure: failed      # 失败后进入 failed 状态

  # ========================================
  # T1-T9 正式研究 Workflow
  # ========================================

  # T1 状态：项目初始化（Project Initialization）
  # 用途：创建研究项目，定义研究问题和目标
  # Agent：pi（Project Initializer）
  # 模式：init
  T1:
    agent: pi
    mode: init
    outputs:
      project: project.yaml      # 项目配置文件
      bridge_domain_plan: literature/bridge_domain_plan.json # T2 跨领域检索计划，可为空
      state: state.yaml          # 项目状态文件
    next_on_success: T2-PARAM-GATE
    next_on_failure: failed

  # T2-PARAM-GATE 状态：文献检索/阅读覆盖参数确认
  # 用途：T2/T3 的保留候选数、深读目标、摘要级轻读和 metadata-only 处理会显著影响
  # 资源消耗与综述质量，必须先用人类可读语义确认，而不是只藏在全局 yaml。
  T2-PARAM-GATE:
    agent: scout
    mode: literature_param_gate
    extra:
      immediate_gate: true
    inputs:
      project: project.yaml
      seed_outline_profile: user_seeds/seed_outline_profile.json
      bridge_domain_plan: literature/bridge_domain_plan.json
    outputs:
      literature_params: literature/literature_params.json
    gate:
      type: t2_literature_param_gate
    next_on_success: T2-PARAM-CONFIRM-GATE
    next_on_failure: failed

  # T2-PARAM-CONFIRM-GATE 状态：参数选择后的最终确认
  # 用途：用户选完覆盖参数后，再用人类可读摘要确认是否正式进入 T2；
  # 避免自定义数字输入后没有“确认/返回重选/结束”的明确 gate。
  T2-PARAM-CONFIRM-GATE:
    agent: scout
    mode: literature_param_confirm_gate
    extra:
      immediate_gate: true
    inputs:
      project: project.yaml
      literature_params: literature/literature_params.json
      seed_outline_profile: user_seeds/seed_outline_profile.json
      bridge_domain_plan: literature/bridge_domain_plan.json
    outputs:
      literature_params_confirmation: literature/literature_params_confirmation.json
    gate:
      type: t2_literature_param_confirm_gate
    next_on_success: __parse_from_output__
    next_on_failure: failed

  # T2 状态：文献检索（Literature Scouting）
  # 用途：搜索相关文献，构建初步文献库
  # Agent：scout（文献侦察员）
  T2:
    agent: scout
    inputs:
      project: project.yaml                            # 项目配置
      literature_params: literature/literature_params.json # T2/T3 覆盖参数 gate 决策
      literature_params_confirmation: literature/literature_params_confirmation.json # 参数最终确认；缺失时应回到 T2-PARAM-CONFIRM-GATE
      seed_papers: user_seeds/seed_papers.jsonl        # 种子论文（可选）
      seed_pdfs: user_seeds/pdfs                       # 种子 PDF（可选）
      seed_constraints: user_seeds/seed_constraints.md # 种子约束（可选）
      seed_ideas: user_seeds/seed_ideas.md             # 种子想法（可选）
      seed_outline_profile: user_seeds/seed_outline_profile.json # 结构化 seed outline（可选）
      seed_external_resources: user_seeds/seed_external_resources.jsonl  # 外部资源（可选）
      bridge_domain_plan: literature/bridge_domain_plan.json # T1 交互生成的桥接领域计划（可空）
    outputs:
      papers_raw: literature/papers_raw.jsonl           # 原始检索结果
      papers_dedup: literature/papers_dedup.jsonl      # 保留候选集（上限见 active_pool_max）
      papers_verified: literature/papers_verified.jsonl # 保留候选集中已做 metadata verification 的论文
      papers_backlog: literature/papers_backlog.jsonl   # 保留候选集之外的 backlog 候选
      verification_failures: literature/verification_failures.jsonl # verification 失败清单
      citation_edges: literature/citation_edges.json     # 一跳出引/related_works 边，供 domain_map 与下游复用
      deep_read_queue: literature/deep_read_queue.jsonl # T3 精读队列
      domain_map: literature/domain_map.json             # 引用图领域地图，供 T3.5/T4/T8 复用
      access_audit: literature/access_audit.md         # PDF/可读性审计清单
      search_log: literature/search_log.md             # 检索日志
      missing_areas: literature/missing_areas.md       # 识别的研究空白
    next_on_success: T2-COVERAGE-GATE
    next_on_failure: failed

  # T2-COVERAGE-GATE 状态：T2 检索覆盖人工确认
  # 用途：T2 会在 missing_areas.md 中给出补检/复核建议。这里把这些建议转成正式
  # user gate，避免系统在有明显覆盖风险时不经确认直接进入 T3。
  T2-COVERAGE-GATE:
    agent: scout
    mode: coverage_gate
    extra:
      immediate_gate: true
    inputs:
      search_log: literature/search_log.md
      missing_areas: literature/missing_areas.md
      domain_map: literature/domain_map.json
      access_audit: literature/access_audit.md
      deep_read_queue: literature/deep_read_queue.jsonl
    outputs:
      coverage_decision: literature/coverage_decision.json
    gate:
      type: t2_coverage_gate
    next_on_success: T3
    next_on_failure: failed

  # T3 状态：深度阅读（Deep Reading）
  # 用途：深度阅读文献，提取关键信息
  # Agent：reader（文献阅读器）
  # 模式：read
  T3:
    agent: reader
    mode: read
    inputs:
      project: project.yaml                             # 输入：项目配置
      papers_dedup: literature/papers_dedup.jsonl       # 输入：去重论文列表
      papers_verified: literature/papers_verified.jsonl # 输入：已核验论文列表（优先）
      papers_backlog: literature/papers_backlog.jsonl   # 输入：保留候选集之外的轻量补读候选
      deep_read_queue_pending: literature/deep_read_queue_pending.jsonl # 输入：恢复运行时的剩余精读队列（优先）
      deep_read_queue: literature/deep_read_queue.jsonl # 输入：精读队列（优先）
      domain_map: literature/domain_map.json             # 输入：T2 引用图领域地图（邻接/边界提示）
      access_audit: literature/access_audit.md          # 输入：可读性审计
      missing_areas: literature/missing_areas.md        # 输入：研究空白
      seed_outline_profile: user_seeds/seed_outline_profile.json # 可选：结构化种子提纲，作为阅读维度先验
      seed_constraints: user_seeds/seed_constraints.md  # 可选：用户阅读/范围约束
      seed_external_resources: user_seeds/seed_external_resources.jsonl # 可选：法规/标准/外部资源线索
    outputs:
      paper_notes_dir: literature/paper_notes           # 论文笔记目录
      comparison_table: literature/comparison_table.csv # 方法对比表
      related_work_bib: literature/related_work.bib     # 相关工作引用
    optional_outputs:
      # paper_notes_abstract_dir 由 orchestrator hook 自动生成，不列入 required outputs
      # metadata_triage_report 由 orchestrator hook 自动生成，仅作缺资源候选的补取/升级线索
      paper_notes_abstract_dir: literature/paper_notes_abstract
      metadata_triage_report: literature/metadata_triage.md
    next_on_success: T3.5
    next_on_failure: failed

  # T3.5 状态：文献综合（Literature Synthesis）
  # 用途：综合文献信息，形成系统性理解
  # Agent：reader（文献阅读器）
  # 模式：synthesize
  T3.5:
    agent: reader
    mode: synthesize
    inputs:
      project: project.yaml                             # 输入：项目配置
      paper_notes_dir: literature/paper_notes           # 输入：论文笔记
      comparison_table: literature/comparison_table.csv # 输入：对比表
      missing_areas: literature/missing_areas.md        # 输入：研究空白
      domain_map: literature/domain_map.json             # 输入：引用图领域地图
      paper_notes_abstract_dir: literature/paper_notes_abstract # 输入：摘要级弱证据提示
      metadata_triage_report: literature/metadata_triage.md # 输入：metadata-only 候选补资源线索，不作 claim 证据
    outputs:
      synthesis: literature/synthesis.md                # 文献综述
      synthesis_workbench: literature/synthesis_workbench.json # 结构化证据工作台
      synthesis_outline: literature/synthesis_outline.md # 分阶段大纲
      synthesis_draft: literature/synthesis_draft.md    # 分阶段草稿
    next_on_success: T3.6-GATE-SURVEY
    next_on_failure: failed

  # T3.6-GATE-SURVEY 状态：可选综述论文支线入口
  # 用途：T3.5 synthesis.md 是 idea 燃料；这里询问是否额外撰写 taxonomy-driven survey paper。
  # Agent：survey_writer（综述论文写作）
  # 模式：survey_gate
  T3.6-GATE-SURVEY:
    agent: survey_writer
    mode: survey_gate
    extra:
      immediate_gate: true
    gate: t36_survey_gate
    inputs:
      project: project.yaml
      synthesis: literature/synthesis.md
      synthesis_workbench: literature/synthesis_workbench.json
      domain_map: literature/domain_map.json
      comparison_table: literature/comparison_table.csv
      seed_outline_profile: user_seeds/seed_outline_profile.json
      seed_ideas: user_seeds/seed_ideas.md
      seed_constraints: user_seeds/seed_constraints.md
      seed_external_resources: user_seeds/seed_external_resources.jsonl
    outputs:
      survey_decision: drafts/survey/decision.json
    next_on_success: __parse_from_output__
    next_on_failure: failed

  # T3.6-TEMPLATE-GATE 状态：综述写作语言与 LaTeX 模板确认
  # 用途：写 taxonomy plan 前先确认中文/英文基础模板、CCF 模板或 UTD/INFORMS 模板。
  T3.6-TEMPLATE-GATE:
    agent: survey_writer
    mode: template_gate
    extra:
      immediate_gate: true
    gate: t36_template_gate
    inputs:
      project: project.yaml
      survey_decision: drafts/survey/decision.json
      seed_outline_profile: user_seeds/seed_outline_profile.json
      seed_ideas: user_seeds/seed_ideas.md
      seed_constraints: user_seeds/seed_constraints.md
      seed_external_resources: user_seeds/seed_external_resources.jsonl
    outputs:
      writing_template: drafts/survey/writing_template.json
    next_on_success: T3.6-PLAN
    next_on_failure: failed

  # T3.6-PLAN 状态：综述 taxonomy 与章节大纲规划
  # 用途：LLM 基于 synthesis/workbench/domain_map/paper_notes 设计 taxonomy，而不是转写 synthesis.md。
  T3.6-PLAN:
    agent: survey_writer
    mode: survey_plan
    inputs:
      project: project.yaml
      synthesis: literature/synthesis.md
      synthesis_workbench: literature/synthesis_workbench.json
      domain_map: literature/domain_map.json
      comparison_table: literature/comparison_table.csv
      paper_notes_dir: literature/paper_notes
      paper_notes_abstract_dir: literature/paper_notes_abstract
      related_work_bib: literature/related_work.bib
      writing_template: drafts/survey/writing_template.json
      seed_outline_profile: user_seeds/seed_outline_profile.json
      seed_ideas: user_seeds/seed_ideas.md
      seed_constraints: user_seeds/seed_constraints.md
      seed_external_resources: user_seeds/seed_external_resources.jsonl
    outputs:
      survey_plan: drafts/survey/survey_plan.json
    next_on_success: T3.6-GATE-OUTLINE
    next_on_failure: failed

  # T3.6-GATE-OUTLINE 状态：人工确认/调整 taxonomy 大纲
  # 用途：taxonomy 是综述主轴，写正文前必须交给用户确认。
  T3.6-GATE-OUTLINE:
    agent: survey_writer
    mode: outline_gate
    inputs:
      project: project.yaml
      survey_plan: drafts/survey/survey_plan.json
      seed_outline_profile: user_seeds/seed_outline_profile.json
      seed_ideas: user_seeds/seed_ideas.md
      seed_constraints: user_seeds/seed_constraints.md
      seed_external_resources: user_seeds/seed_external_resources.jsonl
    outputs:
      survey_plan: drafts/survey/survey_plan.json
      outline_decision: drafts/survey/outline_decision.json
    next_on_success: T3.6-GATE-CORPUS
    next_on_failure: failed

  # T3.6-GATE-CORPUS 状态：人工选择综述素材范围
  # 用途：保守模式只用现有语料；完整模式触发一次性定向补检提示，不回到 T2/T4 循环。
  T3.6-GATE-CORPUS:
    agent: survey_writer
    mode: corpus_gate
    extra:
      immediate_gate: true
    gate: t36_corpus_gate
    inputs:
      project: project.yaml
      survey_plan: drafts/survey/survey_plan.json
      paper_notes_dir: literature/paper_notes
      paper_notes_abstract_dir: literature/paper_notes_abstract
      seed_outline_profile: user_seeds/seed_outline_profile.json
      seed_ideas: user_seeds/seed_ideas.md
      seed_constraints: user_seeds/seed_constraints.md
      seed_external_resources: user_seeds/seed_external_resources.jsonl
    outputs:
      corpus_decision: drafts/survey/corpus_decision.json
    next_on_success: __parse_from_output__
    next_on_failure: failed

  # T3.6-EXPAND 状态：一次性综述补检计划/记录
  # 用途：仅在用户选择完整模式时，围绕 taxonomy 空类生成定向补检记录与补读清单。
  T3.6-EXPAND:
    agent: survey_writer
    mode: survey_expand
    inputs:
      project: project.yaml
      survey_plan: drafts/survey/survey_plan.json
      corpus_decision: drafts/survey/corpus_decision.json
      domain_map: literature/domain_map.json
      papers_verified: literature/papers_verified.jsonl
      seed_outline_profile: user_seeds/seed_outline_profile.json
      seed_ideas: user_seeds/seed_ideas.md
      seed_constraints: user_seeds/seed_constraints.md
      seed_external_resources: user_seeds/seed_external_resources.jsonl
    outputs:
      survey_expansion: drafts/survey/survey_expansion.json
    next_on_success: T3.6-STATE
    next_on_failure: failed

  # T3.6-STATE 状态：初始化 survey_state 和 section outlines
  # 用途：把 taxonomy/outline 机械拆成逐 section 状态，不写正文。
  T3.6-STATE:
    agent: survey_writer
    mode: survey_state
    inputs:
      project: project.yaml
      survey_plan: drafts/survey/survey_plan.json
      corpus_decision: drafts/survey/corpus_decision.json
      survey_expansion: drafts/survey/survey_expansion.json
      synthesis: literature/synthesis.md
      synthesis_workbench: literature/synthesis_workbench.json
      domain_map: literature/domain_map.json
      comparison_table: literature/comparison_table.csv
      related_work_bib: literature/related_work.bib
      seed_outline_profile: user_seeds/seed_outline_profile.json
      seed_ideas: user_seeds/seed_ideas.md
      seed_constraints: user_seeds/seed_constraints.md
      seed_external_resources: user_seeds/seed_external_resources.jsonl
    outputs:
      survey_state: drafts/survey/survey_state.json
      survey_section_outlines_dir: drafts/survey/section_outlines
    next_on_success: T3.6-SEC-BACKGROUND
    next_on_failure: failed

  T3.6-SEC-BACKGROUND:
    agent: survey_writer
    mode: survey_section
    extra:
      section_id: background
    inputs:
      project: project.yaml
      survey_state: drafts/survey/survey_state.json
      section_outline: drafts/survey/section_outlines/background.md
      synthesis: literature/synthesis.md
      domain_map: literature/domain_map.json
      comparison_table: literature/comparison_table.csv
      related_work_bib: literature/related_work.bib
      seed_outline_profile: user_seeds/seed_outline_profile.json
      seed_ideas: user_seeds/seed_ideas.md
      seed_constraints: user_seeds/seed_constraints.md
      seed_external_resources: user_seeds/seed_external_resources.jsonl
    outputs:
      section: drafts/survey/sections/background.tex
    next_on_success: T3.6-SEC-TAXONOMY
    next_on_failure: T3.6-SEC-BACKGROUND

  T3.6-SEC-TAXONOMY:
    agent: survey_writer
    mode: survey_section
    extra:
      section_id: taxonomy
    inputs:
      project: project.yaml
      survey_state: drafts/survey/survey_state.json
      section_outline: drafts/survey/section_outlines/taxonomy.md
      survey_plan: drafts/survey/survey_plan.json
      synthesis_workbench: literature/synthesis_workbench.json
      domain_map: literature/domain_map.json
      related_work_bib: literature/related_work.bib
      seed_outline_profile: user_seeds/seed_outline_profile.json
      seed_ideas: user_seeds/seed_ideas.md
      seed_constraints: user_seeds/seed_constraints.md
      seed_external_resources: user_seeds/seed_external_resources.jsonl
    outputs:
      section: drafts/survey/sections/taxonomy.tex
    next_on_success: T3.6-SEC-THEME-1
    next_on_failure: T3.6-SEC-TAXONOMY

  T3.6-SEC-THEME-1:
    agent: survey_writer
    mode: survey_section
    extra:
      section_id: theme_1
    inputs:
      project: project.yaml
      survey_state: drafts/survey/survey_state.json
      survey_plan: drafts/survey/survey_plan.json
      section_outline: drafts/survey/section_outlines/theme_1.md
      synthesis: literature/synthesis.md
      synthesis_workbench: literature/synthesis_workbench.json
      domain_map: literature/domain_map.json
      comparison_table: literature/comparison_table.csv
      paper_notes_dir: literature/paper_notes
      paper_notes_abstract_dir: literature/paper_notes_abstract
      related_work_bib: literature/related_work.bib
      seed_outline_profile: user_seeds/seed_outline_profile.json
      seed_ideas: user_seeds/seed_ideas.md
      seed_constraints: user_seeds/seed_constraints.md
      seed_external_resources: user_seeds/seed_external_resources.jsonl
    outputs:
      section: drafts/survey/sections/theme_1.tex
    optional_outputs:
      section: drafts/survey/sections/theme_1.tex
    next_on_success: T3.6-SEC-THEME-2
    next_on_failure: T3.6-SEC-THEME-1

  T3.6-SEC-THEME-2:
    agent: survey_writer
    mode: survey_section
    extra:
      section_id: theme_2
    inputs:
      project: project.yaml
      survey_state: drafts/survey/survey_state.json
      survey_plan: drafts/survey/survey_plan.json
      section_outline: drafts/survey/section_outlines/theme_2.md
      synthesis: literature/synthesis.md
      synthesis_workbench: literature/synthesis_workbench.json
      domain_map: literature/domain_map.json
      comparison_table: literature/comparison_table.csv
      paper_notes_dir: literature/paper_notes
      paper_notes_abstract_dir: literature/paper_notes_abstract
      related_work_bib: literature/related_work.bib
      seed_outline_profile: user_seeds/seed_outline_profile.json
      seed_ideas: user_seeds/seed_ideas.md
      seed_constraints: user_seeds/seed_constraints.md
      seed_external_resources: user_seeds/seed_external_resources.jsonl
    outputs:
      section: drafts/survey/sections/theme_2.tex
    optional_outputs:
      section: drafts/survey/sections/theme_2.tex
    next_on_success: T3.6-SEC-THEME-3
    next_on_failure: T3.6-SEC-THEME-2

  T3.6-SEC-THEME-3:
    agent: survey_writer
    mode: survey_section
    extra:
      section_id: theme_3
    inputs:
      project: project.yaml
      survey_state: drafts/survey/survey_state.json
      survey_plan: drafts/survey/survey_plan.json
      section_outline: drafts/survey/section_outlines/theme_3.md
      synthesis: literature/synthesis.md
      synthesis_workbench: literature/synthesis_workbench.json
      domain_map: literature/domain_map.json
      comparison_table: literature/comparison_table.csv
      paper_notes_dir: literature/paper_notes
      paper_notes_abstract_dir: literature/paper_notes_abstract
      related_work_bib: literature/related_work.bib
      seed_outline_profile: user_seeds/seed_outline_profile.json
      seed_ideas: user_seeds/seed_ideas.md
      seed_constraints: user_seeds/seed_constraints.md
      seed_external_resources: user_seeds/seed_external_resources.jsonl
    outputs:
      section: drafts/survey/sections/theme_3.tex
    optional_outputs:
      section: drafts/survey/sections/theme_3.tex
    next_on_success: T3.6-SEC-THEME-4
    next_on_failure: T3.6-SEC-THEME-3

  T3.6-SEC-THEME-4:
    agent: survey_writer
    mode: survey_section
    extra:
      section_id: theme_4
    inputs:
      project: project.yaml
      survey_state: drafts/survey/survey_state.json
      survey_plan: drafts/survey/survey_plan.json
      section_outline: drafts/survey/section_outlines/theme_4.md
      synthesis: literature/synthesis.md
      synthesis_workbench: literature/synthesis_workbench.json
      domain_map: literature/domain_map.json
      comparison_table: literature/comparison_table.csv
      paper_notes_dir: literature/paper_notes
      paper_notes_abstract_dir: literature/paper_notes_abstract
      related_work_bib: literature/related_work.bib
      seed_outline_profile: user_seeds/seed_outline_profile.json
      seed_ideas: user_seeds/seed_ideas.md
      seed_constraints: user_seeds/seed_constraints.md
      seed_external_resources: user_seeds/seed_external_resources.jsonl
    outputs:
      section: drafts/survey/sections/theme_4.tex
    optional_outputs:
      section: drafts/survey/sections/theme_4.tex
    next_on_success: T3.6-SEC-COMPARISON
    next_on_failure: T3.6-SEC-THEME-4

  T3.6-SEC-COMPARISON:
    agent: survey_writer
    mode: survey_section
    extra:
      section_id: comparison
    inputs:
      project: project.yaml
      survey_state: drafts/survey/survey_state.json
      section_outline: drafts/survey/section_outlines/comparison.md
      comparison_table: literature/comparison_table.csv
      synthesis_workbench: literature/synthesis_workbench.json
      related_work_bib: literature/related_work.bib
      seed_outline_profile: user_seeds/seed_outline_profile.json
      seed_ideas: user_seeds/seed_ideas.md
      seed_constraints: user_seeds/seed_constraints.md
      seed_external_resources: user_seeds/seed_external_resources.jsonl
    outputs:
      section: drafts/survey/sections/comparison.tex
    next_on_success: T3.6-SEC-CHALLENGES
    next_on_failure: T3.6-SEC-COMPARISON

  T3.6-SEC-CHALLENGES:
    agent: survey_writer
    mode: survey_section
    extra:
      section_id: challenges
    inputs:
      project: project.yaml
      survey_state: drafts/survey/survey_state.json
      section_outline: drafts/survey/section_outlines/challenges.md
      synthesis: literature/synthesis.md
      synthesis_workbench: literature/synthesis_workbench.json
      domain_map: literature/domain_map.json
      related_work_bib: literature/related_work.bib
      seed_outline_profile: user_seeds/seed_outline_profile.json
      seed_ideas: user_seeds/seed_ideas.md
      seed_constraints: user_seeds/seed_constraints.md
      seed_external_resources: user_seeds/seed_external_resources.jsonl
    outputs:
      section: drafts/survey/sections/challenges.tex
    next_on_success: T3.6-SEC-FUTURE
    next_on_failure: T3.6-SEC-CHALLENGES

  T3.6-SEC-FUTURE:
    agent: survey_writer
    mode: survey_section
    extra:
      section_id: future
    inputs:
      project: project.yaml
      survey_state: drafts/survey/survey_state.json
      section_outline: drafts/survey/section_outlines/future.md
      synthesis_workbench: literature/synthesis_workbench.json
      domain_map: literature/domain_map.json
      related_work_bib: literature/related_work.bib
      seed_outline_profile: user_seeds/seed_outline_profile.json
      seed_ideas: user_seeds/seed_ideas.md
      seed_constraints: user_seeds/seed_constraints.md
      seed_external_resources: user_seeds/seed_external_resources.jsonl
    outputs:
      section: drafts/survey/sections/future.tex
    next_on_success: T3.6-SEC-INTRO
    next_on_failure: T3.6-SEC-FUTURE

  T3.6-SEC-INTRO:
    agent: survey_writer
    mode: survey_section
    extra:
      section_id: introduction
    inputs:
      project: project.yaml
      survey_state: drafts/survey/survey_state.json
      section_outline: drafts/survey/section_outlines/introduction.md
      background_section: drafts/survey/sections/background.tex
      taxonomy_section: drafts/survey/sections/taxonomy.tex
      comparison_section: drafts/survey/sections/comparison.tex
      challenges_section: drafts/survey/sections/challenges.tex
      future_section: drafts/survey/sections/future.tex
      related_work_bib: literature/related_work.bib
      seed_outline_profile: user_seeds/seed_outline_profile.json
      seed_ideas: user_seeds/seed_ideas.md
      seed_constraints: user_seeds/seed_constraints.md
      seed_external_resources: user_seeds/seed_external_resources.jsonl
    outputs:
      section: drafts/survey/sections/introduction.tex
    next_on_success: T3.6-SEC-CONCLUSION
    next_on_failure: T3.6-SEC-INTRO

  T3.6-SEC-CONCLUSION:
    agent: survey_writer
    mode: survey_section
    extra:
      section_id: conclusion
    inputs:
      project: project.yaml
      survey_state: drafts/survey/survey_state.json
      section_outline: drafts/survey/section_outlines/conclusion.md
      challenges_section: drafts/survey/sections/challenges.tex
      future_section: drafts/survey/sections/future.tex
      seed_outline_profile: user_seeds/seed_outline_profile.json
      seed_ideas: user_seeds/seed_ideas.md
      seed_constraints: user_seeds/seed_constraints.md
      seed_external_resources: user_seeds/seed_external_resources.jsonl
    outputs:
      section: drafts/survey/sections/conclusion.tex
    next_on_success: T3.6-SEC-ABSTRACT
    next_on_failure: T3.6-SEC-CONCLUSION

  T3.6-SEC-ABSTRACT:
    agent: survey_writer
    mode: survey_section
    extra:
      section_id: abstract
    inputs:
      project: project.yaml
      survey_state: drafts/survey/survey_state.json
      section_outline: drafts/survey/section_outlines/abstract.md
      introduction_section: drafts/survey/sections/introduction.tex
      taxonomy_section: drafts/survey/sections/taxonomy.tex
      comparison_section: drafts/survey/sections/comparison.tex
      challenges_section: drafts/survey/sections/challenges.tex
      future_section: drafts/survey/sections/future.tex
      conclusion_section: drafts/survey/sections/conclusion.tex
      seed_outline_profile: user_seeds/seed_outline_profile.json
      seed_ideas: user_seeds/seed_ideas.md
      seed_constraints: user_seeds/seed_constraints.md
      seed_external_resources: user_seeds/seed_external_resources.jsonl
    outputs:
      section: drafts/survey/sections/abstract.tex
    next_on_success: T3.6-ASSEMBLE
    next_on_failure: T3.6-SEC-ABSTRACT

  # T3.6-ASSEMBLE 状态：拼装 survey.tex 并做覆盖审计
  T3.6-ASSEMBLE:
    agent: survey_writer
    mode: survey_assemble
    inputs:
      project: project.yaml
      survey_state: drafts/survey/survey_state.json
      sections_dir: drafts/survey/sections
      survey_plan: drafts/survey/survey_plan.json
      related_work_bib: literature/related_work.bib
      seed_outline_profile: user_seeds/seed_outline_profile.json
      seed_ideas: user_seeds/seed_ideas.md
      seed_constraints: user_seeds/seed_constraints.md
      seed_external_resources: user_seeds/seed_external_resources.jsonl
    outputs:
      survey_tex: drafts/survey/survey.tex
      survey_audit: drafts/survey/survey_audit.md
      survey_audit_json: drafts/survey/survey_audit.json
    next_on_success: T3.6-REVIEW
    next_on_failure: T3.6-ASSEMBLE

  # T3.6-REVIEW 状态：综述模式审阅与定向修订
  # 用途：LLM 按 taxonomy/coverage/fairness/challenges/future/scope 维度审阅，必要时只修对应 section。
  T3.6-REVIEW:
    agent: survey_writer
    mode: survey_review
    inputs:
      project: project.yaml
      survey_plan: drafts/survey/survey_plan.json
      survey_state: drafts/survey/survey_state.json
      survey_tex: drafts/survey/survey.tex
      survey_audit: drafts/survey/survey_audit.md
      survey_audit_json: drafts/survey/survey_audit.json
      sections_dir: drafts/survey/sections
      synthesis_workbench: literature/synthesis_workbench.json
      domain_map: literature/domain_map.json
      comparison_table: literature/comparison_table.csv
      related_work_bib: literature/related_work.bib
      seed_outline_profile: user_seeds/seed_outline_profile.json
      seed_ideas: user_seeds/seed_ideas.md
      seed_constraints: user_seeds/seed_constraints.md
      seed_external_resources: user_seeds/seed_external_resources.jsonl
    outputs:
      survey_review: drafts/survey/survey_review.md
      survey_review_actions: drafts/survey/survey_review_actions.json
      survey_tex: drafts/survey/survey.tex
      survey_audit: drafts/survey/survey_audit.md
      survey_audit_json: drafts/survey/survey_audit.json
    next_on_success: T3.6-COMPILE
    next_on_failure: T3.6-REVIEW

  # T3.6-COMPILE 状态：编译 survey.tex 为 PDF
  # 用途：验证 survey 分章节写作产物能形成可读 PDF；失败时暂停等待本机 LaTeX backend 或章节修复。
  T3.6-COMPILE:
    agent: survey_writer
    mode: survey_compile
    inputs:
      project: project.yaml
      survey_tex: drafts/survey/survey.tex
      references_bib: drafts/survey/references.bib
      survey_audit_json: drafts/survey/survey_audit.json
      survey_review_actions: drafts/survey/survey_review_actions.json
    outputs:
      survey_pdf: drafts/survey/survey.pdf
      survey_log: drafts/survey/survey.log
      survey_compile_report: drafts/survey/survey_compile_report.json
    next_on_success: T3.6-FEED
    next_on_failure: T3.6-ASSEMBLE

  # T3.6-FEED 状态：导出 T4 可消费的综述洞察
  # 用途：把 taxonomy/challenges/future directions 作为额外 idea fuel，不作为 T4 gate。
  T3.6-FEED:
    agent: survey_writer
    mode: survey_feed
    inputs:
      project: project.yaml
      survey_plan: drafts/survey/survey_plan.json
      survey_state: drafts/survey/survey_state.json
      survey_tex: drafts/survey/survey.tex
      survey_audit_json: drafts/survey/survey_audit.json
      survey_compile_report: drafts/survey/survey_compile_report.json
      seed_outline_profile: user_seeds/seed_outline_profile.json
      seed_ideas: user_seeds/seed_ideas.md
      seed_constraints: user_seeds/seed_constraints.md
      seed_external_resources: user_seeds/seed_external_resources.jsonl
    outputs:
      survey_insights: ideation/survey_insights.json
      survey_summary: drafts/survey/survey_summary.md
    next_on_success: T3.6-POST-SURVEY-GATE
    next_on_failure: failed

  # T3.6-POST-SURVEY-GATE 状态：综述完成后询问是否结束
  # 用途：T3.6 可能是用户的最终目标；不要在 survey 生成后未经确认自动进入 T4。
  T3.6-POST-SURVEY-GATE:
    agent: survey_writer
    mode: post_survey_gate
    extra:
      immediate_gate: true
    gate: t36_post_survey_gate
    inputs:
      project: project.yaml
      survey_summary: drafts/survey/survey_summary.md
      survey_compile_report: drafts/survey/survey_compile_report.json
      survey_insights: ideation/survey_insights.json
    outputs:
      post_survey_decision: drafts/survey/post_survey_decision.json
    next_on_success: __parse_from_output__
    next_on_failure: failed

  # T4 状态：假设生成（Hypothesis Generation）
  # 用途：基于文献综述生成研究假设和实验计划
  # Agent：ideation（创意生成器）
  T4:
    agent: ideation
    inputs:
      project: project.yaml                             # 项目配置
      synthesis: literature/synthesis.md               # 文献综述
      comparison_table: literature/comparison_table.csv # 方法对比表
      missing_areas: literature/missing_areas.md       # 研究空白
      domain_map: literature/domain_map.json            # 引用图领域地图与 novelty 近邻信号
      bridge_domain_plan: literature/bridge_domain_plan.json # T1 已确认的 bridge 召回/裁决计划（可为空计划）
      synthesis_workbench: literature/synthesis_workbench.json # 结构化综述工作台
      survey_insights: ideation/survey_insights.json    # 可选：T3.6 综述支线导出的 taxonomy/challenge/future 素材
      seed_ideas: user_seeds/seed_ideas.md            # 种子想法（可选）
      seed_constraints: user_seeds/seed_constraints.md # 种子约束（可选）
    outputs:
      hypotheses: ideation/hypotheses.md                # 研究假设
      exp_plan: ideation/exp_plan.yaml                 # 实验计划
      risks: ideation/risks.md                        # 风险评估
      idea_rationales: ideation/idea_rationales.json  # 每个 idea/假设的生成依据
      idea_scorecard: ideation/idea_scorecard.yaml    # 所有候选 idea 的证据链和评分
      rejected_ideas: ideation/rejected_ideas.md      # 被淘汰/暂缓 idea 的人类可读记录
      selected_idea_brief: ideation/selected_idea_brief.md # Gate1 后最终方向的人类可读确认
      gate_decisions: ideation/gate_decisions.json    # Gate 选择、反馈和决策链
      family_distribution: ideation/_family_distribution.md  # mechanism family 分布
      pass1_forward_candidates: ideation/_pass1_forward_candidates.json # Pass1 原始发散候选池
      pass2_grounding_review: ideation/_pass2_grounding_review.json # Pass2 文献接地/风险审阅
      candidate_directions: ideation/_candidate_directions.json # 主线与补充候选方向池
      gate1_candidate_cards: ideation/_gate1_candidate_cards.md # Gate1 用户可读候选卡片
      gate1_selection_brief: ideation/_gate1_selection_brief.md # Gate1 全量候选选择简报
    optional_outputs:
      bridge_coverage_review: ideation/bridge_coverage_review.json # 已确认 bridge 候选的上桌/裁决/逃生舱记录
    next_on_success: T4.5
    next_on_failure: failed  # T4 内部已有 validation retry；候选池失败时保留真实错误，避免同参数死锁

  # T4-GATE1 状态：候选 idea 池人工选择
  # 用途：T4 一旦生成 Pass1/Pass2/_candidate_directions/_gate1_selection_brief，
  # runtime 会先暂停到这里，让用户选择、合并、重构或要求重分析。
  T4-GATE1:
    agent: ideation
    extra:
      immediate_gate: true
    gate: t4_gate1_selection_gate
    inputs:
      candidate_directions: ideation/_candidate_directions.json
      gate1_candidate_cards: ideation/_gate1_candidate_cards.md
      gate1_selection_brief: ideation/_gate1_selection_brief.md
      pass1_forward_candidates: ideation/_pass1_forward_candidates.json
      pass2_grounding_review: ideation/_pass2_grounding_review.json
      bridge_coverage_review: ideation/bridge_coverage_review.json
    outputs:
      gate1_user_selection: ideation/_gate1_user_selection.json
    optional_outputs:
      gate1_user_selection: ideation/_gate1_user_selection.json
    next_on_success: T4
    next_on_failure: failed

  # T4.5 状态：新颖性审计（Novelty Auditing）
  # 用途：评估研究假设的新颖性和可行性
  # Agent：novelty_auditor（新颖性审计员）
  T4.5:
    agent: novelty_auditor
    inputs:
      project: project.yaml                             # 输入：项目配置
      hypotheses: ideation/hypotheses.md                # 输入：研究假设
      synthesis: literature/synthesis.md                # 输入：文献综述
      comparison_table: literature/comparison_table.csv # 输入：对比表
      idea_scorecard: ideation/idea_scorecard.yaml      # 输入：idea scorecard（含 mechanism 字段）
    outputs:
      novelty_audit: ideation/novelty_audit.md          # 新颖性审计报告
      mechanism_tuples_dir: ideation/_mechanism_tuples   # mechanism tuple 中间产物
      design_rationale_tuples_dir: ideation/_design_rationale_tuples # CDR design-rationale tuple 中间产物
    optional_outputs:
      collision_cases: ideation/collision_cases.md       # 条件输出：High/Medium Overlap 时必须存在
    # 当前主链默认跳过 legacy T5 pilot 与 legacy T6 novelty-final，但必须尊重 T4.5 Final Gate Verdict。
    # pass* 进入 T5-REBOOST-GATE 外部实验协议链；return/drop/reject/collision 进入人工审阅 gate，
    # 由用户决定外部实验链/T4/stop。
    next_on_success: __parse_from_output__
    next_on_failure: failed

  # T4.5-HUMAN-REVIEW 状态：T4.5 非通过 verdict 的人工决策
  # 用途：Novelty Auditor 可提出 reframe/drop，但不能自动拒绝或自动回退，避免 T4.5-T4 死循环。
  T4.5-HUMAN-REVIEW:
    agent: novelty_auditor
    mode: human_review
    extra:
      immediate_gate: true
    inputs:
      project: project.yaml
      hypotheses: ideation/hypotheses.md
      novelty_audit: ideation/novelty_audit.md
      idea_scorecard: ideation/idea_scorecard.yaml
      selected_idea_brief: ideation/selected_idea_brief.md
      gate1_selection_brief: ideation/_gate1_selection_brief.md
      rejected_ideas: ideation/rejected_ideas.md
    outputs:
      novelty_human_review: ideation/novelty_human_review.json
    gate:
      type: t45_human_review_gate
    next_on_success: __parse_from_output__
    next_on_failure: failed

  # T5-REBOOST-GATE 状态：ResearchOS 直接调用 LLM API 对 Pre-T5 材料做 context re-boost
  # 用途：把研究目标、方法机制、baseline、claim/evidence 边界重排成外部执行器上下文，
  # 并写入 external_executor/handoff_pack.json#context_reboost。
  T5-REBOOST-GATE:
    agent: experimenter
    mode: reboost
    inputs:
      project: project.yaml
      hypotheses: ideation/hypotheses.md
      exp_plan: ideation/exp_plan.yaml
      risks: ideation/risks.md
      novelty_audit: ideation/novelty_audit.md
      idea_scorecard: ideation/idea_scorecard.yaml
      synthesis: literature/synthesis.md
      synthesis_workbench: literature/synthesis_workbench.json
      domain_map: literature/domain_map.json
      comparison_table: literature/comparison_table.csv
    outputs:
      handoff_pack: external_executor/handoff_pack.json
      reboost_report: external_executor/reboost_report.json
    next_on_success: T5-HANDOFF
    next_on_failure: failed

  # T5-HANDOFF 状态：外部实验执行器协议编译
  # 用途：ResearchOS 编译实验契约、allowed paths 与 Codex/Claude/manual/mock 执行 prompt。
  # 注意：主链不在 ResearchOS 内部实现或运行实验。
  T5-HANDOFF:
    agent: experimenter
    mode: handoff
    inputs:
      project: project.yaml
      hypotheses: ideation/hypotheses.md
      exp_plan: ideation/exp_plan.yaml
      risks: ideation/risks.md
      novelty_audit: ideation/novelty_audit.md
      idea_scorecard: ideation/idea_scorecard.yaml
      synthesis: literature/synthesis.md
      comparison_table: literature/comparison_table.csv
    outputs:
      handoff_pack: external_executor/handoff_pack.json
      executor_prompt: external_executor/executor_prompt.md
      expected_outputs_schema: external_executor/expected_outputs_schema.json
      allowed_paths: external_executor/allowed_paths.txt
      executor_selection: external_executor/executor_selection.json
      input_manifest: external_executor/input_manifest.json
      codex_prompt: external_executor/codex_prompt.md
      claude_code_prompt: external_executor/claude_code_prompt.md
      manual_instructions: external_executor/manual_instructions.md
      agents_md: external_executor/AGENTS.md
      claude_md: external_executor/CLAUDE.md
      external_readme: external_executor/README.md
      dir_guide: external_executor/_DIR_GUIDE.md
      job_state: external_executor/job_state.json
      expr_dir: external_executor/expr
      skills_dir: external_executor/skills
      skill_template_manifest: external_executor/skills/template_manifest.json
    next_on_success: T5-SKILL-CUSTOMIZATION-GATE
    next_on_failure: failed

  # T5-SKILL-CUSTOMIZATION-GATE 状态：自动 LLM API 定制 skill 模板
  # 用途：T5-HANDOFF 复制仓库级通用 skill 模板到 external_executor/skills/ 后，
  # ResearchOS 直接调用当前配置的 LLM provider，读取 skills_customization 指导文件，
  # 将 13 个模板原地改写为当前项目专属 skills。
  T5-SKILL-CUSTOMIZATION-GATE:
    agent: experimenter
    mode: skill_customization
    inputs:
      handoff_pack: external_executor/handoff_pack.json
      expected_outputs_schema: external_executor/expected_outputs_schema.json
      allowed_paths: external_executor/allowed_paths.txt
      skills_dir: external_executor/skills
      skill_template_manifest: external_executor/skills/template_manifest.json
      customization_skill: external_executor/skills/skills_customization/SKILL.md
      agents_md: external_executor/AGENTS.md
    outputs:
      skill_customization_report: external_executor/skills/customization_report.json
    next_on_success: T5-EXPR-MATERIAL-GATE
    next_on_failure: failed

  # T5-EXPR-MATERIAL-GATE 状态：实验材料放置确认
  # 用途：T5 re-boost 与 skill 编译完成后，暂停等待用户把 baseline model、dataset、
  # 外部代码、权重等实验材料放入 external_executor/expr/。
  T5-EXPR-MATERIAL-GATE:
    agent: experimenter
    mode: executor_gate
    extra:
      immediate_gate: true
    inputs:
      handoff_pack: external_executor/handoff_pack.json
      expected_outputs_schema: external_executor/expected_outputs_schema.json
      expr_dir: external_executor/expr
      agents_md: external_executor/AGENTS.md
    outputs:
      materials_gate_decision: external_executor/expr/materials_gate_decision.json
    gate:
      type: t5_expr_material_gate
    next_on_success: __parse_from_output__
    next_on_failure: failed

  # T5-EXECUTOR-GATE 状态：外部执行器选择
  # 用途：由用户显式选择 mock/Claude Code/Codex CLI/manual，不让完整主链默认混入 mock 结果。
  T5-EXECUTOR-GATE:
    agent: experimenter
    mode: executor_gate
    extra:
      immediate_gate: true
    inputs:
      handoff_pack: external_executor/handoff_pack.json
      expected_outputs_schema: external_executor/expected_outputs_schema.json
      allowed_paths: external_executor/allowed_paths.txt
      agents_md: external_executor/AGENTS.md
      claude_md: external_executor/CLAUDE.md
    outputs:
      executor_selection: external_executor/executor_selection.json
    gate:
      type: t5_executor_gate
    next_on_success: __parse_from_output__
    next_on_failure: failed

  # T5-EXTERNAL-WAIT 状态：等待外部执行器写回 result pack
  # 用途：不启动 LLM；runtime 检查 external_executor/result_pack.json 和 executor_status.json。
  # 缺失时 PAUSED，外部执行完后 resume 自动进入 T7-INGEST。
  T5-EXTERNAL-WAIT:
    agent: experimenter
    mode: external_wait
    inputs:
      executor_selection: external_executor/executor_selection.json
      handoff_pack: external_executor/handoff_pack.json
      expected_outputs_schema: external_executor/expected_outputs_schema.json
      allowed_paths: external_executor/allowed_paths.txt
      result_pack: external_executor/result_pack.json
      executor_status: external_executor/executor_status.json
    outputs:
      wait_acceptance_report: external_executor/wait_acceptance_report.json
    next_on_success: T7-INGEST
    next_on_failure: failed

  # T5-DRY-RUN 状态：mock 外部执行器协议 dry-run
  # 用途：不跑真实实验，只验证 handoff/result_pack/status 文件协议可端到端通过。
  T5-DRY-RUN:
    agent: experimenter
    mode: dry_run
    inputs:
      executor_selection: external_executor/executor_selection.json
      handoff_pack: external_executor/handoff_pack.json
      expected_outputs_schema: external_executor/expected_outputs_schema.json
    outputs:
      result_pack: external_executor/result_pack.json
      executor_status: external_executor/executor_status.json
      run_manifest: external_executor/run_manifest.json
      heartbeat: external_executor/heartbeat.json
      raw_results_dir: external_executor/raw_results
      configs_dir: external_executor/configs
      logs_dir: external_executor/logs
    next_on_success: T7-INGEST
    next_on_failure: failed

  # T7-INGEST 状态：摄取外部执行器结果
  # 用途：把外部 result_pack 规范化为 ResearchOS 下游兼容 results_summary 与 evidence_index。
  T7-INGEST:
    agent: experimenter
    mode: result_ingest
    inputs:
      result_pack: external_executor/result_pack.json
      executor_status: external_executor/executor_status.json
      handoff_pack: external_executor/handoff_pack.json
    outputs:
      results_summary: experiments/results_summary.json
      run_records: experiments/run_records.jsonl
      evidence_index: experiments/evidence_index.json
      ingest_report: experiments/ingest_report.json
    next_on_success: T7-AUDIT
    next_on_failure: failed

  # T7-AUDIT 状态：实验诚信审计
  # 用途：审计 provenance、mock_only、metric、seed、artifact 引用；不信执行器总结。
  T7-AUDIT:
    agent: experimenter
    mode: integrity_audit
    inputs:
      results_summary: experiments/results_summary.json
      evidence_index: experiments/evidence_index.json
      run_records: experiments/run_records.jsonl
      exp_plan: ideation/exp_plan.yaml
      novelty_audit: ideation/novelty_audit.md
    outputs:
      integrity_audit: experiments/integrity_audit.json
      result_audit: experiments/result_audit.json
      experiment_fairness_review: experiments/experiment_fairness_review.md
      method_audit: experiments/method_audit.json
      framework_figure_audit: experiments/framework_figure_audit.json
      method_writing_resources: drafts/method_writing_resources.json
    next_on_success: T7-POST-NOVELTY
    next_on_failure: failed

  # T7-POST-NOVELTY 状态：实验后 novelty/collision 复核
  # 用途：基于实现/结果/required baseline 覆盖情况，给 T7-CLAIMS 和 T8 写作提供 claim 降级边界。
  T7-POST-NOVELTY:
    agent: experimenter
    mode: post_novelty
    inputs:
      hypotheses: ideation/hypotheses.md
      exp_plan: ideation/exp_plan.yaml
      novelty_audit: ideation/novelty_audit.md
      required_baselines: novelty/required_baselines.json
      result_pack: external_executor/result_pack.json
      results_summary: experiments/results_summary.json
      integrity_audit: experiments/integrity_audit.json
      patch_log: external_executor/patches/patch_log.jsonl
      repo_snapshot: external_executor/repo_snapshot.json
    outputs:
      post_experiment_novelty_check: novelty/post_experiment_novelty_check.json
      post_experiment_collision_cases: novelty/post_experiment_collision_cases.md
    next_on_success: T7-CLAIMS
    next_on_failure: failed

  # T7-CLAIMS 状态：result-to-claim 与 writing evidence pack
  # 用途：把审计后的实验数字转成保守 claim mapping，并交给 T8 作为证据包。
  T7-CLAIMS:
    agent: experimenter
    mode: result_to_claim
    inputs:
      results_summary: experiments/results_summary.json
      integrity_audit: experiments/integrity_audit.json
      evidence_index: experiments/evidence_index.json
      exp_plan: ideation/exp_plan.yaml
      hypotheses: ideation/hypotheses.md
      novelty_audit: ideation/novelty_audit.md
    outputs:
      experimental_claims: experiments/experimental_claims.json
      result_to_claim: drafts/result_to_claim.json
      experiment_evidence_pack: drafts/experiment_evidence_pack.json
      iteration_log: experiments/iteration_log.md
      must_not_claim: drafts/must_not_claim.md
      claim_support_matrix: drafts/claim_support_matrix.csv
      limitations_from_experiments: drafts/limitations_from_experiments.md
      figure_table_evidence_map: drafts/figure_table_evidence_map.json
    next_on_success: T7.5
    next_on_failure: failed

  # T5 状态：legacy 试点实验（仅兼容显式 run-task，不在主链自动使用）
  # 用途：旧模式由 ResearchOS 内部执行小规模试点实验；新主链使用 T5-HANDOFF。
  T5:
    agent: experimenter
    mode: pilot
    inputs:
      project: project.yaml                             # 项目配置
      hypotheses: ideation/hypotheses.md               # 研究假设
      exp_plan: ideation/exp_plan.yaml                 # 实验计划
      risks: ideation/risks.md                       # 风险评估
    outputs:
      pilot_plan: pilot/pilot_plan.yaml              # 试点计划
      pilot_code: pilot/pilot_code                    # 试点代码
      pilot_results: pilot/pilot_results.json        # 试点实验结果
      motivation_validation: pilot/motivation_validation.md  # 动机验证报告
    next_on_success: T6
    next_on_failure: T4

  # T6 状态：legacy 新颖性最终验证（仅兼容显式 run-task，不在主链自动使用）
  # 用途：基于 legacy Pilot 结果验证新颖性，补充必须的基线方法。
  # Agent：novelty（新颖性验证）
  T6:
    agent: novelty
    inputs:
      project: project.yaml
      hypotheses: ideation/hypotheses.md               # 研究假设
      exp_plan: ideation/exp_plan.yaml               # 实验计划
      pilot_results: pilot/pilot_results.json       # 试点结果
      motivation_validation: pilot/motivation_validation.md  # 动机验证
      novelty_audit: ideation/novelty_audit.md      # T4.5 新颖性预审结果
      comparison_table: literature/comparison_table.csv # 方法对比表
      synthesis: literature/synthesis.md             # 文献综述
    outputs:
      novelty_report: novelty/novelty_report.md        # 新颖性报告
      collision_cases: novelty/collision_cases.md     # 潜在撞车案例（如有）
      must_add_baselines: novelty/must_add_baselines.md # 必须补充的基线方法
    gate:
      type: novelty_gate
      prompt: |
        新颖性评估完成。判定：{verdict}

        - PASS: 继续完整实验
        - REVISE: 需要修改假设（建议方案见 novelty_report.md）
        - FAIL: 新颖性不足，需要重新构思

        是否继续？
    next_on_success: T7
    next_on_failure: T4

  # T7 状态：legacy 完整实验（仅兼容显式 run-task，不在主链自动使用）
  # 用途：旧模式由 ResearchOS 内部执行完整实验；新主链使用 T7-INGEST/AUDIT/CLAIMS。
  T7:
    agent: experimenter
    mode: full
    extra:
      experiment_entrypoint: direct_full_from_t45
      skipped_optional_tasks:
        - T5
        - T6
    inputs:
      project: project.yaml                           # 项目配置
      hypotheses: ideation/hypotheses.md             # 研究假设
      exp_plan: ideation/exp_plan.yaml               # 实验计划
      risks: ideation/risks.md                       # 风险评估
      novelty_audit: ideation/novelty_audit.md       # T4.5 新颖性预审结果
      idea_scorecard: ideation/idea_scorecard.yaml   # idea 证据链
      synthesis: literature/synthesis.md             # 文献综合
      comparison_table: literature/comparison_table.csv # 方法对比表
      pilot_results: pilot/pilot_results.json        # 试点结果（可选，若单独跑过 T5）
      pilot_code: pilot/pilot_code                   # 试点代码（可选）
      novelty_report: novelty/novelty_report.md      # 新颖性最终报告（可选，若单独跑过 T6）
      must_add_baselines: novelty/must_add_baselines.md # 必须补充的基线（可选）
    outputs:
      results_summary: experiments/results_summary.json # 结果摘要
      runs_dir: experiments/runs                       # 运行结果目录
      configs_dir: experiments/configs                  # 配置目录
      iteration_log: experiments/iteration_log.md     # 迭代日志
      ablations: experiments/ablations.csv            # 消融实验结果
    next_on_success: T7.5
    next_on_failure: failed

  # T7.5 状态：PI 评估（Experiment Evaluation）
  # 用途：在外部实验审计/result-to-claim 和论文写作之间增加一层 PI 评估与人工确认
  # Agent：pi（evaluate 模式）
  T7.5:
    agent: pi
    mode: evaluate
    inputs:
      results_summary: experiments/results_summary.json
      iteration_log: experiments/iteration_log.md
      integrity_audit: experiments/integrity_audit.json
      experimental_claims: experiments/experimental_claims.json
      result_to_claim: drafts/result_to_claim.json
      experiment_evidence_pack: drafts/experiment_evidence_pack.json
      exp_plan: ideation/exp_plan.yaml
    outputs:
      evaluation_decision: evaluation/evaluation_decision.md
    gate:
      type: t75_human_review_gate
    # 正常情况下 gate 会先拦截；保留 parse 目标作为兜底和“按 PI 推荐推进”的统一语义。
    next_on_success: __parse_from_output__
    next_on_failure: failed

  # T8-STYLE-GATE 状态：写作风格确认
  # 用途：根据目标 venue 确认 IS / CCF-A / both 写作风格
  # Agent：writer（论文写作）
  T8-STYLE-GATE:
    agent: writer
    mode: style_gate
    extra:
      immediate_gate: true
    gate: t8_style_template_gate
    inputs:
      project: project.yaml
    outputs:
      writing_style: drafts/writing_style.json
    next_on_success: T8-RESOURCE
    next_on_failure: failed

  # T8-RESOURCE 状态：论文写作资源索引（Manuscript Resource Indexing）
  # 用途：索引全部写作资料，并生成章节计划
  # Agent：writer（论文写作）
  T8-RESOURCE:
    agent: writer
    mode: resource_index
    inputs:
      project: project.yaml
      writing_style: drafts/writing_style.json
      results_summary: experiments/results_summary.json
      experiment_evidence_pack: drafts/experiment_evidence_pack.json
      result_to_claim: drafts/result_to_claim.json
      integrity_audit: experiments/integrity_audit.json
      synthesis: literature/synthesis.md
      synthesis_workbench: literature/synthesis_workbench.json
      domain_map: literature/domain_map.json
      related_work_bib: literature/related_work.bib
      hypotheses: ideation/hypotheses.md
      exp_plan: ideation/exp_plan.yaml
      novelty_audit: ideation/novelty_audit.md
      idea_scorecard: ideation/idea_scorecard.yaml
      comparison_table: literature/comparison_table.csv
      ablations: experiments/ablations.csv
    outputs:
      manuscript_resource_index: drafts/manuscript_resource_index.json
      section_plan: drafts/section_plan.json
      evidence_plan: drafts/evidence_plan.json
      figure_table_plan: drafts/figure_table_plan.json
      result_to_claim: drafts/result_to_claim.json
      experiment_evidence_pack: drafts/experiment_evidence_pack.json
      cdr_claim_ledger: drafts/cdr_claim_ledger.json
      claim_ledger: drafts/claim_ledger.json
      figure_registry: drafts/figure_registry.json
      alignment_matrix: drafts/alignment_matrix.json
    next_on_success: T8-WRITE
    next_on_failure: failed

  # T8-WRITE 状态：论文大纲（Paper Outline）
  # 用途：生成资源驱动的大纲
  # Agent：writer（论文写作）
  T8-WRITE:
    agent: writer
    mode: outline  # 先生成大纲
    inputs:
      project: project.yaml                             # 输入：项目配置
      writing_style: drafts/writing_style.json
      results_summary: experiments/results_summary.json # 输入：实验结果
      experiment_evidence_pack: drafts/experiment_evidence_pack.json
      result_to_claim: drafts/result_to_claim.json
      synthesis: literature/synthesis.md                # 输入：文献综述
      synthesis_workbench: literature/synthesis_workbench.json
      domain_map: literature/domain_map.json
      related_work_bib: literature/related_work.bib     # 输入：引用库
      hypotheses: ideation/hypotheses.md                # 输入：研究假设
      idea_scorecard: ideation/idea_scorecard.yaml
      manuscript_resource_index: drafts/manuscript_resource_index.json
      section_plan: drafts/section_plan.json
      evidence_plan: drafts/evidence_plan.json
      figure_table_plan: drafts/figure_table_plan.json
      cdr_claim_ledger: drafts/cdr_claim_ledger.json
      claim_ledger: drafts/claim_ledger.json
      figure_registry: drafts/figure_registry.json
      alignment_matrix: drafts/alignment_matrix.json
    outputs:
      outline: drafts/outline.md                       # 论文大纲
    next_on_success: T8-SECTION-PLAN
    next_on_failure: failed

  # T8-SECTION-PLAN 状态：逐章节写作状态初始化
  # 用途：生成 paper_state 与每章局部大纲；不写正文
  # Agent：writer（论文写作）
  T8-SECTION-PLAN:
    agent: writer
    mode: section_plan
    inputs:
      project: project.yaml
      writing_style: drafts/writing_style.json
      results_summary: experiments/results_summary.json
      experiment_evidence_pack: drafts/experiment_evidence_pack.json
      result_to_claim: drafts/result_to_claim.json
      integrity_audit: experiments/integrity_audit.json
      synthesis: literature/synthesis.md
      synthesis_workbench: literature/synthesis_workbench.json
      domain_map: literature/domain_map.json
      related_work_bib: literature/related_work.bib
      hypotheses: ideation/hypotheses.md
      idea_scorecard: ideation/idea_scorecard.yaml
      outline: drafts/outline.md
      manuscript_resource_index: drafts/manuscript_resource_index.json
      section_plan: drafts/section_plan.json
      evidence_plan: drafts/evidence_plan.json
      figure_table_plan: drafts/figure_table_plan.json
      cdr_claim_ledger: drafts/cdr_claim_ledger.json
      claim_ledger: drafts/claim_ledger.json
      figure_registry: drafts/figure_registry.json
      alignment_matrix: drafts/alignment_matrix.json
      ablations: experiments/ablations.csv
    outputs:
      paper_state: drafts/paper_state.json
      section_outlines_dir: drafts/section_outlines
    next_on_success: T8-SEC-METHOD
    next_on_failure: failed

  T8-SEC-METHOD:
    agent: writer
    mode: section_draft
    extra:
      section_id: methodology
    inputs:
      project: project.yaml
      paper_state: drafts/paper_state.json
      section_outline: drafts/section_outlines/methodology.md
      hypotheses: ideation/hypotheses.md
      exp_plan: ideation/exp_plan.yaml
      idea_scorecard: ideation/idea_scorecard.yaml
      novelty_audit: ideation/novelty_audit.md
      design_rationale_tuples_dir: ideation/_design_rationale_tuples
      results_summary: experiments/results_summary.json
      experiment_evidence_pack: drafts/experiment_evidence_pack.json
      result_to_claim: drafts/result_to_claim.json
      configs_dir: experiments/configs
      code_dir: experiments/code
      outline: drafts/outline.md
      manuscript_resource_index: drafts/manuscript_resource_index.json
      evidence_plan: drafts/evidence_plan.json
      figure_table_plan: drafts/figure_table_plan.json
      cdr_claim_ledger: drafts/cdr_claim_ledger.json
      claim_ledger: drafts/claim_ledger.json
      figure_registry: drafts/figure_registry.json
      alignment_matrix: drafts/alignment_matrix.json
    outputs:
      section: drafts/sections/methodology.tex
    next_on_success: T8-SEC-EXPERIMENTS
    next_on_failure: failed

  T8-SEC-EXPERIMENTS:
    agent: writer
    mode: section_draft
    extra:
      section_id: experiments
    inputs:
      project: project.yaml
      paper_state: drafts/paper_state.json
      section_outline: drafts/section_outlines/experiments.md
      results_summary: experiments/results_summary.json
      experiment_evidence_pack: drafts/experiment_evidence_pack.json
      result_to_claim: drafts/result_to_claim.json
      integrity_audit: experiments/integrity_audit.json
      ablations: experiments/ablations.csv
      exp_plan: ideation/exp_plan.yaml
      seed_ensemble_summary: experiments/seed_ensemble_summary.json
      runs_dir: experiments/runs
      configs_dir: experiments/configs
      must_add_baselines: novelty/must_add_baselines.md
      manuscript_resource_index: drafts/manuscript_resource_index.json
      evidence_plan: drafts/evidence_plan.json
      figure_table_plan: drafts/figure_table_plan.json
      cdr_claim_ledger: drafts/cdr_claim_ledger.json
      claim_ledger: drafts/claim_ledger.json
      figure_registry: drafts/figure_registry.json
      alignment_matrix: drafts/alignment_matrix.json
    outputs:
      section: drafts/sections/experiments.tex
    next_on_success: T8-SEC-RELATED
    next_on_failure: failed

  T8-SEC-RELATED:
    agent: writer
    mode: section_draft
    extra:
      section_id: related_work
    inputs:
      project: project.yaml
      paper_state: drafts/paper_state.json
      section_outline: drafts/section_outlines/related_work.md
      synthesis: literature/synthesis.md
      synthesis_workbench: literature/synthesis_workbench.json
      domain_map: literature/domain_map.json
      related_work_bib: literature/related_work.bib
      comparison_table: literature/comparison_table.csv
      idea_scorecard: ideation/idea_scorecard.yaml
      manuscript_resource_index: drafts/manuscript_resource_index.json
      evidence_plan: drafts/evidence_plan.json
      cdr_claim_ledger: drafts/cdr_claim_ledger.json
      claim_ledger: drafts/claim_ledger.json
      figure_registry: drafts/figure_registry.json
      alignment_matrix: drafts/alignment_matrix.json
    outputs:
      section: drafts/sections/related_work.tex
    next_on_success: T8-SEC-ANALYSIS
    next_on_failure: failed

  T8-SEC-ANALYSIS:
    agent: writer
    mode: section_draft
    extra:
      section_id: analysis
    inputs:
      project: project.yaml
      paper_state: drafts/paper_state.json
      section_outline: drafts/section_outlines/analysis.md
      results_summary: experiments/results_summary.json
      experiment_evidence_pack: drafts/experiment_evidence_pack.json
      result_to_claim: drafts/result_to_claim.json
      ablations: experiments/ablations.csv
      iteration_log: experiments/iteration_log.md
      novelty_audit: ideation/novelty_audit.md
      methodology_section: drafts/sections/methodology.tex
      experiments_section: drafts/sections/experiments.tex
      manuscript_resource_index: drafts/manuscript_resource_index.json
      evidence_plan: drafts/evidence_plan.json
      cdr_claim_ledger: drafts/cdr_claim_ledger.json
      claim_ledger: drafts/claim_ledger.json
      figure_registry: drafts/figure_registry.json
      alignment_matrix: drafts/alignment_matrix.json
    outputs:
      section: drafts/sections/analysis.tex
    next_on_success: T8-SEC-INTRO
    next_on_failure: failed

  T8-SEC-INTRO:
    agent: writer
    mode: section_draft
    extra:
      section_id: introduction
    inputs:
      project: project.yaml
      paper_state: drafts/paper_state.json
      section_outline: drafts/section_outlines/introduction.md
      synthesis: literature/synthesis.md
      hypotheses: ideation/hypotheses.md
      results_summary: experiments/results_summary.json
      experiment_evidence_pack: drafts/experiment_evidence_pack.json
      result_to_claim: drafts/result_to_claim.json
      methodology_section: drafts/sections/methodology.tex
      experiments_section: drafts/sections/experiments.tex
      related_work_section: drafts/sections/related_work.tex
      analysis_section: drafts/sections/analysis.tex
      manuscript_resource_index: drafts/manuscript_resource_index.json
      evidence_plan: drafts/evidence_plan.json
      figure_table_plan: drafts/figure_table_plan.json
      cdr_claim_ledger: drafts/cdr_claim_ledger.json
      claim_ledger: drafts/claim_ledger.json
      figure_registry: drafts/figure_registry.json
      alignment_matrix: drafts/alignment_matrix.json
    outputs:
      section: drafts/sections/introduction.tex
    next_on_success: T8-SEC-CONCLUSION
    next_on_failure: failed

  T8-SEC-CONCLUSION:
    agent: writer
    mode: section_draft
    extra:
      section_id: conclusion
    inputs:
      project: project.yaml
      paper_state: drafts/paper_state.json
      section_outline: drafts/section_outlines/conclusion.md
      introduction_section: drafts/sections/introduction.tex
      experiments_section: drafts/sections/experiments.tex
      risks: ideation/risks.md
      novelty_audit: ideation/novelty_audit.md
      results_summary: experiments/results_summary.json
      experiment_evidence_pack: drafts/experiment_evidence_pack.json
      result_to_claim: drafts/result_to_claim.json
      iteration_log: experiments/iteration_log.md
      cdr_claim_ledger: drafts/cdr_claim_ledger.json
      claim_ledger: drafts/claim_ledger.json
      figure_registry: drafts/figure_registry.json
      alignment_matrix: drafts/alignment_matrix.json
    outputs:
      section: drafts/sections/conclusion.tex
    next_on_success: T8-SEC-ABSTRACT
    next_on_failure: failed

  T8-SEC-ABSTRACT:
    agent: writer
    mode: section_draft
    extra:
      section_id: abstract
    inputs:
      project: project.yaml
      paper_state: drafts/paper_state.json
      section_outline: drafts/section_outlines/abstract.md
      introduction_section: drafts/sections/introduction.tex
      methodology_section: drafts/sections/methodology.tex
      experiments_section: drafts/sections/experiments.tex
      analysis_section: drafts/sections/analysis.tex
      conclusion_section: drafts/sections/conclusion.tex
      cdr_claim_ledger: drafts/cdr_claim_ledger.json
      claim_ledger: drafts/claim_ledger.json
      figure_registry: drafts/figure_registry.json
      alignment_matrix: drafts/alignment_matrix.json
    outputs:
      section: drafts/sections/abstract.tex
    next_on_success: T8-DRAFT
    next_on_failure: failed

  # T8-DRAFT 状态：论文初稿（Paper Draft）
  # 用途：拼装章节草稿并生成完整论文
  # Agent：writer（论文写作）
  T8-DRAFT:
    agent: writer
    mode: draft
    inputs:
      project: project.yaml                             # 输入：项目配置
      results_summary: experiments/results_summary.json # 输入：实验结果
      experiment_evidence_pack: drafts/experiment_evidence_pack.json
      result_to_claim: drafts/result_to_claim.json
      integrity_audit: experiments/integrity_audit.json
      synthesis: literature/synthesis.md                # 输入：文献综合
      related_work_bib: literature/related_work.bib      # 输入：引用库
      hypotheses: ideation/hypotheses.md                # 输入：研究假设
      novelty_audit: ideation/novelty_audit.md          # 输入：T4.5 新颖性预审
      ablations: experiments/ablations.csv              # 输入：消融结果
      outline: drafts/outline.md                        # 输入：论文大纲
      paper_state: drafts/paper_state.json              # 输入：逐章节共享状态
      sections_dir: drafts/sections
      manuscript_resource_index: drafts/manuscript_resource_index.json
      section_plan: drafts/section_plan.json
      evidence_plan: drafts/evidence_plan.json
      figure_table_plan: drafts/figure_table_plan.json
      cdr_claim_ledger: drafts/cdr_claim_ledger.json
      claim_ledger: drafts/claim_ledger.json
      figure_registry: drafts/figure_registry.json
      alignment_matrix: drafts/alignment_matrix.json
    outputs:
      paper: drafts/paper.tex                           # 论文草稿
      manuscript_audit: drafts/manuscript_audit.md       # 机械审计报告
      craft_audit: drafts/craft_audit.md
      paper_claim_audit: drafts/paper_claim_audit.md
      paper_claim_audit_json: drafts/paper_claim_audit.json
    next_on_success: T8-SELF-CHECK
    next_on_failure: failed

  # T8-SELF-CHECK 状态：作者自查（Self Check）
  # 用途：在外部 reviewer 前完成数字/引用/图表/论证自查
  T8-SELF-CHECK:
    agent: writer
    mode: self_check
    inputs:
      project: project.yaml
      paper: drafts/paper.tex
      results_summary: experiments/results_summary.json
      experiment_evidence_pack: drafts/experiment_evidence_pack.json
      result_to_claim: drafts/result_to_claim.json
      paper_claim_audit: drafts/paper_claim_audit.md
      synthesis: literature/synthesis.md
      related_work_bib: literature/related_work.bib
      ablations: experiments/ablations.csv
      manuscript_resource_index: drafts/manuscript_resource_index.json
      section_plan: drafts/section_plan.json
      evidence_plan: drafts/evidence_plan.json
      figure_table_plan: drafts/figure_table_plan.json
      cdr_claim_ledger: drafts/cdr_claim_ledger.json
      claim_ledger: drafts/claim_ledger.json
      figure_registry: drafts/figure_registry.json
      manuscript_audit: drafts/manuscript_audit.md
      craft_audit: drafts/craft_audit.md
      paper_claim_audit: drafts/paper_claim_audit.md
      alignment_matrix: drafts/alignment_matrix.json
    outputs:
      self_check: drafts/self_check.md
    next_on_success: T8-REVIEW-1
    next_on_failure: failed

  # T8-REVIEW-1 状态：论文审稿第1轮（Paper Review Round 1）
  # 用途：审稿人审查论文并提出改进建议
  # Agent：reviewer（论文审稿）
  T8-REVIEW-1:
    agent: reviewer
    round: 1
    inputs:
      project: project.yaml                             # 输入：项目配置
      paper: drafts/paper.tex                           # 输入：论文草稿
      results_summary: experiments/results_summary.json # 输入：实验结果
      experiment_evidence_pack: drafts/experiment_evidence_pack.json
      result_to_claim: drafts/result_to_claim.json
      paper_claim_audit: drafts/paper_claim_audit.md
      related_work_bib: literature/related_work.bib      # 输入：引用库
      manuscript_audit: drafts/manuscript_audit.md       # 输入：机械审计报告
      craft_audit: drafts/craft_audit.md
      self_check: drafts/self_check.md                   # 输入：作者自查
      cdr_claim_ledger: drafts/cdr_claim_ledger.json
      alignment_matrix: drafts/alignment_matrix.json
    outputs:
      review_report: drafts/review_rounds/round_1.md   # 审稿报告
      section_review_dir: drafts/review_rounds/round_1_sections # 逐章节审稿
    next_on_success: T8-REVISE-1
    next_on_failure: failed

  # T8-REVISE-1 状态：论文修订第1轮（Paper Revision Round 1）
  # 用途：根据审稿意见修订论文
  # Agent：writer（论文写作）
  T8-REVISE-1:
    agent: writer
    mode: revise
    round: 1
    inputs:
      project: project.yaml                             # 输入：项目配置
      paper: drafts/paper.tex                           # 输入：论文草稿
      paper_state: drafts/paper_state.json              # 输入：逐章节共享状态
      review_report: drafts/review_rounds/round_1.md   # 输入：审稿报告
      section_review_dir: drafts/review_rounds/round_1_sections
      results_summary: experiments/results_summary.json
      experiment_evidence_pack: drafts/experiment_evidence_pack.json
      result_to_claim: drafts/result_to_claim.json
      paper_claim_audit: drafts/paper_claim_audit.md
      synthesis: literature/synthesis.md
      related_work_bib: literature/related_work.bib
      ablations: experiments/ablations.csv
      sections_dir: drafts/sections
      manuscript_resource_index: drafts/manuscript_resource_index.json
      evidence_plan: drafts/evidence_plan.json
      figure_table_plan: drafts/figure_table_plan.json
      cdr_claim_ledger: drafts/cdr_claim_ledger.json
      claim_ledger: drafts/claim_ledger.json
      figure_registry: drafts/figure_registry.json
      manuscript_audit: drafts/manuscript_audit.md
      craft_audit: drafts/craft_audit.md
      alignment_matrix: drafts/alignment_matrix.json
    outputs:
      revision_patches: drafts/patches/round_1_patches.json
      revision_response: drafts/revision_response_round_1.md
      paper: drafts/paper.tex                           # 修订后的论文
      manuscript_audit: drafts/manuscript_audit.md       # 更新后的机械审计
      craft_audit: drafts/craft_audit.md
      paper_claim_audit: drafts/paper_claim_audit.md
      paper_claim_audit_json: drafts/paper_claim_audit.json
    next_on_success: T8-REVIEW-2
    next_on_failure: failed

  # T8-REVIEW-2 状态：论文审稿第2轮（Paper Review Round 2）
  # 用途：审稿人审查修订后的论文
  # Agent：reviewer（论文审稿）
  T8-REVIEW-2:
    agent: reviewer
    round: 2
    inputs:
      project: project.yaml                             # 输入：项目配置
      paper: drafts/paper.tex                           # 输入：修订后的论文
      results_summary: experiments/results_summary.json
      experiment_evidence_pack: drafts/experiment_evidence_pack.json
      result_to_claim: drafts/result_to_claim.json
      paper_claim_audit: drafts/paper_claim_audit.md
      related_work_bib: literature/related_work.bib
      manuscript_audit: drafts/manuscript_audit.md
      craft_audit: drafts/craft_audit.md
      previous_review: drafts/review_rounds/round_1.md
      cdr_claim_ledger: drafts/cdr_claim_ledger.json
      alignment_matrix: drafts/alignment_matrix.json
    outputs:
      review_report: drafts/review_rounds/round_2.md   # 审稿报告
      section_review_dir: drafts/review_rounds/round_2_sections # 逐章节审稿
    next_on_success: T8-REVISE-2
    next_on_failure: failed

  # T8-REVISE-2 状态：论文修订第2轮（Paper Revision Round 2）
  # 用途：根据第2轮审稿意见修订论文
  # Agent：writer（论文写作）
  T8-REVISE-2:
    agent: writer
    mode: revise
    round: 2
    inputs:
      project: project.yaml                             # 输入：项目配置
      paper: drafts/paper.tex                           # 输入：论文草稿
      paper_state: drafts/paper_state.json
      review_report: drafts/review_rounds/round_2.md   # 输入：审稿报告
      section_review_dir: drafts/review_rounds/round_2_sections
      previous_review: drafts/review_rounds/round_1.md
      results_summary: experiments/results_summary.json
      experiment_evidence_pack: drafts/experiment_evidence_pack.json
      result_to_claim: drafts/result_to_claim.json
      paper_claim_audit: drafts/paper_claim_audit.md
      synthesis: literature/synthesis.md
      related_work_bib: literature/related_work.bib
      ablations: experiments/ablations.csv
      sections_dir: drafts/sections
      manuscript_resource_index: drafts/manuscript_resource_index.json
      evidence_plan: drafts/evidence_plan.json
      figure_table_plan: drafts/figure_table_plan.json
      cdr_claim_ledger: drafts/cdr_claim_ledger.json
      claim_ledger: drafts/claim_ledger.json
      figure_registry: drafts/figure_registry.json
      manuscript_audit: drafts/manuscript_audit.md
      craft_audit: drafts/craft_audit.md
      alignment_matrix: drafts/alignment_matrix.json
    outputs:
      revision_patches: drafts/patches/round_2_patches.json
      revision_response: drafts/revision_response_round_2.md
      paper: drafts/paper.tex                           # 修订后的论文
      manuscript_audit: drafts/manuscript_audit.md       # 更新后的机械审计
      craft_audit: drafts/craft_audit.md
      paper_claim_audit: drafts/paper_claim_audit.md
      paper_claim_audit_json: drafts/paper_claim_audit.json
    next_on_success: T8-PAPER-CLAIM-AUDIT
    next_on_failure: failed

  # T8-PAPER-CLAIM-AUDIT 状态：论文 claim 与 evidence pack 的最终一致性审计
  # 用途：进入 T9 前用零上下文审计检查 paper.tex 中实验数字/claim 是否有 result-to-claim 支撑。
  T8-PAPER-CLAIM-AUDIT:
    agent: writer
    mode: paper_claim_audit
    inputs:
      project: project.yaml
      paper: drafts/paper.tex
      result_to_claim: drafts/result_to_claim.json
      experiment_evidence_pack: drafts/experiment_evidence_pack.json
      integrity_audit: experiments/integrity_audit.json
      post_experiment_novelty_check: novelty/post_experiment_novelty_check.json
      must_not_claim: drafts/must_not_claim.md
      claim_ledger: drafts/claim_ledger.json
    outputs:
      paper_claim_audit: drafts/paper_claim_audit.md
      paper_claim_audit_json: drafts/paper_claim_audit.json
    next_on_success: T9
    next_on_failure: T8-REVISE-2

  # T9 状态：投稿准备（Submission Preparation）
  # 用途：将论文迁移到目标会议格式，匿名化检查，编译验证
  # Agent：submission（投稿准备）
  T9:
    agent: submission
    inputs:
      project: project.yaml                         # 项目配置
      paper: drafts/paper.tex                         # 论文草稿
      related_work_bib: literature/related_work.bib    # 引用库
      paper_claim_audit: drafts/paper_claim_audit.md
      paper_claim_audit_json: drafts/paper_claim_audit.json
      result_to_claim: drafts/result_to_claim.json
      experiment_evidence_pack: drafts/experiment_evidence_pack.json
    outputs:
      bundle_dir: submission/bundle                  # 投稿包目录
      migration_report: submission/migration_report.md  # 迁移报告
      main_tex: submission/bundle/main.tex
      references_bib: submission/bundle/references.bib
      main_pdf: submission/bundle/main.pdf
      compile_log: submission/bundle/main.log
      compile_report: submission/compile_report.json
    gate:
      type: submission_gate
      prompt: |
        投稿包准备完成。请审核：
        - migration_report.md 中的迁移详情
        - submission/bundle/ 中的文件
        - 匿名化检查结果

        确认无误后，工作流结束。确认继续吗？
    next_on_success: done
    next_on_failure: T8-WRITE  # 允许返回修改论文

  # ========================================
  # 终止状态
  # ========================================

  # done 状态：成功完成
  # 工作流正常结束
  done:
    terminal: true

  # failed 状态：失败终止
  # 工作流因错误而终止
  failed:
    terminal: true

# Internal LLM runtime defaults.
#
# These values are implementation defaults, not daily tuning knobs. The only
# user-maintained connection is config/model_settings.yaml.

# Used only when a provider cannot report its real context window.
context_window_fallback: 131072

# The runtime compacts persisted context before it reaches the provider limit.
truncation:
  trigger_ratio: 0.90
  target_ratio: 0.72

# ResearchOS Gates 配置文件
# Gates 用于在 Agent 状态转换时进行条件检查和验证
# 可以把它理解为“任务完成前的额外门禁规则”：
# - state_machine 决定流程怎么走
# - gates 决定“即使 agent 说自己完成了，系统还要不要再拦一下”
#
# 配置格式：
# gates:
#   <gate_name>:
#     type: <gate_type>        # Gate 类型（如 budget_check, quality_check 等）
#     config:                  # Gate 特定配置
#       <key>: <value>
#
# 示例：
# gates:
#   budget_gate:
#     type: budget_check
#     config:
#       max_cost: 10.0         # 最大成本（美元）
#       warn_threshold: 0.8    # 警告阈值（80%）
#
#   quality_gate:
#     type: output_validation
#     config:
#       min_length: 100        # 最小输出长度
#       required_fields:       # 必需字段
#         - title
#         - summary
#
# 当前配置：空（无 Gate 限制）
# 如需启用 Gate，请参考上述示例添加配置
gates:
  # 预算门控：限制单次运行的最大成本
  # 典型场景：不希望某次真实 API 调试失控烧钱。
  budget_gate:
    type: budget_check
    config:
      max_cost: 50.0
      warn_threshold: 0.8

  # 质量门控：验证输出基本质量
  # 适合对 markdown / json / 长文本产物做最小质量拦截。
  quality_gate:
    type: output_validation
    config:
      min_length: 500
      required_fields:
        - content

  # 新颖性门控：验证假设的新颖性评分
  # 这里假设上游已经产出了 novelty score；Gate 本身不负责生成该分数。
  novelty_gate:
    type: novelty_check
    config:
      min_novelty_score: 0.6

  # T2/T3 文献覆盖参数确认：
  # 这些是“研究覆盖强度”参数，不是内部网络重试上限。摘要/PDF/DOI/OpenAlex 等资源补全
  # 会对保留候选尽可能尝试；工程 safety cap 仍由系统内部控制，不要求用户填写。
  t2_literature_param_gate:
    title: "T2 文献覆盖参数确认"
    description: "确认本轮文献检索与阅读覆盖强度。可选档位，也可直接输入一句中文调整要求；未提到的字段保留当前推荐。"
    presentation:
      how_to_choose:
        literal: |
          如何选择：
          - 如果你在写研究论文：通常选“标准研究论文覆盖”，精读 35 篇，轻读最多 120 篇。
          - 如果你在写综述：通常选“综述均衡覆盖”，保留 180 篇候选，精读目标 60 篇，摘要轻读最多 120 篇。
          - 如果这是最终展示型综述或你特别在意覆盖面：选“综述强覆盖”，但运行更久、LLM 成本更高。
          - 如果你只想改数字：选“自定义关键数字”。自定义只影响覆盖目标，不影响系统尽可能补摘要/PDF/DOI 的策略。
          - 也可以直接输入一句修改要求，例如：把 active pool 改成 300；或：候选数300，精读80，摘要轻读120，require=false。
      parameter_meaning:
        literal: |
          参数含义：
          - 保留候选数 active_pool_max：T2 从检索结果里保留多少篇进入后续阅读处置。它不是精读篇数，也不是最终引用篇数；超出部分仍保存在 papers_backlog.jsonl，可追溯和回捞。
          - 精读目标 deep_read_target：正常完成 T3 前应完成多少篇结构化深读笔记。综述建议读满目标后再进入 T3.5。
          - 最低精读 deep_read_min：预算或资源异常时的最低可接受线。默认不把它当正常停止线，除非你选快速/自定义并允许达到最低线就继续。
          - 是否必须读满目标 require_deep_read_target：true 表示未读满精读目标不放行到 T3.5；false 表示达到最低精读即可放行。
          - 摘要轻读 abstract_sweep_target：T3 后对 active/retained 中未精读但有摘要的论文做多少篇 LLM 摘要级轻读；all_readable 表示在保留候选内不设上限，不会全读 papers_backlog。
          - metadata-only 处理：只有标题/年份/venue 而没有摘要/全文的论文会被 LLM 批量 triage，但不能当作证据；系统会尽量用 backlog 中有摘要/PDF 的候选补足可读覆盖。
          - 资源补全：对保留候选尽可能补摘要、DOI、OpenAlex/Crossref/Semantic Scholar/arXiv/可访问 PDF hints；内部 safety cap 只防异常失控，不需要用户设置。
      project_summary:
        from_file: project.yaml
        max_chars: 2500
      seed_outline_profile:
        from_file: user_seeds/seed_outline_profile.json
        max_chars: 2500
      bridge_domain_plan:
        from_file: literature/bridge_domain_plan.json
        max_chars: 2500
    options:
      - id: standard_research
        label: "标准研究论文覆盖"
        description: "写 research article 时的默认强度：保留 120 篇候选，T3 精读目标 35 篇，摘要轻读最多 120 篇。"
        aliases: ["standard", "research", "默认", "研究"]
        next: T2-PARAM-CONFIRM-GATE
      - id: survey_balanced
        label: "综述均衡覆盖（推荐综述）"
        description: "一般综述建议：保留 180 篇候选，T3 精读目标 60 篇，摘要轻读最多 120 篇。"
        aliases: ["survey", "review", "综述", "均衡"]
        next: T2-PARAM-CONFIRM-GATE
      - id: survey_exhaustive
        label: "综述强覆盖"
        description: "更重的综述覆盖：保留 240 篇候选，T3 精读目标 80 篇，摘要轻读最多 180 篇，适合最终展示型综述。"
        aliases: ["exhaustive", "full", "全量", "强覆盖"]
        next: T2-PARAM-CONFIRM-GATE
      - id: custom
        label: "自定义关键数字"
        description: "手动输入保留候选、精读目标、摘要轻读目标和是否必须读满目标。"
        aliases: ["自定义", "custom"]
        next: T2-PARAM-CONFIRM-GATE
        collect_input:
          - active_pool_max
          - deep_read_target
          - abstract_sweep_target
          - require_deep_read_target

  # T2 参数最终确认：
  # 参数 gate 会先落盘 literature/literature_params.json；这里把最终配置再次展示，
  # 允许用户确认进入 T2、返回重选，或结束项目。
  t2_literature_param_confirm_gate:
    title: "T2 文献覆盖参数最终确认"
    description: "请最后确认本轮 T2/T3 将使用的覆盖参数。确认后才会真正开始文献检索；如果数字或语言不对，请返回重选。"
    presentation:
      selected_parameters:
        from_file: literature/literature_params.json
        mode: path_summary
        summary_chars: 2600
      confirmation_help:
        literal: |
          你现在只需要判断：
          - 参数摘要是否符合本轮研究/综述需求；
          - 写作语言与是否允许中文文献是否正确；
          - 是否可以正式开始 T2 检索。
          如果刚才自定义输入错了，选择“返回重选参数”，不会启动 T2。
    options:
      - id: confirm_start_t2
        label: "确认，开始 T2 检索"
        aliases: ["确认", "开始", "start", "continue", "yes", "y"]
        next: T2
      - id: revise_params
        label: "返回重选参数"
        aliases: ["重选", "修改", "revise", "back"]
        next: T2-PARAM-GATE
      - id: stop_project
        label: "结束项目"
        aliases: ["结束", "停止", "stop", "done"]
        next: done

  # T3.6 综述支线入口：
  # 这是 runtime 级人工 gate，不需要先调用 LLM。synthesis.md 继续作为 T4 idea fuel；
  # 只有用户明确选择 yes 时，才启动 taxonomy-driven survey 分支。
  t36_survey_gate:
    title: "T3.6 是否撰写综述论文"
    description: "T3.5 的 synthesis.md 已完成，它主要服务于后续 idea 生成。这里询问是否额外撰写一篇 taxonomy-driven professional survey paper；这不是把 synthesis.md 转成 TeX。"
    presentation:
      synthesis_preview:
        from_file: literature/synthesis.md
        mode: path_summary
        summary_chars: 8000
      weak_evidence_preview:
        from_file: literature/metadata_triage.md
        mode: path_summary
        summary_chars: 3000
    options:
      - id: "no"
        label: "不写综述，进入 T4"
        next: T4
      - id: "yes"
        label: "撰写综述论文"
        next: T3.6-TEMPLATE-GATE

  # T3.6 综述写作语言与 LaTeX 模板确认：
  # 这是 runtime 级确定 gate，选完后写 drafts/survey/writing_template.json。
  # CCF 默认 NeurIPS；UTD 默认 INFORMS；也可以只选基础中文/英文模板。
  t36_template_gate:
    title: "T3.6 综述语言与模板确认"
    description: "请先确认综述正文语言和 LaTeX 模板。这里决定后续 survey plan 和 TeX assembly 使用的模板，不需要先运行 LLM。"
    presentation:
      how_to_choose:
        literal: |
          如何选择：
          - 只想先写内容稿：中文选“中文基础模板”，英文选“英文基础模板”。
          - CCF/AI/CS 会议综述：默认选“CCF 默认 NeurIPS”；若目标更明确，也可直接选 ICLR、ICML 或 KDD。当前本地可编译入口支持 template_id=neurips/iclr/icml/kdd。
          - UTD/Management Science/ISR/INFORMS/CDS 风格：选“UTD/INFORMS”。默认使用本地官方 INFORMS ISRE 2024 模板包；若最终投稿到其他 INFORMS 期刊，可再替换为对应官方期刊包。
          - 不确定投哪里：先选基础英文或基础中文，后续 T8/T9 仍可重新确认。
      project_summary:
        from_file: project.yaml
        max_chars: 2500
      seed_outline_profile:
        from_file: user_seeds/seed_outline_profile.json
        max_chars: 2000
    options:
      - id: basic_en
        label: "英文基础模板"
        description: "只确定英文正文，使用普通 article 模板。"
        aliases: ["英文", "english", "en", "basic_en", "不用模板", "不要模板"]
        next: T3.6-PLAN
        captured_defaults:
          template_family: basic_en
          template_id: basic_en
          writing_language: en
      - id: basic_zh
        label: "中文基础模板"
        description: "只确定中文正文，使用 ctex 中文基础模板。"
        aliases: ["中文", "chinese", "zh", "basic_zh"]
        next: T3.6-PLAN
        captured_defaults:
          template_family: basic_zh
          template_id: basic_zh
          writing_language: zh
      - id: ccf_neurips
        label: "CCF 默认 NeurIPS"
        description: "英文 CCF/AI/CS 会议稿默认入口；本地默认模板为 NeurIPS。"
        aliases: ["ccf", "neurips", "ccf-a", "会议"]
        next: T3.6-PLAN
        captured_defaults:
          template_family: ccf
          template_id: neurips
          writing_language: en
      - id: ccf_iclr
        label: "CCF + ICLR"
        description: "英文 CCF/AI/ML 会议稿，使用本地 ICLR 2026 样式入口。"
        aliases: ["iclr", "iclr2026"]
        next: T3.6-PLAN
        captured_defaults:
          template_family: ccf
          template_id: iclr
          writing_language: en
      - id: ccf_icml
        label: "CCF + ICML"
        description: "英文 CCF/AI/ML 会议稿，使用本地 ICML 2026 样式入口。"
        aliases: ["icml", "icml2026"]
        next: T3.6-PLAN
        captured_defaults:
          template_family: ccf
          template_id: icml
          writing_language: en
      - id: ccf_kdd
        label: "CCF + KDD"
        description: "英文 CCF/数据挖掘会议稿，使用本地 ACM/KDD 样式入口。"
        aliases: ["kdd", "sigkdd", "kdd2026"]
        next: T3.6-PLAN
        captured_defaults:
          template_family: ccf
          template_id: kdd
          writing_language: en
      - id: utd_informs
        label: "UTD/INFORMS"
        description: "英文 UTD/Management Science/ISR/INFORMS/CDS 风格稿件，使用本地官方 INFORMS ISRE 2024 模板包。"
        aliases: ["utd", "informs", "management science", "isr", "misq", "cds", "commerce data science", "informs journal on data science"]
        next: T3.6-PLAN
        captured_defaults:
          template_family: utd
          template_id: informs
          writing_language: en
      - id: custom
        label: "自定义模板"
        description: "手动输入 template_family、template_id、writing_language。"
        aliases: ["custom", "自定义"]
        next: T3.6-PLAN
        collect_input:
          - template_family
          - template_id
          - writing_language

  # T3.6 综述语料范围确认：
  # conservative 只使用现有 T2/T3 语料；complete 只做一次性定向补检计划，
  # 不自动回到 T2/T3 无限循环。
  t36_corpus_gate:
    title: "T3.6 综述素材范围"
    description: "请确认综述写作使用现有语料，还是生成一次性定向补检计划来补 taxonomy 空类或弱类。"
    presentation:
      survey_plan:
        from_file: drafts/survey/survey_plan.json
        max_chars: 5000
      current_notes:
        from_dir: literature/paper_notes
        glob: "*.md"
        max_items: 20
      abstract_notes:
        from_dir: literature/paper_notes_abstract
        glob: "*.md"
        max_items: 20
    options:
      - id: conservative
        label: "使用现有语料"
        next: T3.6-STATE
      - id: complete
        label: "生成一次性补检计划"
        next: T3.6-EXPAND

  # T3.6 综述完成后的去向确认：
  # Survey PDF/summary 已生成后，用户可能只想结束综述任务，也可能继续进入 T4 idea。
  t36_post_survey_gate:
    title: "T3.6 综述完成后去向确认"
    description: "综述支线已完成并导出 survey_insights。请确认现在结束项目，还是继续进入 T4 生成研究 idea。"
    presentation:
      survey_summary:
        from_file: drafts/survey/survey_summary.md
        mode: path_summary
        summary_chars: 2200
      survey_compile_report:
        from_file: drafts/survey/survey_compile_report.json
        max_chars: 2000
      survey_insights:
        from_file: ideation/survey_insights.json
        mode: path_summary
        summary_chars: 1800
      how_to_choose:
        literal: |
          选择建议：
          - 如果这次只需要综述 PDF/TeX：选择“结束项目”。
          - 如果还要基于综述继续生成研究假设、实验计划和后续论文：选择“继续进入 T4”。
          - 选择会写入 drafts/survey/post_survey_decision.json，resume 时不会丢失。
    options:
      - id: continue_to_t4
        label: "继续进入 T4"
        aliases: ["继续", "t4", "idea", "生成idea", "continue"]
        next: T4
      - id: finish_after_survey
        label: "结束项目"
        aliases: ["结束", "完成", "stop", "done", "finish"]
        next: done

  # T4 Gate1 候选方向选择：
  # 候选池已经写入 artifact，runtime 在这里暂停，让用户选择、合并、重构或要求重分析。
  t4_gate1_selection_gate:
    title: "T4 Gate1 候选方向选择"
    description: "候选池已就绪。中文决策面板会完整展示问题、机制、预测、反事实、实验、评分、证据和文件导航；请直接选择、合并、重构或要求重新分析。"
    presentation:
      gate1_candidate_cards:
        from_file: ideation/_gate1_candidate_cards.md
        mode: path_summary
        summary_chars: 1800
      gate1_selection_brief:
        from_file: ideation/_gate1_selection_brief.md
        mode: path_summary
        summary_chars: 2400
      how_to_answer:
        literal: |
          推荐输入方式：
          - 直接输入 `D1`：选择某个候选并允许后半段按你的文字重构。
          - 直接输入 `D1+D3` 或 `merge D1+D3`：合并多个候选。
          - 可精确到候选假设，例如 `merge D1-H2 + D3-H1`，并说明保留的机制与验证方式。
          - 输入 `new: ...`：补充一个新想法。
          - 输入 `reanalyze: ...`：要求重新生成候选池。
          终端会完整展示短标题、创新、候选 H1/H2/H3、合并关系、评分和证据；详细卡片请打开 ideation/_gate1_candidate_cards.md；简报请打开 ideation/_gate1_selection_brief.md。
      machine_readable_artifacts:
        literal: |
          机器可读附录路径（一般不需要直接阅读）：
          - ideation/_candidate_directions.json：完整候选结构化数据
          - ideation/_pass2_grounding_review.json：Pass2 文献接地、风险和推荐
          - ideation/_pass1_forward_candidates.json：Pass1 原始发散候选
          - ideation/bridge_coverage_review.json：如存在，记录 bridge 候选上桌/暂缓原因
    options:
      - id: select_or_reframe
        label: "按说明选择/重构"
        next: T4
        collect_input:
          - selection
      - id: merge
        label: "合并多个候选"
        next: T4
        collect_input:
          - merge_plan
      - id: new_idea
        label: "补充新想法"
        next: T4
        collect_input:
          - new_idea
      - id: reanalyze
        label: "重新分析候选池"
        next: T4
        collect_input:
          - feedback

  # 投稿匿名化门控：检查论文匿名化完整性
  # forbidden_patterns 是逻辑标签，不一定是简单字符串匹配；
  # 实际检查逻辑取决于对应 Gate 实现。
  submission_gate:
    type: anonymization_check
    config:
      allowed_patterns: []
      forbidden_patterns:
        - email
        - github_url
        - acknowledgments_section
        - author_name
        - institution_identifiable

  # T7.5 评估后的人类确认门：
  # 先展示 PI 生成的 evaluation_decision.md，再由人决定是否启动写论文、
  # 继续补实验，或回到更上游重构假设。
  t75_human_review_gate:
    title: "T7.5 评估确认"
    description: "PI 已完成实验评估。请结合评估报告确认下一步。"
    presentation:
      evaluation_decision:
        from_file: evaluation/evaluation_decision.md
        max_chars: 5000
      recommended_next_task:
        from_file_regex:
          path: evaluation/evaluation_decision.md
          pattern: "next_task:\\s*([A-Za-z0-9_.-]+)"
          group: 1
          default: "T8-STYLE-GATE"
    options:
      - id: follow_recommendation
        label: "按 PI 推荐推进"
        next: "__parse_from_output__"
      - id: go_write
        label: "直接启动写作"
        next: T8-STYLE-GATE
      - id: rerun_t7
        label: "回到外部实验链补实验"
        next: T5-REBOOST-GATE
      - id: rethink_t4
        label: "回到 T4 重构假设"
        next: T4
      - id: stop_project
        label: "结束当前项目"
        next: done

  # T8 正文写作风格、语言与 LaTeX 模板确认：
  # 这是 runtime 级确定 gate，选完后写 drafts/writing_style.json。
  t8_style_template_gate:
    title: "T8 写作风格与模板确认"
    description: "请确认正式论文正文采用 IS/CCF-A/both 风格，以及使用哪类 LaTeX 模板。"
    presentation:
      how_to_choose:
        literal: |
          如何选择：
          - IS/UTD/CDS 期刊稿：选“IS + INFORMS”，默认 template_family=utd, template_id=informs。
          - CCF-A 会议稿：默认选“CCF-A + NeurIPS”，也可直接选 ICLR、ICML 或 KDD。当前本地可编译入口支持 template_id=neurips/iclr/icml/kdd。
          - 同时准备两套稿：选“Both + 基础英文”，先共享资源索引与 alignment matrix。
          - 只想确定中英、不套 venue：选中文基础或英文基础。
          - Management Science/ISR/INFORMS 默认使用本地官方 INFORMS ISRE 2024 模板包；若最终投稿到其他 INFORMS 期刊，可再替换对应官方 ZIP。
      project_summary:
        from_file: project.yaml
        max_chars: 2500
      evaluation_decision:
        from_file: evaluation/evaluation_decision.md
        max_chars: 2000
    options:
      - id: is_informs
        label: "IS + INFORMS"
        description: "IS/UTD/CDS 期刊写法，英文 INFORMS 官方 ISRE 2024 模板。"
        aliases: ["is", "utd", "informs", "management science", "isr", "misq", "cds", "commerce data science", "informs journal on data science"]
        next: T8-RESOURCE
        captured_defaults:
          venue_style: is
          template_family: utd
          template_id: informs
          writing_language: en
      - id: ccf_neurips
        label: "CCF-A + NeurIPS"
        description: "CCF-A/AI/CS 会议写法，英文 NeurIPS 模板。"
        aliases: ["ccf", "ccf_a", "ccf-a", "neurips", "conference"]
        next: T8-RESOURCE
        captured_defaults:
          venue_style: ccf_a
          template_family: ccf
          template_id: neurips
          writing_language: en
      - id: ccf_iclr
        label: "CCF-A + ICLR"
        description: "CCF-A/AI/ML 会议写法，英文 ICLR 2026 样式入口。"
        aliases: ["iclr", "iclr2026"]
        next: T8-RESOURCE
        captured_defaults:
          venue_style: ccf_a
          template_family: ccf
          template_id: iclr
          writing_language: en
      - id: ccf_icml
        label: "CCF-A + ICML"
        description: "CCF-A/AI/ML 会议写法，英文 ICML 2026 样式入口。"
        aliases: ["icml", "icml2026"]
        next: T8-RESOURCE
        captured_defaults:
          venue_style: ccf_a
          template_family: ccf
          template_id: icml
          writing_language: en
      - id: ccf_kdd
        label: "CCF-A + KDD"
        description: "CCF-A/数据挖掘会议写法，英文 ACM/KDD 样式入口。"
        aliases: ["kdd", "sigkdd", "kdd2026"]
        next: T8-RESOURCE
        captured_defaults:
          venue_style: ccf_a
          template_family: ccf
          template_id: kdd
          writing_language: en
      - id: both_basic_en
        label: "Both + 基础英文"
        description: "同时准备 IS/CCF-A 两套写作结构，先用英文基础模板。"
        aliases: ["both", "两套", "双线"]
        next: T8-RESOURCE
        captured_defaults:
          venue_style: both
          template_family: basic_en
          template_id: basic_en
          writing_language: en
      - id: basic_en
        label: "英文基础模板"
        description: "只确定英文正文，使用普通 article 模板，不套 venue。"
        aliases: ["英文", "english", "en", "basic_en", "不用模板", "不要模板"]
        next: T8-RESOURCE
        captured_defaults:
          venue_style: ccf_a
          template_family: basic_en
          template_id: basic_en
          writing_language: en
      - id: basic_zh
        label: "中文基础模板"
        description: "中文正文，使用 ctex 中文基础模板。"
        aliases: ["中文", "chinese", "zh", "basic_zh"]
        next: T8-RESOURCE
        captured_defaults:
          venue_style: is
          template_family: basic_zh
          template_id: basic_zh
          writing_language: zh
      - id: custom
        label: "自定义模板"
        description: "手动输入 venue_style、template_family、template_id、writing_language。"
        aliases: ["custom", "自定义"]
        next: T8-RESOURCE
        collect_input:
          - venue_style
          - template_family
          - template_id
          - writing_language

  # T4.5 非通过 verdict 的人工确认门：
  # Novelty Auditor 可以建议 reframe/drop，但最终是否回 T4、继续 T7 或停止由用户决定。
  t45_human_review_gate:
    title: "T4.5 新颖性审计人工决策"
    description: "T4.5 的 Final Gate Verdict 未直接通过。请查看审计报告和候选池后决定下一步，系统不会自动拒绝或自动回退。"
    presentation:
      final_gate_verdict:
        from_file_regex:
          path: ideation/novelty_audit.md
          pattern: "(?im)^\\s*(?:#+\\s*)?(?:\\*\\*)?\\s*Final\\s+Gate\\s+Verdict\\s*(?:\\*\\*)?\\s*[:：]\\s*(.+?)\\s*$"
          group: 1
          default: "未解析到 Final Gate Verdict"
      novelty_audit:
        from_file: ideation/novelty_audit.md
        max_chars: 7000
      gate1_selection_brief:
        from_file: ideation/_gate1_selection_brief.md
        max_chars: 3000
      selected_idea_brief:
        from_file: ideation/selected_idea_brief.md
        max_chars: 5000
      idea_scorecard:
        from_file: ideation/idea_scorecard.yaml
        max_chars: 5000
      rejected_ideas:
        from_file: ideation/rejected_ideas.md
        max_chars: 3000
    options:
      - id: continue_to_t7
        label: "继续进入外部实验链"
        next: T5-REBOOST-GATE
      - id: return_to_t4
        label: "回到 T4 重构"
        next: T4
      - id: stop_project
        label: "结束当前项目"
        next: done

  # T2 检索覆盖确认门：
  # T2 的 missing_areas.md 只提供 retrieval coverage hints，不是研究缺口结论。
  # 这个 gate 把补检/复核建议交给用户决策，避免系统在覆盖不足时直接进入 T3。
  t2_coverage_gate:
    title: "T2 检索覆盖确认"
    description: "Scout 已完成初步检索、验证、引用图和 deep-read queue。请确认是否按当前队列进入 T3，或回到 T2 扩检/调整。"
    presentation:
      search_log:
        from_file: literature/search_log.md
        mode: path_summary
        summary_chars: 20000
      missing_areas:
        from_file: literature/missing_areas.md
        mode: path_summary
        summary_chars: 12000
      domain_map:
        from_file: literature/domain_map.json
        mode: path_summary
        summary_chars: 20000
      access_audit:
        from_file: literature/access_audit.md
        mode: path_summary
        summary_chars: 8000
      deep_read_queue_preview:
        from_file: literature/deep_read_queue.jsonl
        mode: path_summary
        summary_chars: 12000
    options:
      - id: continue_to_t3
        label: "进入 T3 精读"
        next: T3
      - id: rerun_t2_expand
        label: "回到 T2 扩检/调整 query"
        next: T2
        extra:
          allow_t2_failure_recovery: false
          t2_user_requested_expansion: true
      - id: stop_project
        label: "结束当前项目"
        next: done

  # T5 实验材料放置门：
  # 真实实验启动前，用户把 baseline/dataset/weights 等材料放进 external_executor/expr/。
  t5_expr_material_gate:
    title: "T5 实验材料放置确认"
    description: "T5 已完成 re-boost、handoff 和项目专属 skill suite 生成。请先把 baseline model、dataset、外部代码、权重和材料说明放入 external_executor/expr/，再选择执行器。"
    presentation:
      expr_path:
        literal: "external_executor/expr/"
      expr_files:
        from_dir: external_executor/expr
        glob: "*"
        max_items: 50
      materials_checklist:
        from_file: external_executor/expr/MATERIALS_CHECKLIST.json
        max_chars: 4000
      handoff_summary:
        from_file: external_executor/handoff_pack.json
        max_chars: 4000
      launch_after_gate:
        literal: |
          材料就绪后，下一步会进入外部执行器选择 gate。
          如果选择 Codex CLI，系统会提示你在 workspace 根目录启动 Codex CLI，让它读取 external_executor/AGENTS.md 并执行 external_executor/skills/research-execution/SKILL.md。
          Codex 完成后应写回 external_executor/result_pack.json、external_executor/executor_status.json 和 external_executor/run_manifest.json，然后使用 python -m researchos.cli resume --workspace <workspace> 恢复。
    options:
      - id: materials_ready
        label: "材料已放置，继续"
        aliases: ["ready", "continue", "done"]
        next: T5-EXECUTOR-GATE
        collect_input:
          - notes
      - id: pause_for_materials
        label: "暂停等待放置材料"
        aliases: ["pause", "wait"]
        next: T5-EXPR-MATERIAL-GATE
        collect_input:
          - notes
      - id: back_to_t4
        label: "回到 T4 重构实验设想"
        aliases: ["t4", "rethink"]
        next: T4
      - id: stop_project
        label: "结束当前项目"
        aliases: ["stop"]
        next: done

  t5_executor_gate:
    title: "T5 外部实验执行器选择"
    description: "ResearchOS 已生成 handoff 协议和项目专属 skill suite。默认使用 Codex CLI 真实执行；mock 只用于协议联调，不是论文实验证据。"
    presentation:
      handoff_summary:
        from_file: external_executor/handoff_pack.json
        max_chars: 5000
      allowed_paths:
        from_file: external_executor/allowed_paths.txt
        max_chars: 2500
      skill_specialization_report:
        from_file: external_executor/skill_specialization_report.json
        max_chars: 2500
      codex_prompt:
        from_file: external_executor/codex_prompt.md
        max_chars: 2500
      claude_prompt:
        from_file: external_executor/claude_code_prompt.md
        max_chars: 2500
      codex_resume_instructions:
        literal: |
          Codex CLI 选择后的操作：
          1. 在当前 workspace 根目录启动 Codex CLI。
          2. 对 Codex 说：请读取 external_executor/AGENTS.md，并执行 external_executor/skills/research-execution/SKILL.md。
          3. Codex 完成后必须写出 external_executor/result_pack.json、external_executor/executor_status.json 和 external_executor/run_manifest.json。
          4. 回到 ResearchOS，运行 python -m researchos.cli resume --workspace <workspace>。
          如果上方 skill_specialization_report 显示 file not found，请先运行 researchos specialize-executor-skills --workspace <workspace>，再回到本 gate。
    options:
      - id: codex_cli
        label: "Codex CLI 真实执行"
        aliases: ["codex"]
        next: T5-EXTERNAL-WAIT
        collect_input:
          - notes
      - id: claude_code_window
        label: "Claude Code 窗口执行"
        aliases: ["claude", "cc"]
        next: T5-EXTERNAL-WAIT
      - id: manual
        label: "人工/其它执行器"
        aliases: ["manual", "human"]
        next: T5-EXTERNAL-WAIT
      - id: mock_dry_run
        label: "mock dry-run（协议测试）"
        aliases: ["mock", "dry", "dry_run"]
        next: T5-DRY-RUN
      - id: revise_handoff
        label: "返回重建 handoff"
        next: T5-REBOOST-GATE

# ResearchOS Gates 配置文件
# Gates 用于在 Agent 状态转换时进行条件检查和验证
# 可以把它理解为“任务完成前的额外门禁规则”：
# - state_machine 决定流程怎么走
# - gates 决定“即使 agent 说自己完成了，系统还要不要再拦一下”
#
# 配置格式：
# gates:
#   <gate_name>:
#     type: <gate_type>        # Gate 类型（如 budget_check, quality_check 等）
#     config:                  # Gate 特定配置
#       <key>: <value>
#
# 示例：
# gates:
#   budget_gate:
#     type: budget_check
#     config:
#       max_cost: 10.0         # 最大成本（美元）
#       warn_threshold: 0.8    # 警告阈值（80%）
#
#   quality_gate:
#     type: output_validation
#     config:
#       min_length: 100        # 最小输出长度
#       required_fields:       # 必需字段
#         - title
#         - summary
#
# 当前配置：空（无 Gate 限制）
# 如需启用 Gate，请参考上述示例添加配置
gates:
  t4_prerun_gate:
    title: "T4 · 研究方向形成与演化"
    description: "请根据下列说明选择本轮运行方式。选择后系统才会调用模型；已有 Population、评分和谱系都会保留，可 resume 或 rollback。"
    options:
      - id: start_standard
        label: "标准运行（推荐）"
        description: "完成两轮 P0 → P1 → P2：形成初始候选、独立评分、生成少量 Mutation / Crossover Child，并在第二轮深化机制、反事实与验证设计后保留 1–3 个候选供你选择。适合第一次进入 T4，想获得完整且可回退的候选组合。"
        is_default: true
        collect_input: [publication_orientation]
        input_prompts:
          publication_orientation: "论文取向（直接回车采用建议；也可输入“偏 UTD，但技术要扎实”“目标 CCF A”或“Hybrid”）"
      - id: start_quick
        label: "快速查看"
        description: "只形成并评分初始 Population P0，不生成 Child。适合先确认研究空间和候选类型是否合理；不会删除已有版本。"
        collect_input: [publication_orientation]
        input_prompts:
          publication_orientation: "论文取向（直接回车采用建议；也可用一句话说明）"
      - id: start_deep
        label: "深入探索"
        description: "连续运行三轮 Evolution，并保留每一代中间结果。适合材料较充分、愿意等待更久并比较更多演化路线的情况。"
        collect_input: [publication_orientation]
        input_prompts:
          publication_orientation: "论文取向（直接回车采用建议；也可用一句话说明）"
      - id: start_auto
        label: "自动判断"
        description: "由 Controller 根据候选质量与多样性决定是否值得继续下一轮，运行时间可能变化。适合不想自己决定轮数的情况。"
        collect_input: [publication_orientation]
        input_prompts:
          publication_orientation: "论文取向（直接回车采用建议；也可用一句话说明）"
      - id: adjust
        label: "调整运行方式"
        description: "用一句话修改模式、是否尝试 Crossover 或展示候选数量。涉及材料范围的变化会再次确认。"
        collect_input:
          - settings
      - id: inspect_materials
        label: "仅查看材料后暂停"
        description: "只查看当前证据和输入，不调用模型、不生成候选；下次 resume 会回到这里。适合先核对材料。"
      - id: pause
        label: "暂停"
        description: "保存当前准备状态，不开始 T4；下次 resume 会回到这里。"
  # 预算门控：限制单次运行的最大成本
  # 典型场景：不希望某次真实 API 调试失控烧钱。
  budget_gate:
    type: budget_check
    config:
      max_cost: 50.0
      warn_threshold: 0.8

  # 质量门控：验证输出基本质量
  # 适合对 markdown / json / 长文本产物做最小质量拦截。
  quality_gate:
    type: output_validation
    config:
      min_length: 500
      required_fields:
        - content

  # 新颖性门控：验证假设的新颖性评分
  # 这里假设上游已经产出了 novelty score；Gate 本身不负责生成该分数。
  novelty_gate:
    type: novelty_check
    config:
      min_novelty_score: 0.6

  # T2/T3 文献覆盖参数确认：
  # 这些是“研究覆盖强度”参数，不是内部网络重试上限。摘要/PDF/DOI/OpenAlex 等资源补全
  # 会对保留候选尽可能尝试；工程 safety cap 仍由系统内部控制，不要求用户填写。
  t2_literature_param_gate:
    title: "T2 文献覆盖参数确认"
    description: "确认本轮文献检索与阅读覆盖强度。可选档位，也可直接输入一句中文调整要求；未提到的字段保留当前推荐。"
    presentation:
      how_to_choose:
        literal: |
          如何选择：
          - 如果你在写研究论文：通常选“标准研究论文覆盖”，共覆盖 120 篇候选，其中精读 35 篇、摘要轻读 85 篇。
          - 如果你在写综述：通常选“综述均衡覆盖”，保留 180 篇候选，精读目标 60 篇，摘要轻读最多 120 篇。
          - 如果这是最终展示型综述或你特别在意覆盖面：选“综述强覆盖”，但运行更久、LLM 成本更高。
          - 如果你只想改数字：选“自定义关键数字”。自定义只影响覆盖目标，不影响系统尽可能补摘要/PDF/DOI 的策略。
          - 也可以直接输入一句修改要求，例如：把 active pool 改成 300；或：候选数300，精读80，摘要轻读120，require=false。若你明确给出的精读加摘要轻读大于候选数，确认页会先说明并把候选数调到两者之和，等待你确认后才开始 T2。
      parameter_meaning:
        literal: |
          参数含义：
          - 保留候选数 active_pool_max：T2 从检索结果里保留多少篇进入本轮阅读处置。它等于本轮不同论文的阅读覆盖上限，由精读和摘要轻读分配；超出部分仍保存在 papers_backlog.jsonl，可追溯和回捞。
          - 精读目标 deep_read_target：正常完成 T3 前应完成多少篇结构化深读笔记。综述建议读满目标后再进入 T3.5。
          - 最低精读 deep_read_min：预算或资源异常时的最低可接受线。默认不把它当正常停止线，除非你选快速/自定义并允许达到最低线就继续。
          - 是否必须读满目标 require_deep_read_target：true 表示未读满精读目标不放行到 T3.5；false 表示达到最低精读即可放行。
          - 摘要轻读 abstract_sweep_target：T3 后对保留候选中未精读但有摘要的论文做多少篇 LLM 摘要级轻读。它与精读目标共同构成阅读覆盖；all_readable 表示覆盖全部剩余可读候选，不会全读 papers_backlog。
          - metadata-only 处理：只有标题/年份/venue 而没有摘要/全文的论文会被 LLM 批量 triage，但不能当作证据；系统会尽量用 backlog 中有摘要/PDF 的候选补足可读覆盖。
          - 资源补全：对保留候选尽可能补摘要、DOI、OpenAlex/Crossref/Semantic Scholar/arXiv/可访问 PDF hints；内部 safety cap 只防异常失控，不需要用户设置。
      project_summary:
        from_file: project.yaml
        max_chars: 2500
      seed_outline_profile:
        from_file: user_seeds/seed_outline_profile.json
        max_chars: 2500
      bridge_domain_plan:
        from_file: literature/bridge_domain_plan.json
        max_chars: 2500
    options:
      - id: standard_research
        label: "标准研究论文覆盖"
        description: "写 research article 时的默认强度：共覆盖 120 篇候选，其中 T3 精读目标 35 篇、摘要轻读 85 篇。"
        aliases: ["standard", "research", "默认", "研究"]
        next: T2-PARAM-CONFIRM-GATE
      - id: survey_balanced
        label: "综述均衡覆盖（推荐综述）"
        description: "一般综述建议：共覆盖 180 篇候选，其中 T3 精读目标 60 篇、摘要轻读 120 篇。"
        aliases: ["survey", "review", "综述", "均衡"]
        next: T2-PARAM-CONFIRM-GATE
      - id: survey_exhaustive
        label: "综述强覆盖"
        description: "更重的综述覆盖：共覆盖 240 篇候选，其中 T3 精读目标 80 篇、摘要轻读 160 篇，适合最终展示型综述。"
        aliases: ["exhaustive", "full", "全量", "强覆盖"]
        next: T2-PARAM-CONFIRM-GATE
      - id: custom
        label: "自定义关键数字"
        description: "手动输入保留候选、精读目标、摘要轻读目标和是否必须读满目标。"
        aliases: ["自定义", "custom"]
        next: T2-PARAM-CONFIRM-GATE
        collect_input:
          - active_pool_max
          - deep_read_target
          - abstract_sweep_target
          - require_deep_read_target

  # T2 参数最终确认：
  # 参数 gate 会先落盘 literature/literature_params.json；这里把最终配置再次展示，
  # 允许用户确认进入 T2、返回重选，或结束项目。
  t2_literature_param_confirm_gate:
    title: "T2 文献覆盖参数最终确认"
    description: "请最后确认本轮 T2/T3 将使用的覆盖参数。确认后才会真正开始文献检索；如果数字或语言不对，请返回重选。"
    presentation:
      selected_parameters:
        from_file: literature/literature_params.json
        mode: path_summary
        summary_chars: 2600
      confirmation_help:
        literal: |
          你现在只需要判断：
          - 参数摘要是否符合本轮研究/综述需求；
          - 写作语言与是否允许中文文献是否正确；
          - 是否可以正式开始 T2 检索。
          如果刚才自定义输入错了，选择“返回重选参数”，不会启动 T2。
    options:
      - id: confirm_start_t2
        label: "确认，开始 T2 检索"
        aliases: ["确认", "开始", "start", "continue", "yes", "y"]
        next: T2
      - id: revise_params
        label: "返回重选参数"
        aliases: ["重选", "修改", "revise", "back"]
        next: T2-PARAM-GATE
      - id: stop_project
        label: "结束项目"
        aliases: ["结束", "停止", "stop", "done"]
        next: done

  # T3.6 综述支线入口：
  # 这是 runtime 级人工 gate，不需要先调用 LLM。synthesis.md 继续作为 T4 idea fuel；
  # 只有用户明确选择 yes 时，才启动 taxonomy-driven survey 分支。
  t36_survey_gate:
    title: "T3.6 是否撰写综述论文"
    description: "T3.5 的 synthesis.md 已完成，它主要服务于后续 idea 生成。这里先确认是否额外撰写 taxonomy-driven professional survey，并选择使用当前语料还是先做一次定向文献补检；这不是把 synthesis.md 直接转成 TeX。"
    presentation:
      synthesis_preview:
        from_file: literature/synthesis.md
        mode: path_summary
        summary_chars: 8000
      weak_evidence_preview:
        from_file: literature/metadata_triage.md
        mode: path_summary
        summary_chars: 3000
    options:
      - id: "no"
        label: "不写综述，进入 T4"
        next: T4
      - id: "yes"
        label: "使用当前语料撰写综述"
        description: "继续进入 taxonomy/模板确认；后续仍会审计语料充分性和弱证据。"
        next: T3.6-TEMPLATE-GATE
        captured_defaults:
          survey_retrieval_preference: current_corpus_only
      - id: "yes_targeted_retrieval"
        label: "先定向补检，再撰写综述"
        description: "先进入 taxonomy 规划；随后 corpus Gate 将以一次性定向补检为优先路径。检索线索必须经阅读/证据分级后才能写入正文。"
        next: T3.6-TEMPLATE-GATE
        captured_defaults:
          survey_retrieval_preference: targeted_supplement_before_writing

  # T3.6 综述写作语言与 LaTeX 模板确认：
  # CCF 先选择模板大类，再选择已上传的具体会议模板。
  t36_template_gate:
    title: "T3.6 综述语言与模板确认"
    description: "请先确认综述正文语言和 LaTeX 模板。这里决定后续 survey plan 和 TeX assembly 使用的模板，不需要先运行 LLM。"
    presentation:
      how_to_choose:
        literal: |
          如何选择：
          - 只想先写内容稿：中文选“中文基础模板”，英文选“英文基础模板”。
          - CCF/AI/CS 会议综述：先选“CCF / CS 会议模板”，下一页再从本地模板中选择具体会议。系统会区分有官方 `.tex` 入口的模板与只有 class/style 包的模板。
          - UTD/Management Science/ISR/INFORMS/CDS 风格：选“UTD/INFORMS”。默认使用本地官方 INFORMS ISRE 2024 模板包；若最终投稿到其他 INFORMS 期刊，可再替换为对应官方期刊包。
          - 不确定投哪里：先选基础英文或基础中文，后续 T8/T9 仍可重新确认。
      project_summary:
        from_file: project.yaml
        max_chars: 2500
      seed_outline_profile:
        from_file: user_seeds/seed_outline_profile.json
        max_chars: 2000
    options:
      - id: basic_en
        label: "英文基础模板"
        description: "只确定英文正文，使用普通 article 模板。"
        aliases: ["英文", "english", "en", "basic_en", "不用模板", "不要模板"]
        next: T3.6-PLAN
        captured_defaults:
          template_family: basic_en
          template_id: basic_en
          writing_language: en
      - id: basic_zh
        label: "中文基础模板"
        description: "只确定中文正文，使用 ctex 中文基础模板。"
        aliases: ["中文", "chinese", "zh", "basic_zh"]
        next: T3.6-PLAN
        captured_defaults:
          template_family: basic_zh
          template_id: basic_zh
          writing_language: zh
      - id: ccf
        label: "CCF / CS 会议模板"
        description: "下一步选择具体会议模板；原 workspace 和已有写作文件不会被删除。"
        aliases: ["ccf", "ccf-a", "会议", "conference"]
        next: T3.6-CCF-TEMPLATE-GATE
      - id: utd_informs
        label: "UTD/INFORMS"
        description: "英文 UTD/Management Science/ISR/INFORMS/CDS 风格稿件，使用本地官方 INFORMS ISRE 2024 模板包。"
        aliases: ["utd", "informs", "management science", "isr", "misq", "cds", "commerce data science", "informs journal on data science"]
        next: T3.6-PLAN
        captured_defaults:
          template_family: utd
          template_id: informs
          writing_language: en
      - id: custom
        label: "自定义模板"
        description: "手动输入 template_family、template_id、writing_language。"
        aliases: ["custom", "自定义"]
        next: T3.6-PLAN
        collect_input:
          - template_family
          - template_id
          - writing_language

  t36_ccf_template_gate:
    title: "选择 CCF / CS 会议模板"
    description: "请从本地已检测到的会议模板中选择一个。带“官方 LaTeX 入口”的模板会直接用于组装；带“本地模板包”的条目会生成匿名写作外壳，投稿前仍应核对该会议当年的官方模板。"
    presentation:
      project_summary:
        from_file: project.yaml
        max_chars: 1200
    options: []

  # T3.6 综述语料范围确认：
  # conservative 只使用现有 T2/T3 语料；complete 只做一次性定向补检计划，
  # 不自动回到 T2/T3 无限循环。
  t36_corpus_gate:
    title: "T3.6 综述素材范围"
    description: "请确认综述写作使用现有语料，还是执行一次定向补充检索。系统会根据当前 notes、taxonomy 和章节结构给出覆盖建议；检索到且带摘要的材料会进入统一 shallow_read_notes，仍不会自动变成强证据。"
    presentation:
      survey_plan:
        from_file: drafts/survey/survey_plan.json
        max_chars: 5000
      current_notes:
        from_dir: literature/deep_read_notes
        glob: "*.md"
        max_items: 20
      shallow_read_notes:
        from_dir: literature/shallow_read_notes
        glob: "*.md"
        max_items: 20
    options:
      - id: conservative
        label: "使用现有语料"
        next: T3.6-STATE
      - id: complete
        label: "执行定向补充检索"
        description: "按你确认的目标篇数补充历史发展、前沿进展和薄弱 taxonomy 类的候选文献；带摘要的结果会形成可复用的 shallow 阅读笔记，每条均保留来源与证据边界。"
        collect_input: [supplement_target_papers, supplement_focus]
        input_prompts:
          supplement_target_papers: "目标补充记录数（直接回车采用系统建议；可输入任意正整数）"
          supplement_focus: "优先补什么（例如：历史发展、前沿进展、某个 taxonomy 类、cross-domain bridge；可留空）"
        next: T3.6-EXPAND

  # T3.6 综述完成后的去向确认：
  # Survey PDF/summary 已生成后，用户可能只想结束综述任务，也可能继续进入 T4 idea。
  t36_post_survey_gate:
    title: "T3.6 综述完成后去向确认"
    description: "综述支线已完成并导出 survey_insights。请确认现在结束项目，还是继续进入 T4 生成研究 idea。"
    presentation:
      survey_summary:
        from_file: drafts/survey/survey_summary.md
        mode: path_summary
        summary_chars: 2200
      survey_compile_report:
        from_file: drafts/survey/survey_compile_report.json
        max_chars: 2000
      survey_insights:
        from_file: ideation/survey_insights.json
        mode: path_summary
        summary_chars: 1800
      how_to_choose:
        literal: |
          选择建议：
          - 如果这次只需要综述 PDF/TeX：选择“结束项目”。
          - 如果还要基于综述继续生成研究假设、实验计划和后续论文：选择“继续进入 T4”。
          - 选择会写入 drafts/survey/post_survey_decision.json，resume 时不会丢失。
    options:
      - id: continue_to_t4
        label: "继续进入 T4"
        aliases: ["继续", "t4", "idea", "生成idea", "continue"]
        next: T4
      - id: finish_after_survey
        label: "结束项目"
        aliases: ["结束", "完成", "stop", "done", "finish"]
        next: done

  # T4 候选方向选择：
  # 候选池已经写入结果文件，系统在这里暂停，让用户选择、合并、重构或要求重分析。
  t4_recovery_gate:
    title: "T4 恢复决策"
    description: "T4 未能安全抵达 Gate1，但已保存的 Candidate、评分、谱系和诊断仍可使用。请选择继续修复、查看现有候选或暂停。"
    options:
      - id: retry_t4
        label: "继续修复并重试"
      - id: open_gate1
        label: "查看已保存 Candidate"
      - id: pause
        label: "暂停"
      - id: exit
        label: "结束本次运行"

  t36_assemble_recovery_gate:
    title: "综述拼装审计需要决策"
    description: "已保存全部 section、survey.tex 与审计诊断。继续修复时只处理审计指出的来源文件，不会用无关引用或虚构内容强行通过。"
    options:
      - id: retry_survey_repair
        label: "继续定向修复"
      - id: pause_review
        label: "暂停并检查审计"
      - id: exit
        label: "结束本次综述运行"

  t36_compile_recovery_gate:
    title: "综述 PDF 编译需要决策"
    description: "编译阶段不会改写正文。已保存 TeX、section、审计和 compile report；请选择重试编译、回到 Review 修复来源文件，或暂停检查环境。"
    options:
      - id: retry_compile
        label: "重试编译"
      - id: return_to_review
        label: "回到 Review 修复来源文件"
      - id: pause_review
        label: "暂停并检查编译报告"
      - id: exit
        label: "结束本次综述运行"

  # 通用运行时恢复：由 StateMachine 动态持久化，覆盖校验修复耗尽、模型服务短暂不可用、
  # 可恢复环境暂停和旧 bounded-recovery 记录。即使旧 workspace 比该配置先创建，持久化的
  # presentation/options 仍是权威来源，resume 不依赖此装饰项才能工作。
  runtime_recovery_gate:
    title: "运行恢复需要决策"
    description: "任务在可恢复的运行时问题后暂停。已保存的 artifacts、诊断和恢复状态会保留；选择继续时只修复实际问题，不放松证据、引用或状态完整性。"
    options:
      - id: retry_targeted_repair
        label: "继续定向修复"
      - id: extend_recovery_window
        label: "使用旧兼容修复窗口后重试"
      - id: inspect_then_pause
        label: "检查后暂停"
      - id: exit
        label: "结束本次运行"

  t4_gate1_selection_gate:
    title: "T4 · 研究方向决策"
    description: "当前候选已经生成并完成初步评分。你现在只需要决定：推进一个方向，继续优化，还是暂时不做选择。其他候选和历史版本都会保留。"
    options:
      - id: proceed_candidate
        label: "推进一个候选"
        description: "选择 D1、D2 或 D3，进入新颖性与文献碰撞检查。不会删除其他候选，后续仍可返回。"
        # A public “推进 D#” is selection for the novelty gate.  Evolution,
        # refinement and composition are handled by their distinct native
        # directives and may return to T4 only after their own confirmation.
        next: T4.5
        collect_input:
          - directive
        input_prompts:
          directive: "要推进哪个候选？例如：D1 或 推进 D1"
      - id: focus_evolution
        label: "优化一个候选"
        description: "针对某个候选的主要问题生成改进版本，例如优化理论机制、假设、贡献或实验可行性。"
        next: T4
        collect_input:
          - directive
        input_prompts:
          directive: "想优化哪个候选、重点是什么？例如：优化 D2 的实验可行性"
      - id: another_generation
        label: "再探索一轮"
        description: "基于当前全部候选继续生成一代新方案并重新比较。当前候选和评分都会保留。"
        next: T4
      - id: inspect
        label: "查看候选详情"
        description: "查看或对比候选的摘要、评分理由、假设、贡献、证据来源和主要风险；只读，不调用模型。"
        next: T4
        collect_input:
          - directive
        input_prompts:
          directive: "想查看什么？例如：查看 D1、查看 D1 的评分、对比 D1 和 D3"
      - id: pause
        label: "暂不决定"
        description: "保存当前状态，下次从这里继续，不重复已完成的 T4 模型调用。"
        next: T4
      - id: more_actions
        label: "更多操作"
        description: "展开低频高级操作：构建跨候选新方案、组合组件、调整投稿取向、重跑来源通道、回到上一代等。"
        next: T4
      - id: create_crossover
        label: "构建跨候选新方案"
        description: "分析两个候选是否兼容，兼容后再生成新的独立候选。"
        advanced: true
        next: T4
        collect_input:
          - directive
      - id: compose
        label: "组合指定组件"
        description: "从不同候选中选择假设、贡献或方法模块，构建新方案。"
        advanced: true
        next: T4
        collect_input:
          - directive
      - id: keep_parallel
        label: "并行保留多个方向"
        description: "将多个候选标记为独立研究方向，后续分别推进。"
        advanced: true
        next: T4
        collect_input:
          - directive
      - id: show_population
        label: "查看完整候选池"
        description: "查看未进入当前推荐列表的候选，不生成新内容。"
        advanced: true
        next: T4
      - id: regenerate_route
        label: "重新探索指定来源"
        description: "重新运行某个 Idea 来源通道，并保留此前结果。"
        advanced: true
        next: T4
        collect_input:
          - directive
      - id: change_orientation
        label: "调整投稿取向"
        description: "按 UTD、CCF 或 Hybrid 取向重新评估适配度；不改变候选本身的科研评分。"
        advanced: true
        next: T4
        collect_input:
          - directive
        input_prompts:
          directive: "新的论文取向（例如‘更偏 UTD，但保留技术机制’、‘改成 CCF A’或‘Hybrid’）"
      - id: rollback
        label: "回到上一代"
        description: "将上一代候选池设为当前版本，不删除后续结果。"
        advanced: true
        next: T4
      # Legacy aliases are retained so persisted selections and scripted callers
      # from earlier ResearchOS workspaces still resolve correctly.
      - id: select_or_reframe
        label: "兼容旧记录：选择或重构"
        advanced: true
        next: T4
        collect_input:
          - selection
      - id: merge
        label: "兼容旧记录：合并 Candidate"
        advanced: true
        next: T4
        collect_input:
          - merge_plan
      - id: new_idea
        label: "补充新想法"
        advanced: true
        next: T4
        collect_input:
          - new_idea
      - id: reanalyze
        label: "重新分析候选池"
        advanced: true
        next: T4
        collect_input:
          - feedback

  # 投稿匿名化门控：检查论文匿名化完整性
  # forbidden_patterns 是逻辑标签，不一定是简单字符串匹配；
  # 实际检查逻辑取决于对应 Gate 实现。
  submission_gate:
    type: anonymization_check
    config:
      allowed_patterns: []
      forbidden_patterns:
        - email
        - github_url
        - acknowledgments_section
        - author_name
        - institution_identifiable

  # Legacy-only compatibility presentation.  T7/T7.5 are deliberately absent
  # from the current main state machine; this declaration lets a persisted
  # pre-migration Workspace render its saved evaluation decision and translate
  # it to the current T5 handoff or T8 style/resource path during Resume.
  t75_human_review_gate:
    title: "旧版 T7.5 评估恢复"
    description: "这是旧 Workspace 保留的实验评估决策。继续写作会进入当前写作风格和资源准备流程，不会重新启用旧版内部实验节点。"
    presentation:
      evaluation_decision:
        from_file: evaluation/evaluation_decision.md
        max_chars: 5000
      recommended_next_task:
        from_file_regex:
          path: evaluation/evaluation_decision.md
          pattern: "next_task:\\s*([A-Za-z0-9_.-]+)"
          group: 1
          default: "T8-STYLE-GATE"
    options:
      - id: follow_recommendation
        label: "按已保存建议继续"
        next: "__parse_from_output__"
      - id: go_write
        label: "进入当前写作流程"
        next: T8-STYLE-GATE
      - id: rerun_t7
        label: "返回当前外部实验交接"
        next: T5-REBOOST-GATE
      - id: rethink_t4
        label: "回到 T4 重构候选"
        next: T4
      - id: stop_project
        label: "结束当前项目"
        next: done

  # T8 正文写作风格、语言与 LaTeX 模板确认：
  # 这是 runtime 级确定 gate，选完后写 drafts/writing_style.json。
  t8_style_template_gate:
    title: "T8 写作风格与模板确认"
    description: "请确认正式论文正文采用 IS/CCF-A/both 风格，以及使用哪类 LaTeX 模板。"
    presentation:
      how_to_choose:
        literal: |
          如何选择：
          - IS/UTD/CDS 期刊稿：选“IS + INFORMS”，默认 template_family=utd, template_id=informs。
          - CCF/CS 会议稿：先选“CCF / CS 会议模板”，下一页再从所有本地模板中选择具体会议。系统会明确显示官方 `.tex` 入口与仅含 class/style 的模板包。
          - 同时准备两套稿：选“Both + 基础英文”，先共享资源索引与 alignment matrix。
          - 只想确定中英、不套 venue：选中文基础或英文基础。
          - Management Science/ISR/INFORMS 默认使用本地官方 INFORMS ISRE 2024 模板包；若最终投稿到其他 INFORMS 期刊，可再替换对应官方 ZIP。
      project_summary:
        from_file: project.yaml
        max_chars: 2500
      evaluation_decision:
        from_file: evaluation/evaluation_decision.md
        max_chars: 2000
    options:
      - id: is_informs
        label: "IS + INFORMS"
        description: "IS/UTD/CDS 期刊写法，英文 INFORMS 官方 ISRE 2024 模板。"
        aliases: ["is", "utd", "informs", "management science", "isr", "misq", "cds", "commerce data science", "informs journal on data science"]
        next: T8-RESOURCE
        captured_defaults:
          venue_style: is
          template_family: utd
          template_id: informs
          writing_language: en
      - id: ccf
        label: "CCF / CS 会议模板"
        description: "下一步选择具体会议模板；写作结构将按 conference paper 的需要准备。"
        aliases: ["ccf", "ccf_a", "ccf-a", "会议", "conference"]
        next: T8-CCF-TEMPLATE-GATE
      - id: both_basic_en
        label: "Both + 基础英文"
        description: "同时准备 IS/CCF-A 两套写作结构，先用英文基础模板。"
        aliases: ["both", "两套", "双线"]
        next: T8-RESOURCE
        captured_defaults:
          venue_style: both
          template_family: basic_en
          template_id: basic_en
          writing_language: en
      - id: basic_en
        label: "英文基础模板"
        description: "只确定英文正文，使用普通 article 模板，不套 venue。"
        aliases: ["英文", "english", "en", "basic_en", "不用模板", "不要模板"]
        next: T8-RESOURCE
        captured_defaults:
          venue_style: ccf_a
          template_family: basic_en
          template_id: basic_en
          writing_language: en
      - id: basic_zh
        label: "中文基础模板"
        description: "中文正文，使用 ctex 中文基础模板。"
        aliases: ["中文", "chinese", "zh", "basic_zh"]
        next: T8-RESOURCE
        captured_defaults:
          venue_style: is
          template_family: basic_zh
          template_id: basic_zh
          writing_language: zh
      - id: custom
        label: "自定义模板"
        description: "手动输入 venue_style、template_family、template_id、writing_language。"
        aliases: ["custom", "自定义"]
        next: T8-RESOURCE
        collect_input:
          - venue_style
          - template_family
          - template_id
          - writing_language

  t8_ccf_template_gate:
    title: "选择 CCF / CS 会议模板"
    description: "请选择本地会议模板。官方 LaTeX 入口会直接用于正文组装；只有 class/style 的模板包会使用匿名写作外壳，并在写作产物中保留提交前核对官方模板的提示。"
    presentation:
      project_summary:
        from_file: project.yaml
        max_chars: 1200
    options: []

  # T4.5 非通过 verdict 的人工确认门：
  # Novelty Auditor 可以建议 reframe/drop，但最终是否回 T4、继续外部实验链或停止由用户决定。
  t45_human_review_gate:
    title: "T4.5 新颖性审计人工决策"
    description: "T4.5 的 Final Gate Verdict 未直接通过。请查看审计报告和候选池后决定下一步，系统不会自动拒绝或自动回退。"
    presentation:
      final_gate_verdict:
        from_file_regex:
          path: ideation/novelty_audit.md
          pattern: "(?im)^\\s*(?:#+\\s*)?(?:\\*\\*)?\\s*Final\\s+Gate\\s+Verdict\\s*(?:\\*\\*)?\\s*[:：]\\s*(.+?)\\s*$"
          group: 1
          default: "未解析到 Final Gate Verdict"
      novelty_audit:
        from_file: ideation/novelty_audit.md
        max_chars: 7000
      gate1_selection_brief:
        from_file: ideation/_gate1_selection_brief.md
        max_chars: 3000
      selected_idea_brief:
        from_file: ideation/selected_idea_brief.md
        max_chars: 5000
      idea_scorecard:
        from_file: ideation/idea_scorecard.yaml
        max_chars: 5000
      rejected_ideas:
        from_file: ideation/rejected_ideas.md
        max_chars: 3000
    options:
      - id: continue_to_t5
        label: "继续进入外部实验链"
        next: T5-REBOOST-GATE
      - id: return_to_t4
        label: "回到 T4 重构"
        next: T4
      - id: stop_project
        label: "结束当前项目"
        next: done

  # T2 检索覆盖确认门：
  # T2 的 missing_areas.md 只提供 retrieval coverage hints，不是研究缺口结论。
  # 这个 gate 把补检/复核建议交给用户决策，避免系统在覆盖不足时直接进入 T3。
  t2_coverage_gate:
    title: "T2 检索覆盖确认"
    description: "Scout 已完成初步检索、验证、引用图和 deep-read queue。请确认是否按当前队列进入 T3，或回到 T2 扩检/调整。"
    presentation:
      search_log:
        from_file: literature/search_log.md
        mode: path_summary
        summary_chars: 20000
      missing_areas:
        from_file: literature/missing_areas.md
        mode: path_summary
        summary_chars: 12000
      domain_map:
        from_file: literature/domain_map.json
        mode: path_summary
        summary_chars: 20000
      access_audit:
        from_file: literature/access_audit.md
        mode: path_summary
        summary_chars: 8000
      deep_read_queue_preview:
        from_file: literature/deep_read_queue.jsonl
        mode: path_summary
        summary_chars: 12000
    options:
      - id: continue_to_t3
        label: "进入 T3 精读"
        next: T3
      - id: rerun_t2_expand
        label: "回到 T2 扩检/调整 query"
        next: T2
        extra:
          allow_t2_failure_recovery: false
          t2_user_requested_expansion: true
      - id: stop_project
        label: "结束当前项目"
        next: done

  # T5 协议就绪门：handoff 已编译并不等于授权实现或运行。
  t5_protocol_gate:
    title: "T5 实验协议就绪确认"
    description: "这里不是报错页。T5 已保存 T4.5 的研究方案；此处只确认哪些实验设置已经由研究者明确，哪些仍需决定。系统会说明现在能做什么以及应选择哪个选项。"
    # protocol_readiness is added dynamically by the state machine and rendered
    # as a researcher-facing Rich decision page. Do not dump the handoff or
    # report JSON here: they are durable audit files, not a human decision UI.
    presentation: {}
    options:
      - id: protocol_ready
        label: "协议已补充，重新编译"
        description: "已在 T4.5 的实验计划或来源明确的项目材料中补充未决设置；重新编译 handoff 并独立校验。"
        next: T5-REBOOST-GATE
      - id: prepare_materials
        label: "先准备实验材料"
        description: "先放置已有数据、代码、benchmark 或权重；仍不会启动实现或正式运行。"
        next: T5-EXPR-MATERIAL-GATE
      - id: pause_protocol
        label: "暂停协议确认"
        description: "保留当前诊断、handoff 与 Skill Suite；下次 resume 回到本 Gate。"
        next: T5-PROTOCOL-GATE
      - id: back_to_t4
        label: "回到 T4 重构"
        description: "研究设计需要改变机制、任务、benchmark 范围或贡献类型时返回 T4。"
        next: T4
      - id: stop_project
        label: "结束当前项目"
        description: "停止本次流程，不删除已保存的研究材料或 T5 交接。"
        next: done

  # T5 实验材料放置门：
  # 真实实验启动前，用户把源材料放进 resources/；只有已经可直接运行的部署资产才放入
  # external_executor/expr/。
  t5_expr_material_gate:
    title: "T5 实验材料放置确认"
    description: "T5 已完成 re-boost、handoff 和项目专属 skill suite 生成。请将数据集、baseline、benchmark、外部代码、权重和材料说明放入 resources/；仅将已整理为可直接运行的部署资产放入 external_executor/expr/。若当前协议仍有未决 setting，材料完成后会回到协议确认 Gate，而不会直接选择执行器。"
    presentation:
      resources_path:
        literal: "resources/"
      resources_files:
        from_dir: resources
        glob: "*"
        max_items: 50
      expr_path:
        literal: "external_executor/expr/"
      expr_files:
        from_dir: external_executor/expr
        glob: "*"
        max_items: 50
      handoff_summary:
        from_file: external_executor/handoff_pack.json
        max_chars: 4000
      launch_after_gate:
        literal: |
          `resources/` 是 Phase B 的源资源根。外部执行器会在其中将人工提供、远程获取和复现资源分别整理为 byhand、Remote_acquisition 和 reproduction；`external_executor/expr/` 仅用于已部署、可运行的 baseline 和方法资产。
          材料就绪后，若实验协议已完整，将进入外部执行器选择 Gate；若 handoff 仍记录未决协议，将返回 T5 协议确认 Gate。
          如果选择 Codex CLI，系统会提示你在 workspace 根目录启动 Codex CLI，让它读取 external_executor/AGENTS.md 并执行 external_executor/skills/research-execution/SKILL.md。
          Codex 完成后应写回并通过 Writer Handoff 核验 external_executor/executor_research_report.md、external_executor/result_pack.json、external_executor/executor_status.json 和 external_executor/report/run_manifest.json；总控 Skill 随后直接执行 python -m researchos.cli run-task T8 --workspace <workspace>，无需退出执行器再手工 resume。
    options:
      - id: materials_ready
        label: "材料已放置，继续"
        aliases: ["ready", "continue", "done"]
        next: T5-EXECUTOR-GATE
      - id: pause_for_materials
        label: "暂停等待放置材料"
        aliases: ["pause", "wait"]
        next: T5-EXPR-MATERIAL-GATE
      - id: back_to_t4
        label: "回到 T4 重构实验设想"
        aliases: ["t4", "rethink"]
        next: T4
      - id: stop_project
        label: "结束当前项目"
        aliases: ["stop"]
        next: done

  t5_executor_gate:
    title: "T5 外部实验执行器选择"
    description: "ResearchOS 已生成 handoff 协议和项目专属 skill suite。默认使用 Codex CLI 真实执行；mock 只用于协议联调，不是论文实验证据，完成后会回到这里选择真实执行器。"
    presentation:
      handoff_summary:
        from_file: external_executor/handoff_pack.json
        max_chars: 5000
      allowed_paths:
        from_file: external_executor/allowed_paths.txt
        max_chars: 2500
      skill_specialization_report:
        from_file: external_executor/report/skill_specialization_report.json
        max_chars: 2500
      codex_resume_instructions:
        literal: |
          Codex CLI 选择后的操作：
          1. 在当前 workspace 根目录启动 Codex CLI。
          2. 对 Codex 说：请读取 external_executor/AGENTS.md，并执行 external_executor/skills/research-execution/SKILL.md。
          3. Codex 完成后必须写出 external_executor/executor_research_report.md、external_executor/result_pack.json、external_executor/executor_status.json 和 external_executor/report/run_manifest.json。
          4. writer-handoff 通过后，总控 Skill 在当前执行器会话中运行 python -m researchos.cli run-task T8 --workspace <workspace>；该命令独立接收 handoff 并启动/恢复完整 T8。
          选择执行器后，系统会写入 external_executor/report/executor_selection.json、external_executor/report/executor_capabilities.json，并 patch AGENTS.md/CLAUDE.md。
    options:
      - id: codex_cli
        label: "Codex CLI 真实执行"
        aliases: ["codex"]
        next: T5-EXTERNAL-WAIT
      - id: claude_code_window
        label: "Claude Code 窗口执行"
        aliases: ["claude", "cc"]
        next: T5-EXTERNAL-WAIT
      - id: manual
        label: "人工/其它执行器"
        aliases: ["manual", "human"]
        next: T5-EXTERNAL-WAIT
      - id: mock_dry_run

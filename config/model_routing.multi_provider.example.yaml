# 多 provider 路由示例
# 用法：
# 1. 按需复制为 config/model_routing.yaml
# 2. 在 .env 里填入对应 endpoint 的环境变量
# 3. 通过 default_profile、CLI --profile 或 state_machine llm.profile 切换

default_profile: mixed

endpoints:
  siliconflow:
    provider: openai
    api_key_env: SILICONFLOW_API_KEY
    api_base_env: SILICONFLOW_BASE_URL

  openai_official:
    provider: openai
    api_key_env: OPENAI_API_KEY
    api_base_env: OPENAI_BASE_URL

  anthropic_main:
    provider: anthropic
    api_key_env: ANTHROPIC_API_KEY

profiles:
  mixed:
    heavy:
      primary:
        model: "Pro/deepseek-ai/DeepSeek-V3.2"
        endpoint: siliconflow
        max_context: 128000
      fallback:
        - model: "claude-3-5-sonnet-20241022"
          endpoint: anthropic_main
          max_context: 200000

    medium:
      primary:
        model: "gpt-4o-mini"
        endpoint: openai_official
        max_context: 128000
      fallback:
        - model: "claude-3-5-haiku-20241022"
          endpoint: anthropic_main
          max_context: 200000

    light:
      primary:
        model: "gpt-4.1-mini"
        endpoint: openai_official
        max_context: 128000

  siliconflow_only:
    heavy:
      primary:
        model: "Pro/deepseek-ai/DeepSeek-V3.2"
        endpoint: siliconflow
        max_context: 128000
    medium:
      primary:
        model: "Pro/deepseek-ai/DeepSeek-V3.2"
        endpoint: siliconflow
        max_context: 128000
    light:
      primary:
        model: "Pro/zai-org/GLM-4.7"
        endpoint: siliconflow
        max_context: 128000

  anthropic_only:
    heavy:
      primary:
        model: "claude-3-5-sonnet-20241022"
        endpoint: anthropic_main
        max_context: 200000
    medium:
      primary:
        model: "claude-3-5-haiku-20241022"
        endpoint: anthropic_main
        max_context: 200000
    light:
      primary:
        model: "claude-3-5-haiku-20241022"
        endpoint: anthropic_main
        max_context: 200000

truncation:
  trigger_ratio: 0.8
  target_ratio: 0.6
  keep_system: true
  keep_recent_turns: 10

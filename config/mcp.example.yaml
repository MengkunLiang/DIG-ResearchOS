# ResearchOS MCP (Model Context Protocol) 配置文件示例
# 复制此文件为 mcp.yaml 并根据需要启用/禁用服务器
#
# 快速开始：
#   cp config/mcp.example.yaml config/mcp.yaml
#
# 配置格式说明请参考 mcp.yaml 中的详细注释
#
# 理解方式：
# - 每个 `servers` 条目就是一个可被 runtime 启动的 MCP server
# - `name` 会成为逻辑标识，供工具注册和日志输出使用
# - `command + args` 决定实际如何拉起 server
# - `env` 用于把本机环境变量透传给 MCP 进程
#
# 一般建议：
# - 先只启用你真的会用到的 server，避免启动时多余失败噪声
# - 需要 API key 的 server，优先把密钥放在项目根目录 `.env`

servers:
  # arXiv MCP 服务器（推荐启用）
  # 功能：搜索和下载 arXiv 论文
  # 依赖：Node.js, npx
  # 无需 API Key
  - name: arxiv
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-arxiv"]

  # Semantic Scholar MCP 服务器（可选）
  # 功能：学术论文搜索、引用分析、作者信息查询
  # 依赖：Python, semantic_scholar_mcp 包
  # 需要 API Key：在 .env 中设置 S2_API_KEY
  # 启用步骤：
  #   1. pip install semantic_scholar_mcp
  #   2. 在 .env 中添加 S2_API_KEY=your-api-key
  #   3. 保留下面的 env 映射，runtime 才能把 key 传给 MCP 子进程
  - name: semantic_scholar
    command: "python"
    args: ["-m", "semantic_scholar_mcp"]
    env:
      # 左边是传给 MCP 进程的环境变量名，右边是从当前 shell/.env 取值。
      S2_API_KEY: "${S2_API_KEY}"

  # GitHub MCP 服务器（可选）
  # 功能：GitHub 仓库搜索、代码搜索、Issue/PR 管理
  # 依赖：Node.js, npx
  # 需要 API Token：在 .env 中设置 GITHUB_TOKEN
  # 启用步骤：
  #   1. 在 GitHub 创建 Personal Access Token
  #   2. 在 .env 中添加 GITHUB_TOKEN=your-token
  #   3. 如果只做本地文献流程，不需要启用 GitHub MCP
  - name: github
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-github"]
    env:
      GITHUB_TOKEN: "${GITHUB_TOKEN}"

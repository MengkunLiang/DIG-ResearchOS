schema_version: skill_specialization.v1
context_schema: skills/external_executor_skills/schemas/project_skill_context.schema.json
context_file: external_executor/project_skill_context.yaml
guidance:
  begin_marker: <!-- PROJECT-SPECIFIC-GUIDANCE:BEGIN -->
  end_marker: <!-- PROJECT-SPECIFIC-GUIDANCE:END -->
  heading: '## Project-Specific Guidance'
  sections:
  - id: project_focus
    title: '### Project focus'
  - id: project_priorities
    title: '### Project priorities'
  - id: hard_constraints
    title: '### Hard project constraints'
  - id: decision_criteria
    title: '### Project-specific decision and completion criteria'
  - id: detailed_context
    title: '### Detailed project context'
  - id: uncertain_fields
    title: '### Uncertain project fields'
rendering:
  confirmed_statuses:
  - confirmed
  - confirmed_from_source
  uncertain_status: uncertain
  missing_path_policy: error
  empty_confirmed_value_policy: omit
  uncertain_value_policy: move_to_uncertain_fields
  list_style: markdown_bullets
  max_items_default: 8
  detail_reference_format: '`<workspace>/external_executor/project_skill_context.yaml#{path}`'
  runtime_note: Current iteration state and execution evidence remain authoritative in runtime artifacts.
skills:
  research-execution:
    inject:
      project_focus:
      - path: project.goal
        label: Project goal
        render: scalar
        required: true
      - path: research.central_hypothesis
        label: Central hypothesis
        render: scalar
        required: true
      project_priorities:
      - path: baselines.required
        label: Required baselines
        render: object_list
        required: true
        max_items: 8
        display_fields:
        - baseline_id
        - name
        - reason_included
      - path: experiment.minimum_experiment_loop
        label: Minimum experiment loop
        render: list
        required: true
        max_items: 8
      - path: outputs.required_artifact_types
        label: Required final artifact types
        render: list
        required: false
        max_items: 10
      hard_constraints:
